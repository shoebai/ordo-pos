<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ordo — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--s:#13131f;--card:#1a1a2e;--el:#1f1f35;
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:rgba(201,168,76,.1);
  --red:#ef4444;--red-dim:rgba(239,68,68,.1);
  --green:#10b981;--green-dim:rgba(16,185,129,.1);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);
  --t1:#f5f0e8;--t2:#9a9080;--t3:#5a5448;
  --border:rgba(201,168,76,.12);
}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}

/* Nav */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--s);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.logo{font-family:'Instrument Serif',serif;font-size:18px;color:var(--gold2);}
.logo span{font-size:10px;font-family:'DM Sans',sans-serif;color:var(--t3);letter-spacing:2px;text-transform:uppercase;display:block;}
.admin-badge{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.5px;}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:200px;background:var(--s);border-right:1px solid var(--border);padding:16px;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.main{flex:1;padding:24px;overflow:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;margin-bottom:3px;transition:.15s;border:none;background:none;width:100%;}
.nav-item:hover{background:var(--el);color:var(--t1);}
.nav-item.active{background:var(--gold-dim);color:var(--gold2);}
.nav-item i{width:16px;text-align:center;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.stat-icon{font-size:22px;margin-bottom:10px;}
.stat-val{font-family:'Instrument Serif',serif;font-size:32px;color:var(--t1);line-height:1;}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;}
.tbl td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-gold{background:var(--gold-dim);color:var(--gold2);}

/* Inputs */
.input{width:100%;padding:10px 12px;background:var(--el);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:var(--t1);font-family:inherit;font-size:13px;outline:none;}
.input:focus{border-color:var(--gold);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:.2s;}
.btn-gold{background:var(--gold);color:#0a0a0f;}
.btn-gold:hover{background:var(--gold2);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold2);}
.btn-sm{padding:5px 11px;font-size:12px;}

/* Search */
.search-wrap{position:relative;margin-bottom:18px;}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;}
.search-wrap input{padding-left:34px;}

/* Section headers */
.sec-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;}
.login-title{font-family:'Instrument Serif',serif;font-size:26px;color:var(--t1);text-align:center;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
.err{color:var(--red);font-size:12px;margin-top:8px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.main>*{animation:fadeIn .3s ease;}
</style>
</head>
<body>

<div id="app">
  <!-- Rendered by JS -->
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDTzLb-bqmZiNB0G0W4WTRGseMM37GUcpI",
  authDomain: "pos-ordo.firebaseapp.com",
  projectId: "pos-ordo",
  storageBucket: "pos-ordo.firebasestorage.app",
  messagingSenderId: "575923763514",
  appId: "1:575923763514:web:f81283d99aafd2460f3803",
  measurementId: "G-PND9FKHRVF"
};

// ── Your super-admin email ──────────────────────
const ADMIN_EMAIL = "yshoeb52@gmail.com"; // CHANGE THIS

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── State ───────────────────────────────────────
let currentAdmin = null;
let tenants = [];
let activeTab = 'overview';
let searchQuery = '';

// ── Helper to show error messages ───────────────
function showError(msg) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:var(--red);padding:20px;text-align:center;">
      <i class="fa fa-exclamation-triangle" style="font-size:48px;"></i>
      <div style="font-size:14px;">${msg}</div>
      <button class="btn btn-ghost btn-sm" onclick="location.reload()">Retry</button>
    </div>
  `;
}

// ── Auth ────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  console.log("Auth state changed:", user?.email);
  
  if (user && user.email === ADMIN_EMAIL) {
    currentAdmin = user;
    try {
      await loadDashboard();
    } catch (error) {
      console.error("Dashboard load error:", error);
      showError("Failed to load dashboard: " + error.message);
    }
  } else if (user) {
    // Logged in but not admin
    await auth.signOut();
    renderLogin('Access denied — admin only.');
  } else {
    renderLogin();
  }
});

// ── Load all tenants ────────────────────────────
async function loadDashboard() {
  renderLoading();
  
  try {
    console.log("Loading tenants from Firestore...");
    const snap = await db.collection('tenants').orderBy('createdAt', 'desc').get();
    tenants = snap.docs.map(d => ({ id: d.id, ...d.data(), uid: d.id }));
    console.log(`Loaded ${tenants.length} tenants`);
    renderDashboard();
  } catch (error) {
    console.error("Firestore error:", error);
    throw new Error("Cannot access Firestore. Check security rules.");
  }
}

// ── Render functions ────────────────────────────

function renderLoading() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#9a9080;font-size:14px;gap:10px;">
      <i class="fa fa-spinner" style="animation:spin 1s linear infinite;"></i> Loading dashboard…
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
}

function renderLogin(err = '') {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-title">Ordo Admin</div>
        <div class="login-sub">Super admin access only</div>
        ${err ? `<div class="err" style="margin-bottom:14px;padding:8px 12px;background:var(--red-dim);border-radius:6px;">${err}</div>` : ''}
        <div class="field"><label>Email</label><input class="input" id="adm-email" type="email" placeholder="admin@example.com"/></div>
        <div class="field"><label>Password</label><input class="input" id="adm-pass" type="password" onkeydown="if(event.key==='Enter')adminLogin()"/></div>
        <div id="adm-err" class="err"></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:12px;" onclick="adminLogin()">Sign In →</button>
      </div>
    </div>`;
}

window.adminLogin = async function() {
  const email = document.getElementById('adm-email').value;
  const pass  = document.getElementById('adm-pass').value;
  const errEl = document.getElementById('adm-err');
  
  if (!email || !pass) {
    errEl.textContent = 'Fill in both fields.';
    return;
  }
  
  try {
    errEl.textContent = '';
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    console.error("Login error:", e);
    errEl.textContent = 'Invalid credentials or network error.';
  }
};

function renderDashboard() {
  // Stats
  const total       = tenants.length;
  const trials      = tenants.filter(t => t.status === 'trial').length;
  const active      = tenants.filter(t => t.status === 'active').length;
  const expired     = tenants.filter(t => t.status === 'expired').length;
  const mrr         = tenants.filter(t => t.status === 'active' && t.plan === 'monthly').length * 199
                    + tenants.filter(t => t.status === 'active' && t.plan === 'annual').length  * 149
                    + tenants.filter(t => t.status === 'active' && t.plan === 'lifetime').length * 0;
  const newThisMonth = tenants.filter(t => {
    if (!t.createdAt) return false;
    const d = new Date(t.createdAt);
    const n = new Date();
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;

  const filtered = tenants.filter(t =>
    !searchQuery ||
    (t.restaurantName || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.email || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.plan || '').toLowerCase().includes(searchQuery.toLowerCase())
  );

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="logo">Ordo <span>Admin Dashboard</span></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-badge">ADMIN</span>
        <span style="font-size:12px;color:var(--t3)">${currentAdmin?.email || ''}</span>
        <button class="btn btn-ghost btn-sm" onclick="window.auth.signOut()"><i class="fa fa-sign-out-alt"></i> Sign out</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <button class="nav-item ${activeTab === 'overview' ? 'active' : ''}" onclick="window.setTab('overview')"><i class="fa fa-chart-pie"></i> Overview</button>
        <button class="nav-item ${activeTab === 'tenants' ? 'active' : ''}" onclick="window.setTab('tenants')"><i class="fa fa-building"></i> Restaurants</button>
        <button class="nav-item ${activeTab === 'revenue' ? 'active' : ''}" onclick="window.setTab('revenue')"><i class="fa fa-coins"></i> Revenue</button>
        <button class="nav-item ${activeTab === 'expiring' ? 'active' : ''}" onclick="window.setTab('expiring')"><i class="fa fa-clock"></i> Expiring Soon</button>
        <div style="height:1px;background:rgba(255,255,255,.05);margin:10px 0;"></div>
        <button class="nav-item ${activeTab === 'licenses' ? 'active' : ''}" onclick="window.setTab('licenses')"><i class="fa fa-key"></i> License Keys</button>
        <button class="nav-item ${activeTab === 'version' ? 'active' : ''}" onclick="window.setTab('version')"><i class="fa fa-rocket"></i> Version Manager</button>
      </div>

      <div class="main" id="tab-content">
        ${activeTab === 'overview'  ? renderOverview(total, trials, active, expired, mrr, newThisMonth, tenants) : ''}
        ${activeTab === 'tenants'   ? renderTenants(filtered) : ''}
        ${activeTab === 'revenue'   ? renderRevenue(tenants) : ''}
        ${activeTab === 'expiring'  ? renderExpiring(tenants) : ''}
        ${activeTab === 'licenses'  ? '<div id="licenses-tab">Loading…</div>' : ''}
        ${activeTab === 'version'   ? '<div id="version-tab">Loading…</div>' : ''}
      </div>
    </div>`;
    
  // Load async tabs
  if (activeTab === 'licenses') setTimeout(() => renderLicensesTab(), 50);
  if (activeTab === 'version') setTimeout(() => renderVersionTab(), 50);
}

function renderOverview(total, trials, active, expired, mrr, newMonth, tenants) {
  const recentTenants = [...tenants].slice(0, 8);
  return `
    <div class="stat-grid">
      <div class="stat"><div class="stat-icon">🏪</div><div class="stat-val">${total}</div><div class="stat-lbl">Total Restaurants</div></div>
      <div class="stat"><div class="stat-icon">⏳</div><div class="stat-val">${trials}</div><div class="stat-lbl">In Trial</div></div>
      <div class="stat"><div class="stat-icon">✅</div><div class="stat-val">${active}</div><div class="stat-lbl">Active (Paid)</div></div>
      <div class="stat"><div class="stat-icon">💰</div><div class="stat-val">SAR ${mrr.toLocaleString()}</div><div class="stat-lbl">Est. MRR</div></div>
      <div class="stat"><div class="stat-icon">📅</div><div class="stat-val">${newMonth}</div><div class="stat-lbl">New This Month</div></div>
      <div class="stat"><div class="stat-icon">⚠️</div><div class="stat-val">${expired}</div><div class="stat-lbl">Expired</div></div>
    </div>
    <div class="sec-hdr">Recent Signups</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Plan</th><th>Status</th><th>Joined</th><th></th></tr></thead>
        <tbody>
          ${recentTenants.map(t => tenantRow(t)).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderTenants(filtered) {
  return `
    <div class="search-wrap">
      <i class="fa fa-search"></i>
      <input class="input" placeholder="Search restaurants, email, plan…" value="${searchQuery}" oninput="window.searchQuery=this.value;window.renderDashboard()"/>
    </div>
    <div class="sec-hdr">${filtered.length} restaurant${filtered.length !== 1 ? 's' : ''}</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Owner</th><th>Plan</th><th>Status</th><th>Trial Ends</th><th>Actions</th></tr></thead>
        <tbody>${filtered.map(t => tenantRow(t, true)).join('')}</tbody>
       </table>
    </div>`;
}

function renderRevenue(tenants) {
  const paid = tenants.filter(t => t.status === 'active');
  const monthly  = paid.filter(t => t.plan === 'monthly').length;
  const annual   = paid.filter(t => t.plan === 'annual').length;
  const lifetime = paid.filter(t => t.plan === 'lifetime').length;
  const mrr = monthly * 199 + annual * 149;
  const arr = mrr * 12;
  return `
    <div class="stat-grid">
      <div class="stat"><div class="stat-icon">💰</div><div class="stat-val">SAR ${mrr.toLocaleString()}</div><div class="stat-lbl">Monthly Recurring Revenue</div></div>
      <div class="stat"><div class="stat-icon">📈</div><div class="stat-val">SAR ${arr.toLocaleString()}</div><div class="stat-lbl">Annual Run Rate</div></div>
      <div class="stat"><div class="stat-icon">🔄</div><div class="stat-val">${monthly}</div><div class="stat-lbl">Monthly Subscribers</div></div>
      <div class="stat"><div class="stat-icon">📅</div><div class="stat-val">${annual}</div><div class="stat-lbl">Annual Subscribers</div></div>
      <div class="stat"><div class="stat-icon">♾️</div><div class="stat-val">${lifetime}</div><div class="stat-lbl">Lifetime Licenses</div></div>
    </div>
    <div class="sec-hdr">Paid Accounts</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Plan</th><th>Email</th><th>Actions</th></tr></thead>
        <tbody>${paid.map(t => `
          <tr>
            <td><strong>${t.restaurantName || '—'}</strong></td>
            <td><span class="badge badge-green">${t.plan}</span></td>
            <td style="color:var(--t3)">${t.email}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="window.openTenant('${t.uid}')">View</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderExpiring(tenants) {
  const soon = tenants.filter(t => {
    if (t.status !== 'trial') return false;
    if (!t.trialEnd) return false;
    const days = Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000);
    return days <= 3 && days >= 0;
  }).sort((a,b) => new Date(a.trialEnd) - new Date(b.trialEnd));

  return `
    <div class="sec-hdr">${soon.length} trial${soon.length !== 1 ? 's' : ''} expiring within 3 days</div>
    ${soon.length === 0 ? '<div class="card" style="text-align:center;color:var(--t3);padding:40px;">No trials expiring soon 🎉</div>' : ''}
    ${soon.length > 0 ? `
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Email</th><th>Days Left</th><th>Actions</th></tr></thead>
        <tbody>${soon.map(t => {
          const days = Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000);
          return `<tr>
            <td><strong>${t.restaurantName || '—'}</strong></td>
            <td style="color:var(--t3)">${t.email}</td>
            <td><span class="badge ${days <= 1 ? 'badge-red' : 'badge-yellow'}">${days} day${days !== 1 ? 's' : ''}</span></td>
            <td style="display:flex;gap:6px;">
              <button class="btn btn-ghost btn-sm" onclick="window.extendTrial('${t.uid}')"><i class="fa fa-clock"></i> Extend 7d</button>
              <button class="btn btn-gold btn-sm" onclick="window.activateTenant('${t.uid}','monthly')"><i class="fa fa-check"></i> Activate</button>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>` : ''}`;
}

function tenantRow(t, full = false) {
  const statusBadge = {
    trial:     '<span class="badge badge-yellow">Trial</span>',
    active:    '<span class="badge badge-green">Active</span>',
    expired:   '<span class="badge badge-red">Expired</span>',
    cancelled: '<span class="badge" style="background:rgba(255,255,255,.05);color:var(--t3)">Cancelled</span>',
  }[t.status] || '';

  const planBadge = {
    trial:    '<span class="badge badge-blue">Trial</span>',
    monthly:  '<span class="badge badge-gold">Monthly</span>',
    annual:   '<span class="badge badge-gold">Annual</span>',
    lifetime: '<span class="badge badge-gold">Lifetime</span>',
  }[t.plan] || '';

  const trialEnd = t.trialEnd ? new Date(t.trialEnd).toLocaleDateString() : '—';
  const joined   = t.createdAt ? new Date(t.createdAt).toLocaleDateString() : '—';

  if (full) return `
    <tr>
      <td><strong>${t.restaurantName || '—'}</strong><br><span style="color:var(--t3);font-size:11px">${t.email}</span></td>
      <td style="color:var(--t2)">${t.ownerName || '—'}</td>
      <td>${planBadge}</td>
      <td>${statusBadge}</td>
      <td style="color:var(--t3);font-size:12px">${trialEnd}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="window.openTenant('${t.uid}')"><i class="fa fa-eye"></i></button>
        <button class="btn btn-gold btn-sm" onclick="window.activateTenant('${t.uid}','monthly')"><i class="fa fa-check"></i> Activate</button>
        <button class="btn btn-danger btn-sm" onclick="window.expireTenant('${t.uid}')"><i class="fa fa-ban"></i></button>
      </td>
    </tr>`;

  return `
    <tr>
      <td><strong>${t.restaurantName || '—'}</strong><br><span style="color:var(--t3);font-size:11px">${t.email}</span></td>
      <td>${planBadge}</td>
      <td>${statusBadge}</td>
      <td style="color:var(--t3);font-size:12px">${joined}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="window.openTenant('${t.uid}')">View</button></td>
    </tr>`;
}

// ── Actions ─────────────────────────────────────

window.setTab = function(tab) {
  activeTab = tab;
  renderDashboard();
};

// ── License Keys Tab ─────────────────────────────
async function renderLicensesTab() {
  const el = document.getElementById('licenses-tab');
  if (!el) return;
  el.innerHTML = `<div style="color:var(--t3);font-size:13px;padding:20px;"><i class="fa fa-spinner" style="animation:spin 1s linear infinite;"></i> Loading…</div>`;

  try {
    const snap = await db.collection('licenses').orderBy('createdAt','desc').limit(100).get();
    const licenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <div class="sec-hdr" style="margin:0">${licenses.length} License Keys</div>
        <button class="btn btn-gold btn-sm" onclick="window.generateLicenseModal()"><i class="fa fa-plus"></i> Generate Key</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="tbl">
          <thead><tr><th>Key</th><th>Email</th><th>Plan</th><th>Status</th><th>Expires</th><th>Actions</th></tr></thead>
          <tbody>
            ${licenses.map(l => `
              <tr>
                <td style="font-family:monospace;font-size:12px;color:var(--gold2);letter-spacing:1px">${l.id}</td>
                <td style="font-size:12px;color:var(--t2)">${l.email || '—'}</td>
                <td><span class="badge badge-gold" style="font-size:10px">${l.plan || '—'}</span></td>
                <td><span class="badge ${l.status === 'active' ? 'badge-green' : l.status === 'suspended' ? 'badge-red' : 'badge-yellow'}" style="font-size:10px">${l.status || '—'}</span></td>
                <td style="font-size:11px;color:var(--t3)">${l.expiresAt ? new Date(l.expiresAt).toLocaleDateString() : 'Never'}</td>
                <td style="display:flex;gap:5px;">
                  <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText('${l.id}').then(()=>alert('Copied!'))"><i class="fa fa-copy"></i></button>
                  <button class="btn btn-danger btn-sm" onclick="window.suspendLicense('${l.id}')"><i class="fa fa-ban"></i></button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (error) {
    el.innerHTML = `<div style="color:var(--red);padding:20px;">Error loading licenses: ${error.message}</div>`;
  }
}

window.generateLicenseModal = function() {
  document.getElementById('app').insertAdjacentHTML('beforeend', `
    <div class="overlay" id="gen-modal" onclick="if(event.target.id==='gen-modal')this.remove()">
      <div class="modal" style="max-width:400px">
        <div style="display:flex;justify-content:space-between;margin-bottom:18px;">
          <h3>Generate License Key</h3>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('gen-modal').remove()"><i class="fa fa-times"></i></button>
        </div>
        <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Customer Email</label>
        <input class="input" id="gen-email" placeholder="customer@restaurant.com" type="email"/></div>
        <div style="margin-bottom:12px;"><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Plan</label>
        <select class="input" id="gen-plan"><option value="monthly">Monthly</option><option value="annual">Annual</option><option value="lifetime">Lifetime</option></select></div>
        <div style="margin-bottom:16px;"><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Expires (leave blank = never)</label>
        <input class="input" id="gen-expires" type="date"/></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center;" onclick="window.doGenerateLicense()"><i class="fa fa-key"></i> Generate & Save</button>
        <div id="gen-result" style="margin-top:14px;font-family:monospace;font-size:16px;color:var(--gold2);text-align:center;letter-spacing:2px;word-break:break-all;"></div>
      </div>
    </div>`);
};

window.doGenerateLicense = async function() {
  const email   = document.getElementById('gen-email').value.trim();
  const plan    = document.getElementById('gen-plan').value;
  const expires = document.getElementById('gen-expires').value;
  if (!email) { alert('Email required'); return; }

  const part = () => Math.random().toString(36).substring(2,6).toUpperCase();
  const key = `${part()}-${part()}-${part()}-${part()}`;

  const licData = {
    email, plan, status: 'active',
    createdAt:  new Date().toISOString(),
    expiresAt:  expires ? new Date(expires).toISOString() : null,
    createdBy:  currentAdmin?.email || 'admin',
  };

  await db.collection('licenses').doc(key).set(licData);

  const tenantSnap = await db.collection('tenants').where('email','==',email).limit(1).get();
  if (!tenantSnap.empty) {
    await tenantSnap.docs[0].ref.update({ licenseKey: key });
  }

  document.getElementById('gen-result').innerHTML = `✓ Key generated:<br/><strong>${key}</strong><br/><button onclick="navigator.clipboard.writeText('${key}')" style="margin-top:8px;font-size:11px;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--t3);">Copy</button>`;
  alert(`License key generated!\n\n${key}\n\nSend this + their email to the customer.`);
  setTimeout(() => document.getElementById('gen-modal')?.remove(), 2000);
};

window.suspendLicense = async function(key) {
  if (!confirm(`Suspend license key ${key}?`)) return;
  await db.collection('licenses').doc(key).update({ status: 'suspended' });
  renderLicensesTab();
};

// ── Version Manager Tab ──────────────────────────
async function renderVersionTab() {
  const el = document.getElementById('version-tab');
  if (!el) return;
  
  try {
    const snap = await db.collection('app').doc('version').get();
    const v = snap.exists ? snap.data() : {};

    el.innerHTML = `
      <div class="sec-hdr">🚀 Version Manager</div>
      <div class="card" style="margin-bottom:20px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
          <div><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Current Version</label>
          <input class="input" id="v-current" value="${v.current || ''}" placeholder="e.g. 2.1"/></div>
          <div><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Minimum Version (force update)</label>
          <input class="input" id="v-min" value="${v.minVersion || ''}" placeholder="e.g. 2.0"/></div>
        </div>
        <div style="margin-bottom:14px;"><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Download URL</label>
        <input class="input" id="v-url" value="${v.downloadUrl || ''}" placeholder="https://your-host.com/ordo_v2.1.html"/></div>
        <div style="margin-bottom:14px;"><label style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Release Notes (shown to users)</label>
        <textarea class="input" id="v-notes" rows="4" placeholder="What's new in this version…">${v.releaseNotes || ''}</textarea></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="btn btn-gold" onclick="window.saveVersion()"><i class="fa fa-rocket"></i> Publish Update</button>
          <span style="font-size:12px;color:var(--t3);">Last published: ${v.releasedAt ? new Date(v.releasedAt).toLocaleString() : 'Never'}</span>
        </div>
      </div>
      <div class="card" style="background:rgba(59,130,246,.05);border-color:rgba(59,130,246,.2);">
        <div style="font-size:12px;color:var(--blue);line-height:1.8;">
          <strong style="display:block;margin-bottom:6px;">📋 How updates work:</strong>
          1. Upload your new <code>ordo_licensed.html</code> file somewhere (Firebase Storage, GitHub, your server)<br/>
          2. Paste the direct download URL above<br/>
          3. Set the version number and release notes<br/>
          4. Click Publish — all licensed apps will show an update banner immediately<br/>
          5. Set "Minimum Version" to force users to update before they can continue
        </div>
      </div>`;
  } catch (error) {
    el.innerHTML = `<div style="color:var(--red);padding:20px;">Error loading version data: ${error.message}</div>`;
  }
}

window.saveVersion = async function() {
  const current    = document.getElementById('v-current').value.trim();
  const minVersion = document.getElementById('v-min').value.trim();
  const downloadUrl= document.getElementById('v-url').value.trim();
  const releaseNotes=document.getElementById('v-notes').value.trim();
  
  if (!current) { alert('Version number required'); return; }
  if (!downloadUrl) { alert('Download URL required'); return; }
  
  await db.collection('app').doc('version').set({
    current, 
    minVersion: minVersion || null,
    downloadUrl, 
    releaseNotes,
    releasedAt: new Date().toISOString(),
    publishedBy: currentAdmin?.email || 'admin'
  });
  
  alert(`✅ Version ${current} published!\nAll active apps will show the update banner.`);
  renderVersionTab();
};

window.activateTenant = async function(uid, plan) {
  if (!confirm(`Activate this account on the ${plan} plan?`)) return;
  const paidUntil = new Date();
  paidUntil.setMonth(paidUntil.getMonth() + (plan === 'annual' ? 12 : 1));
  await db.collection('tenants').doc(uid).update({
    status: 'active',
    plan,
    paidUntil: paidUntil.toISOString(),
  });
  await loadDashboard();
  alert('✅ Account activated!');
};

window.expireTenant = async function(uid) {
  if (!confirm('Mark this account as expired?')) return;
  await db.collection('tenants').doc(uid).update({ status: 'expired' });
  await loadDashboard();
};

window.extendTrial = async function(uid) {
  const t = tenants.find(x => x.uid === uid);
  if (!t) return;
  const newEnd = new Date(t.trialEnd || new Date());
  newEnd.setDate(newEnd.getDate() + 7);
  await db.collection('tenants').doc(uid).update({ trialEnd: newEnd.toISOString() });
  await loadDashboard();
  alert('✅ Trial extended by 7 days!');
};

window.openTenant = function(uid) {
  const t = tenants.find(x => x.uid === uid);
  if (!t) return;
  const days = t.trialEnd ? Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000) : null;
  document.getElementById('app').insertAdjacentHTML('beforeend', `
    <div class="overlay" id="tenant-modal" onclick="if(event.target.id==='tenant-modal')window.closeTenantModal()">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
          <div>
            <div style="font-size:18px;font-weight:700;color:var(--t1)">${t.restaurantName || '—'}</div>
            <div style="font-size:12px;color:var(--t3);margin-top:3px">${t.uid}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="window.closeTenantModal()"><i class="fa fa-times"></i></button>
        </div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;">
          ${row('Owner', t.ownerName || '—')}
          ${row('Email', t.email)}
          ${row('Plan', t.plan)}
          ${row('Status', t.status)}
          ${row('Trial End', t.trialEnd ? new Date(t.trialEnd).toLocaleString() : '—')}
          ${days !== null ? row('Days Left', days > 0 ? `${days} days` : 'Expired') : ''}
          ${row('Paid Until', t.paidUntil ? new Date(t.paidUntil).toLocaleString() : '—')}
          ${row('Joined', t.createdAt ? new Date(t.createdAt).toLocaleString() : '—')}
        </table>
        <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;">
          <button class="btn btn-gold" onclick="window.activateTenant('${t.uid}','monthly');window.closeTenantModal()"><i class="fa fa-check"></i> Activate Monthly</button>
          <button class="btn btn-gold" onclick="window.activateTenant('${t.uid}','annual');window.closeTenantModal()"><i class="fa fa-check"></i> Activate Annual</button>
          <button class="btn btn-ghost" onclick="window.extendTrial('${t.uid}');window.closeTenantModal()"><i class="fa fa-clock"></i> Extend Trial 7d</button>
          <button class="btn btn-danger" onclick="window.expireTenant('${t.uid}');window.closeTenantModal()"><i class="fa fa-ban"></i> Expire</button>
        </div>
      </div>
    </div>`);
};

window.closeTenantModal = function() {
  document.getElementById('tenant-modal')?.remove();
};

function row(label, value) {
  return `<tr>
    <td style="padding:8px 0;color:var(--t3);width:120px;font-size:12px;text-transform:uppercase;letter-spacing:.5px">${label}</td>
    <td style="padding:8px 0;color:var(--t1);font-weight:500">${value}</td>
  </tr>`;
}

// Expose necessary functions to window
window.auth = auth;
window.renderDashboard = renderDashboard;
window.loadDashboard = loadDashboard;
window.searchQuery = searchQuery;
</script>
