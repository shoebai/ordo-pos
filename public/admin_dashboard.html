<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ordo — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--s:#13131f;--card:#1a1a2e;--el:#1f1f35;
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:rgba(201,168,76,.1);
  --red:#ef4444;--red-dim:rgba(239,68,68,.1);
  --green:#10b981;--green-dim:rgba(16,185,129,.1);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
  --orange:#f97316;--orange-dim:rgba(249,115,22,.1);
  --t1:#f5f0e8;--t2:#9a9080;--t3:#5a5448;
  --border:rgba(201,168,76,.12);
}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}

/* Nav */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--s);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:12px;}
.logo{font-family:'Instrument Serif',serif;font-size:20px;color:var(--gold2);}
.logo span{font-size:10px;font-family:'DM Sans',sans-serif;color:var(--t3);letter-spacing:2px;text-transform:uppercase;display:block;}
.admin-badge{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.5px;}
.download-badge{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.2);font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;cursor:pointer;transition:.2s;}
.download-badge:hover{background:var(--green);color:#fff;}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:220px;background:var(--s);border-right:1px solid var(--border);padding:16px;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.main{flex:1;padding:24px;overflow:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;margin-bottom:3px;transition:.15s;border:none;background:none;width:100%;}
.nav-item:hover{background:var(--el);color:var(--t1);}
.nav-item.active{background:var(--gold-dim);color:var(--gold2);}
.nav-item i{width:18px;text-align:center;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;transition:.2s;}
.stat:hover{transform:translateY(-2px);border-color:var(--gold);}
.stat-icon{font-size:24px;margin-bottom:10px;}
.stat-val{font-family:'Instrument Serif',serif;font-size:34px;color:var(--t1);line-height:1;}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:12px 14px;border-bottom:1px solid var(--border);text-align:left;}
.tbl td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-gold{background:var(--gold-dim);color:var(--gold2);}
.badge-purple{background:var(--purple-dim);color:var(--purple);}
.badge-orange{background:var(--orange-dim);color:var(--orange);}

/* Inputs */
.input{width:100%;padding:10px 12px;background:var(--el);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:var(--t1);font-family:inherit;font-size:13px;outline:none;}
.input:focus{border-color:var(--gold);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:.2s;}
.btn-gold{background:var(--gold);color:#0a0a0f;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.btn-success:hover{background:var(--green);color:#fff;}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-lg{padding:12px 24px;font-size:14px;}

/* Search */
.search-wrap{position:relative;margin-bottom:18px;}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;}
.search-wrap input{padding-left:34px;}

/* Section headers */
.sec-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0a0a0f,#1a1a2e);}
.login-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;}
.login-title{font-family:'Instrument Serif',serif;font-size:28px;color:var(--t1);text-align:center;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
.err{color:var(--red);font-size:12px;margin-top:8px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}

/* Download card */
.download-card{background:linear-gradient(135deg,var(--card),var(--el));border:2px solid var(--gold);border-radius:16px;padding:24px;text-align:center;}
.download-icon{font-size:56px;margin-bottom:16px;color:var(--gold);}
.download-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.download-desc{font-size:12px;color:var(--t2);margin-bottom:20px;line-height:1.6;}
.qr-placeholder{background:#fff;border-radius:12px;padding:16px;display:inline-block;margin-bottom:16px;}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:100%;position:relative;top:0;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .layout{flex-direction:column;}
  .topbar{flex-direction:column;align-items:flex-start;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .tbl{display:block;overflow-x:auto;}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.main>*{animation:fadeIn .3s ease;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app"></div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDTzLb-bqmZiNB0G0W4WTRGseMM37GUcpI",
  authDomain: "pos-ordo.firebaseapp.com",
  projectId: "pos-ordo",
  storageBucket: "pos-ordo.firebasestorage.app",
  messagingSenderId: "575923763514",
  appId: "1:575923763514:web:f81283d99aafd2460f3803",
  measurementId: "G-PND9FKHRVF"
};

// ADMIN EMAIL - CHANGE THIS TO YOUR EMAIL
const ADMIN_EMAIL = "yshoeb52@gmail.com";

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// State
let currentAdmin = null;
let tenants = [];
let activeTab = 'overview';
let searchQuery = '';

// Helper functions
function showLoading() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;">
      <i class="fa fa-spinner" style="font-size:32px;animation:spin 1s linear infinite;color:var(--gold);"></i>
      <div style="color:var(--t2);font-size:13px;">Loading dashboard...</div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;padding:20px;text-align:center;">
      <i class="fa fa-exclamation-triangle" style="font-size:48px;color:var(--red);"></i>
      <div style="color:var(--t1);font-size:14px;">${msg}</div>
      <button class="btn btn-ghost btn-sm" onclick="location.reload()">Retry</button>
    </div>
  `;
}

// Auth state
auth.onAuthStateChanged(async user => {
  console.log("Auth state:", user?.email);
  
  if (user && user.email === ADMIN_EMAIL) {
    currentAdmin = user;
    await loadDashboard();
  } else if (user) {
    await auth.signOut();
    renderLogin('Access denied — admin only.');
  } else {
    renderLogin();
  }
});

// Load all tenants
async function loadDashboard() {
  showLoading();
  try {
    const snap = await db.collection('tenants').orderBy('createdAt', 'desc').get();
    tenants = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
    renderDashboard();
  } catch (error) {
    console.error("Firestore error:", error);
    showError("Failed to load tenants. Check Firebase security rules.");
  }
}

// Render login screen
function renderLogin(err = '') {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-title">Ordo Admin</div>
        <div class="login-sub">Super admin access only</div>
        ${err ? `<div class="err" style="margin-bottom:14px;padding:8px 12px;background:var(--red-dim);border-radius:8px;">${err}</div>` : ''}
        <div class="field"><label>Email</label><input class="input" id="adm-email" type="email" placeholder="admin@example.com" value="${ADMIN_EMAIL}"/></div>
        <div class="field"><label>Password</label><input class="input" id="adm-pass" type="password" onkeydown="if(event.key==='Enter')adminLogin()"/></div>
        <div id="adm-err" class="err"></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:12px;padding:12px;" onclick="adminLogin()">
          <i class="fa fa-sign-in-alt"></i> Sign In
        </button>
      </div>
    </div>`;
}

window.adminLogin = async function() {
  const email = document.getElementById('adm-email').value;
  const pass = document.getElementById('adm-pass').value;
  const errEl = document.getElementById('adm-err');
  
  if (!email || !pass) {
    errEl.textContent = 'Fill in both fields.';
    return;
  }
  
  try {
    errEl.textContent = '';
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    errEl.textContent = 'Invalid credentials.';
  }
};

// Main dashboard render
function renderDashboard() {
  const total = tenants.length;
  const trials = tenants.filter(t => t.status === 'trial').length;
  const active = tenants.filter(t => t.status === 'active').length;
  const expired = tenants.filter(t => t.status === 'expired').length;
  const thisMonth = tenants.filter(t => {
    if (!t.createdAt) return false;
    const d = new Date(t.createdAt);
    const n = new Date();
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;

  const filtered = tenants.filter(t =>
    !searchQuery ||
    (t.restaurantName || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.email || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.ownerName || '').toLowerCase().includes(searchQuery.toLowerCase())
  );

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="logo">Ordo <span>Admin Dashboard</span></div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span class="admin-badge"><i class="fa fa-shield-alt"></i> ADMIN</span>
        <span style="font-size:12px;color:var(--t3)"><i class="fa fa-envelope"></i> ${currentAdmin?.email || ''}</span>
        <button class="download-badge" onclick="showDownloadModal()"><i class="fa fa-download"></i> Download App</button>
        <button class="btn btn-ghost btn-sm" onclick="auth.signOut()"><i class="fa fa-sign-out-alt"></i> Sign out</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <button class="nav-item ${activeTab === 'overview' ? 'active' : ''}" onclick="setTab('overview')">
          <i class="fa fa-chart-pie"></i> Overview
        </button>
        <button class="nav-item ${activeTab === 'users' ? 'active' : ''}" onclick="setTab('users')">
          <i class="fa fa-users"></i> Registered Users
        </button>
        <button class="nav-item ${activeTab === 'trials' ? 'active' : ''}" onclick="setTab('trials')">
          <i class="fa fa-hourglass-half"></i> Trials
        </button>
        <button class="nav-item ${activeTab === 'active' ? 'active' : ''}" onclick="setTab('active')">
          <i class="fa fa-check-circle"></i> Active Subscribers
        </button>
        <button class="nav-item ${activeTab === 'expired' ? 'active' : ''}" onclick="setTab('expired')">
          <i class="fa fa-clock"></i> Expired
        </button>
        <div style="height:1px;background:rgba(255,255,255,.05);margin:10px 0;"></div>
        <button class="nav-item ${activeTab === 'download' ? 'active' : ''}" onclick="setTab('download')">
          <i class="fa fa-download"></i> Download Center
        </button>
      </div>

      <div class="main">
        ${activeTab === 'overview' ? renderOverview(total, trials, active, expired, thisMonth, tenants) : ''}
        ${activeTab === 'users' ? renderUsersTable(filtered) : ''}
        ${activeTab === 'trials' ? renderTrialsTable(tenants) : ''}
        ${activeTab === 'active' ? renderActiveTable(tenants) : ''}
        ${activeTab === 'expired' ? renderExpiredTable(tenants) : ''}
        ${activeTab === 'download' ? renderDownloadCenter() : ''}
      </div>
    </div>`;
}

function renderOverview(total, trials, active, expired, thisMonth, tenants) {
  const recent = [...tenants].slice(0, 6);
  return `
    <div class="stat-grid">
      <div class="stat"><div class="stat-icon">🏪</div><div class="stat-val">${total}</div><div class="stat-lbl">Total Restaurants</div></div>
      <div class="stat"><div class="stat-icon">⏳</div><div class="stat-val">${trials}</div><div class="stat-lbl">In Trial</div></div>
      <div class="stat"><div class="stat-icon">✅</div><div class="stat-val">${active}</div><div class="stat-lbl">Active (Paid)</div></div>
      <div class="stat"><div class="stat-icon">⚠️</div><div class="stat-val">${expired}</div><div class="stat-lbl">Expired</div></div>
      <div class="stat"><div class="stat-icon">📅</div><div class="stat-val">${thisMonth}</div><div class="stat-lbl">New This Month</div></div>
      <div class="stat"><div class="stat-icon">💰</div><div class="stat-val">${active * 199}</div><div class="stat-lbl">Est. MRR (SAR)</div></div>
    </div>

    <div class="sec-hdr">📋 Recent Signups</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Owner</th><th>Email</th><th>Plan</th><th>Status</th><th>Joined</th></tr></thead>
        <tbody>
          ${recent.map(t => `
            <tr>
              <td><strong>${t.restaurantName || '—'}</strong></td>
              <td style="color:var(--t2)">${t.ownerName || '—'}</td>
              <td style="color:var(--t3);font-size:12px">${t.email || '—'}</td>
              <td>${getPlanBadge(t.plan)}</td>
              <td>${getStatusBadge(t.status)}</td>
              <td style="color:var(--t3);font-size:12px">${formatDate(t.createdAt)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderUsersTable(filtered) {
  return `
    <div class="search-wrap">
      <i class="fa fa-search"></i>
      <input class="input" placeholder="Search by restaurant, email, owner..." value="${searchQuery}" oninput="window.searchQuery=this.value;window.renderDashboard()"/>
    </div>
    <div class="sec-hdr">👥 ${filtered.length} Registered User${filtered.length !== 1 ? 's' : ''}</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr>
            <th>Restaurant</th>
            <th>Owner</th>
            <th>Email</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Trial End</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(t => `
            <tr>
              <td><strong>${t.restaurantName || '—'}</strong></td>
              <td style="color:var(--t2)">${t.ownerName || '—'}</td>
              <td style="color:var(--t3);font-size:12px">${t.email || '—'}</td>
              <td>${getPlanBadge(t.plan)}</td>
              <td>${getStatusBadge(t.status)}</td>
              <td style="color:var(--t3);font-size:12px">${t.trialEnd ? formatDate(t.trialEnd) : '—'}</td>
              <td style="color:var(--t3);font-size:12px">${formatDate(t.createdAt)}</td>
              <td style="display:flex;gap:5px;">
                <button class="btn btn-ghost btn-sm" onclick="viewUserDetails('${t.uid}')" title="View Details"><i class="fa fa-eye"></i></button>
                <button class="btn btn-success btn-sm" onclick="activateUser('${t.uid}')" title="Activate"><i class="fa fa-check"></i></button>
                <button class="btn btn-danger btn-sm" onclick="expireUser('${t.uid}')" title="Expire"><i class="fa fa-ban"></i></button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderTrialsTable(tenants) {
  const trialsList = tenants.filter(t => t.status === 'trial');
  return `
    <div class="sec-hdr">⏳ ${trialsList.length} Trial User${trialsList.length !== 1 ? 's' : ''}</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Owner</th><th>Email</th><th>Days Left</th><th>Trial Ends</th><th>Actions</th></tr></thead>
        <tbody>
          ${trialsList.map(t => {
            const daysLeft = t.trialEnd ? Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000) : 0;
            return `
              <tr>
                <td><strong>${t.restaurantName || '—'}</strong></td>
                <td style="color:var(--t2)">${t.ownerName || '—'}</td>
                <td style="color:var(--t3);font-size:12px">${t.email || '—'}</td>
                <td><span class="badge ${daysLeft <= 3 ? 'badge-red' : 'badge-yellow'}">${daysLeft} days</span></td>
                <td style="color:var(--t3);font-size:12px">${formatDate(t.trialEnd)}</td>
                <td><button class="btn btn-gold btn-sm" onclick="activateUser('${t.uid}')">Activate</button></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderActiveTable(tenants) {
  const activeList = tenants.filter(t => t.status === 'active');
  return `
    <div class="sec-hdr">✅ ${activeList.length} Active Subscriber${activeList.length !== 1 ? 's' : ''}</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Owner</th><th>Email</th><th>Plan</th><th>Paid Until</th></tr></thead>
        <tbody>
          ${activeList.map(t => `
            <tr>
              <td><strong>${t.restaurantName || '—'}</strong></td>
              <td style="color:var(--t2)">${t.ownerName || '—'}</td>
              <td style="color:var(--t3);font-size:12px">${t.email || '—'}</td>
              <td>${getPlanBadge(t.plan)}</td>
              <td style="color:var(--t3);font-size:12px">${formatDate(t.paidUntil)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderExpiredTable(tenants) {
  const expiredList = tenants.filter(t => t.status === 'expired');
  return `
    <div class="sec-hdr">⚠️ ${expiredList.length} Expired Account${expiredList.length !== 1 ? 's' : ''}</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Owner</th><th>Email</th><th>Plan</th><th>Trial Ended</th><th>Actions</th></tr></thead>
        <tbody>
          ${expiredList.map(t => `
            <tr>
              <td><strong>${t.restaurantName || '—'}</strong></td>
              <td style="color:var(--t2)">${t.ownerName || '—'}</td>
              <td style="color:var(--t3);font-size:12px">${t.email || '—'}</td>

// Helper functions
function getPlanBadge(plan) {
  const colors = {
    trial: 'badge-blue',
    monthly: 'badge-gold',
    annual: 'badge-purple',
    lifetime: 'badge-green'
  };
  const labels = {
    trial: 'Trial',
    monthly: 'Monthly',
    annual: 'Annual',
    lifetime: 'Lifetime'
  };
  return `<span class="badge ${colors[plan] || 'badge-blue'}">${labels[plan] || plan}</span>`;
}

function getStatusBadge(status) {
  const colors = {
    trial: 'badge-yellow',
    active: 'badge-green',
    expired: 'badge-red',
    cancelled: 'badge-blue'
  };
  const labels = {
    trial: 'Trial',
    active: 'Active',
    expired: 'Expired',
    cancelled: 'Cancelled'
  };
  return `<span class="badge ${colors[status] || 'badge-blue'}">${labels[status] || status}</span>`;
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  try {
    return new Date(dateStr).toLocaleDateString();
  } catch {
    return '—';
  }
}

// Actions
window.setTab = function(tab) {
  activeTab = tab;
  renderDashboard();
};

  if (!user) return;
  
  document.getElementById('app').insertAdjacentHTML('beforeend', `
    <div class="overlay" id="user-modal" onclick="if(event.target.id==='user-modal')closeModal()">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
          <div>

            <div style="font-size:11px;color:var(--t3);margin-top:3px">UID: ${user.uid}</div>
          </div>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()"><i class="fa fa-times"></i></button>

          <tr><td style="padding:8px 0;color:var(--t3);width:120px">Owner:</td><td style="padding:8px 0;color:var(--t1)">${user.ownerName || '—'}</td></tr>
          <tr><td style="padding:8px 0;color:var(--t3)">Email:</td><td style="padding:8px 0;color:var(--t1)">${user.email || '—'}</td></tr>

          <tr><td style="padding:8px 0;color:var(--t3)">Joined:</td><td style="padding:8px 0;color:var(--t1)">${formatDate(user.createdAt)}</td></tr>

window.activateUser = async function(uid) {
  if (!confirm('Activate this account?')) return;
  const paidUntil = new Date();
  paidUntil.setMonth(paidUntil.getMonth() + 1);
  await db.collection('tenants').doc(uid).update({
    status: 'active',
    plan: 'monthly',
    paidUntil: paidUntil.toISOString()
  });
  await loadDashboard();
  alert('✅ Account activated!');
};

window.expireUser = async function(uid) {
  if (!confirm('Mark this account as expired?')) return;
  await db.collection('tenants').doc(uid).update({ status: 'expired' });
  await loadDashboard();
  alert('⚠️ Account marked as expired');
};

window.sendReminder = function(email, name) {
  window.open(`mailto:${email}?subject=Your Ordo POS Trial is Ending&body=Dear ${name || 'Valued Customer'},\n\nYour free trial is ending soon. Upgrade to continue using Ordo POS.\n\nBest regards,\nOrdo Team`);
};

window.closeModal = function() {
  document.getElementById('user-modal')?.remove();
};

// Download functions
window.downloadApp = function() {
  // Create a download link for the app.html file
  const link = document.createElement('a');
  link.href = 'app.html';
  link.download = 'ordo_pos.html';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  alert('Download started! Save the file to your device.');
};

window.downloadPWA = function() {
  // Create a ZIP-like structure (simplified - just download manifest and app)
  const files = {
    'app.html': 'The main POS application',
    'manifest.json': `{
  "name": "Ordo POS",
  "short_name": "Ordo",
  "description": "Restaurant Point of Sale System",
  "start_url": "./app.html",
  "scope": ".",
  "display": "standalone",
  "theme_color": "#0d0d14",
  "background_color": "#0d0d14",
  "orientation": "portrait",
  "icons": [
    {
      "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23c9a84c'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='%230a0a0f'%3E🍽️%3C/text%3E%3C/svg%3E",
      "sizes": "any",
      "type": "image/svg+xml"
    }
  ]
}`
  };
  
  // Create a text file with instructions
  const instructions = `# Ordo POS Installation

1. Save app.html to your device
2. Create manifest.json with the content above
3. Open app.html in Chrome/Safari
4. For offline PWA: Visit the URL once while online, then it works offline

## For iOS (iPad/iPhone):
- Open in Safari
- Tap Share → Add to Home Screen

## For Android:
- Open in Chrome
- Tap Menu → Install App

## For Windows/Mac:
- Open in any browser
- Works offline after first load
`;
  
  const blob = new Blob([instructions], {type: 'text/plain'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'ordo_install_instructions.txt';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
  
  alert('Installation instructions downloaded. Save app.html separately from your server.');
};

window.copyAppLink = function() {
  const url = window.location.href.replace('admin_dashboard.html', 'app.html');
  navigator.clipboard.writeText(url).then(() => {
    alert('App link copied: ' + url);
  }).catch(() => {
    prompt('Copy this URL:', url);
  });
};

};
