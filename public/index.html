<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0d0d14"/>
<title>Ordo POS</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- Firebase (loaded only when cloud sync is configured) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0d0d14;--surface:#13131f;--card:#1a1a2e;--elevated:#1f1f35;
  --border:rgba(255,255,255,0.07);
  --primary:#fbbf24;--primary-dim:rgba(251,191,36,0.12);--primary-dark:#d97706;
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --purple:#8b5cf6;--orange:#f97316;
  --t1:#f1f1f8;--t2:#9898b0;--t3:#5a5a72;
  --r:14px;--rs:8px;--rl:20px;
  --nav:60px;--bot:62px;
}
/* ======================================================
   PAYMENT SCREEN RESPONSIVE FIXES
   ====================================================== */

/* Payment screen - desktop default */
.payment-screen {
  display: flex;
  height: 100%;
  overflow: hidden;
}

/* Left panel - table list */
.payment-left {
  width: 280px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--surface);
}

/* Right panel - payment form */
.payment-right {
  flex: 1;
  overflow: auto;
  padding: 16px;
  min-width: 0;
}

/* Payment card container */
.payment-card {
  max-width: 540px;
  margin: 0 auto;
}

/* Table item styles */
.table-item {
  transition: all 0.15s ease;
  cursor: pointer;
}

.table-item:hover {
  background: var(--primary-dim);
}

.table-item.active {
  background: var(--primary-dim);
  border-left: 3px solid var(--primary);
}

.table-num {
  font-weight: 700;
  font-size: 15px;
}

.order-amount {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
}

.multi-order-badge {
  background: var(--purple);
  color: white;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  display: inline-block;
  margin-top: 4px;
}

/* Payment tabs (multi-order) */
.payment-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  padding: 8px 10px;
  background: var(--elevated);
  border-radius: 10px;
  overflow-x: auto;
  flex-wrap: nowrap;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}

.payment-tabs .chip {
  flex-shrink: 0;
  white-space: nowrap;
}

/* Discount buttons container */
.discount-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Payment item row */
.payment-item-row {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

/* Scroll area */
.payment-scroll {
  overflow-y: auto;
  flex: 1;
}

/* ======================================================
   TABLET (600px - 1024px)
   ====================================================== */
@media (min-width: 600px) and (max-width: 1024px) {
  .payment-left {
    width: 240px;
  }
  
  .payment-right {
    padding: 12px;
  }
  
  .payment-card {
    max-width: 480px;
  }
  
  .table-item {
    padding: 10px 12px;
  }
  
  .table-num {
    font-size: 14px;
  }
  
  .payment-right .btn-lg {
    padding: 12px 18px;
    font-size: 14px;
  }
}

/* ======================================================
   MOBILE (≤599px)
   ====================================================== */
@media (max-width: 599px) {
  /* Stack layout vertically */
  .payment-screen {
    flex-direction: column !important;
  }
  
  /* Left panel becomes top panel */
  .payment-left {
    width: 100% !important;
    border-right: none !important;
    border-bottom: 1px solid var(--border) !important;
    max-height: 200px;
    flex-shrink: 0;
  }
  
  /* Right panel scrolls */
  .payment-right {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  
  /* Payment card full width */
  .payment-card {
    max-width: 100%;
    margin: 0;
  }
  
  /* Make touch targets larger */
  .table-item {
    padding: 12px 14px;
  }
  
  /* Bigger buttons for mobile */
  .payment-right .btn-lg {
    padding: 14px 20px;
    font-size: 15px;
  }
  
  /* Discount buttons - wrap nicely */
  .discount-buttons {
    gap: 8px;
  }
  
  .discount-buttons .chip {
    padding: 8px 14px;
  }
  
  /* Payment item row */
  .payment-item-row {
    padding: 8px 0;
    font-size: 13px;
  }
}

/* ======================================================
   LANDSCAPE MOBILE (short height)
   ====================================================== */
@media (max-width: 899px) and (max-height: 500px) {
  .payment-left {
    width: 200px !important;
    max-height: none !important;
  }
  
  .payment-screen {
    flex-direction: row !important;
  }
  
  .payment-right {
    padding: 8px;
  }
  
  .payment-card {
    max-width: 380px;
  }
  
  .table-item {
    padding: 6px 10px;
  }
  
  .payment-right .btn-lg {
    padding: 8px 12px;
    font-size: 13px;
  }
}

/* ======================================================
   SMALL PHONES (≤380px)
   ====================================================== */
@media (max-width: 380px) {
  .payment-left {
    max-height: 160px;
  }
  
  .payment-right {
    padding: 8px;
  }
  
  /* Two column discount buttons */
  .discount-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  
  .discount-buttons .chip {
    justify-content: center;
    width: 100%;
  }
  
  .payment-item-row {
    font-size: 12px;
  }
  
  .payment-right .btn-lg {
    padding: 12px 16px;
    font-size: 14px;
  }
  
  /* Multi-order tabs smaller */
  .payment-tabs {
    gap: 4px;
    padding: 6px 8px;
  }
  
  .payment-tabs .chip {
    font-size: 10px;
    padding: 5px 10px;
  }
}

/* ======================================================
   DESKTOP LARGE (>1200px)
   ====================================================== */
@media (min-width: 1200px) {
  .payment-left {
    width: 300px;
  }
  
  .payment-card {
    max-width: 600px;
  }
  
  .table-num {
    font-size: 16px;
  }
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;height:-webkit-fill-available;}
body{
  font-family:'Sora','Cairo',sans-serif;
  background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  min-height:-webkit-fill-available;
  min-height:100dvh;
  overflow:hidden;
  overscroll-behavior:none;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
body[dir=rtl]{font-family:'Cairo','Sora',sans-serif;}
#root{
  /* dvh = dynamic viewport height — shrinks when system nav bar appears */
  height:100vh;
  height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* --- BUTTONS --- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#0d0d14;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(251,191,36,.4);}
.btn-primary:disabled,.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.btn-success:hover{background:var(--green);color:#fff;}
.btn-warning{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(245,158,11,.25);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-lg{padding:13px 26px;font-size:15px;border-radius:var(--r);}
.btn-icon{padding:0;width:34px;height:34px;justify-content:center;border-radius:var(--rs);}
.btn-block{width:100%;justify-content:center;}

/* --- FORMS --- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.input{width:100%;padding:10px 13px;background:var(--elevated);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-family:inherit;font-size:14px;outline:none;transition:border .2s;}
/* iOS fix: minimum 16px to prevent auto-zoom on tap */
@supports(-webkit-overflow-scrolling:touch){.input{font-size:16px;}}
.input:focus{border-color:var(--primary);}
select.input>option{background:var(--card);}
textarea.input{resize:none;}
.form-g{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;}
.divider{height:1px;background:var(--border);margin:14px 0;}

/* --- BADGES --- */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-purple{background:rgba(139,92,246,.12);color:var(--purple);}
.badge-orange{background:rgba(249,115,22,.12);color:var(--orange);}

/* --- CHIPS --- */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--t2);background:transparent;transition:all .15s;}
.chip.active{background:var(--primary);color:#0d0d14;border-color:var(--primary);}

/* --- MODAL --- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:14px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:22px;width:100%;max-width:480px;max-height:94vh;overflow-y:auto;}
.modal-lg{max-width:680px;}

/* --- TOAST --- */
.toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
[dir=rtl] .toast-wrap{right:auto;left:14px;}
.toast{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;display:flex;align-items:center;gap:10px;animation:slideUp .3s ease;}

/* --- NAVIGATION --- */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:var(--nav);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-logo{font-size:14px;font-weight:800;background:linear-gradient(135deg,var(--primary),#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;background:var(--card);border-radius:var(--rs);padding:3px;overflow-x:auto;}
.nav-tab{padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px;white-space:nowrap;border:none;background:none;transition:all .18s;}
.nav-tab.active{background:var(--primary);color:#0d0d14;}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bot) + env(safe-area-inset-bottom, 0px));background:var(--surface);border-top:1px solid var(--border);z-index:99;padding-bottom:env(safe-area-inset-bottom, 0px);}
.bot-inner{display:flex;height:100%;align-items:center;justify-content:space-around;}
.bot-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 10px;cursor:pointer;color:var(--t3);font-size:10px;font-weight:600;border:none;background:none;min-width:46px;border-radius:8px;}
.bot-tab.active{color:var(--primary);}
.bot-tab i{font-size:16px;}

/* --- TABLES --- */
.tbl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;}
.tbl-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .2s;text-align:center;position:relative;}
.tbl-card.available{border-color:rgba(16,185,129,.35);}
.tbl-card.ordered{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.04);}
.tbl-card.bill{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04);}
.tbl-card:hover{transform:translateY(-2px);border-color:var(--primary);}
.tbl-num{font-size:17px;font-weight:700;margin-top:5px;}
.sdot{width:9px;height:9px;border-radius:50%;position:absolute;top:10px;right:10px;}
[dir=rtl] .sdot{right:auto;left:10px;}
.available .sdot{background:var(--green);box-shadow:0 0 5px var(--green);}
.ordered .sdot{background:var(--yellow);}
.bill .sdot{background:var(--red);}

/* --- MENU CARDS --- */
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;}
.m-card:hover{border-color:var(--primary);transform:translateY(-2px);}
.m-card.unavailable{opacity:.4;cursor:not-allowed;}
.m-card.incart{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary-dim);}
.m-img{width:100%;height:110px;object-fit:cover;}
.m-emoji{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,#1a1a2e,#0d0d14);}

/* --- ORDER PANEL --- */
.order-panel{display:flex;flex-direction:column;height:100%;background:var(--surface);border-left:1px solid var(--border);}
[dir=rtl] .order-panel{border-left:none;border-right:1px solid var(--border);}

/* --- KITCHEN --- */
.kit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:all .2s;}
.kit-card.rush{border-color:rgba(239,68,68,.6);animation:pulse 2s infinite;}

/* --- STATS --- */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.stat-v{font-size:26px;font-weight:800;margin-top:6px;}
.stat-l{font-size:12px;color:var(--t2);margin-top:3px;}

/* --- TOGGLE --- */
.tog{position:relative;width:42px;height:23px;border-radius:99px;background:var(--elevated);border:1px solid var(--border);cursor:pointer;transition:.2s;flex-shrink:0;}
.tog.on{background:var(--primary);border-color:var(--primary);}
.tog-thumb{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s;pointer-events:none;}
.tog.on .tog-thumb{left:21px;}

/* --- LIGHT MODE GLOBAL THEME --- */
html.light{
  --bg:#f0f0ea;--surface:#ffffff;--card:#e8e8e2;--elevated:#deded8;
  --border:rgba(0,0,0,.09);
  --primary:#d97706;--primary-dim:rgba(217,119,6,.13);--primary-dark:#b45309;
  --red:#dc2626;--red-dim:rgba(220,38,38,.10);
  --green:#059669;--green-dim:rgba(5,150,105,.10);
  --yellow:#d97706;--yellow-dim:rgba(217,119,6,.10);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.10);
  --purple:#7c3aed;--orange:#ea580c;
  --t1:#111827;--t2:#4b5563;--t3:#9ca3af;
}
html.light body{background:var(--bg);color:var(--t1);}
html.light .btn-primary{color:#fff;}
html.light .m-emoji{background:linear-gradient(135deg,#e8e8e2,#deded8)!important;}
html.light select.input>option{background:#fff;}
html.light .nav-bar,html.light .bot-nav{box-shadow:0 1px 8px rgba(0,0,0,.08);}
html.light .modal{box-shadow:0 8px 40px rgba(0,0,0,.15);}
html.light .overlay{background:rgba(0,0,0,.55);}
/* Targeted transitions — avoids janky repaints on scroll */
html.light *{transition:background-color .2s,border-color .18s,color .12s;}
.btn,.chip,.badge,.nav-tab,.bot-tab,.tog,.input{transition:all .18s!important;}
.theme-tog{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--elevated);cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);}
.theme-tog:hover{border-color:var(--primary);color:var(--primary);}


.timer{font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;font-variant-numeric:tabular-nums;}
.t-fresh{background:var(--green-dim);color:var(--green);}
.t-warn{background:var(--yellow-dim);color:var(--yellow);}
.t-hot{background:var(--red-dim);color:var(--red);}

/* --- MISC --- */
.scroll-y{overflow-y:auto;overflow-x:hidden;}
.section-hdr{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.row-between{display:flex;justify-content:space-between;align-items:center;}

/* --- ANIMATIONS --- */
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SAFE AREA INSETS ─── */
/* --extra-bottom is injected by JS below for browser toolbar support */
:root{
  --sab:       env(safe-area-inset-bottom, 0px);
  --sal:       env(safe-area-inset-left,   0px);
  --sar:       env(safe-area-inset-right,  0px);
  --extra-bot: 0px; /* overridden by JS on mobile browsers */
  /* Combined bottom clearance: hardware safe area + browser toolbar */
  --safe-bot:  max(var(--sab), var(--extra-bot));
}

/* Bottom nav */
.bot-nav{
  padding-bottom: var(--safe-bot);
  height: calc(var(--bot) + var(--safe-bot));
}

/* Any fixed bottom action bar */
.fixed-bottom{
  padding-bottom: calc(var(--safe-bot) + 8px) !important;
}

/* Scrollable areas need room for nav + safe area */
.mb-pad{
  padding-bottom: calc(var(--bot) + var(--safe-bot) + 16px) !important;
}

/* Bottom-sheet modals */
.modal{
  padding-bottom: calc(22px + var(--safe-bot));
}

/* Nav bar left/right insets */
.nav-bar{
  padding-left:  calc(14px + var(--sal));
  padding-right: calc(14px + var(--sar));
}

/* ─── GLOBAL TOUCH & PERFORMANCE ─── */
*{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent;}
button,a,[role=button]{touch-action:manipulation;cursor:pointer;}
.scroll-y{-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
input,select,textarea{-webkit-appearance:none;appearance:none;border-radius:var(--rs);}

/* ─── SMOOTH ANIMATIONS ─── */
.btn,.chip,.nav-tab,.bot-tab,.tbl-card,.m-card,.kit-card{will-change:transform;}
.modal{will-change:transform,opacity;}

@media print{.no-print{display:none!important;}body{background:#fff;color:#000;overflow:auto;}#root{height:auto;}}

/* ═══ DESKTOP (>1024px) ═══ */
@media(min-width:1025px){
  :root{--nav:60px;--bot:0px;}
  .nav-tabs{max-width:none;}
  /* Wider cashier left panel on big screens */
  .cashier-left{width:280px!important;}
}

/* ═══ TABLET LANDSCAPE (900px – 1024px) ═══ */
@media(min-width:900px) and (max-width:1024px){
  :root{--nav:56px;--bot:0px;}
  .nav-tab{padding:5px 9px;font-size:11px;}
  .tbl-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
  .tbl-card{padding:10px;}
  .tbl-num{font-size:15px;}
  .stat-v{font-size:22px;}
  .m-img,.m-emoji{height:90px;}

<script type="text/babel">
// ── GLOBAL ERROR HANDLER ──────────────────────────────────────────────────
window.addEventListener('error', function(e){
  var el=document.getElementById('root');
  if(el&&el.children.length===0){
    el.style.cssText='display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0d14;color:#ef4444;font-family:monospace;font-size:13px;padding:20px;text-align:center;';
    el.textContent='App Error: '+(e.message||'Unknown error')+' (line '+(e.lineno||'?')+')';
  }
});
window.addEventListener('unhandledrejection', function(e){
  console.error('Unhandled promise rejection:', e.reason);
});

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('React error:',e,info);}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0d0d14',color:'#ef4444',fontFamily:'monospace',fontSize:'13px',padding:'20px',textAlign:'center',flexDirection:'column',gap:'10px'}},
        React.createElement('div',{style:{fontSize:'32px'}},'⚠️'),
        React.createElement('div',{style:{fontWeight:'bold'}},'Render Error'),
        React.createElement('div',null,this.state.err.message),
        React.createElement('button',{onClick:()=>{localStorage.clear();location.reload();},style:{marginTop:'16px',padding:'8px 16px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',fontFamily:'monospace'}},'Clear Data & Reload')
      );
    }
    return this.props.children;
  }
}

const{useState,useEffect,useCallback,useContext,createContext,useRef,useMemo}=React;

/* ======================================================
   HELPERS
====================================================== */
async function hashPw(pw){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('ORDO2_'+pw));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
// ── Client-namespaced storage ──────────────────────────────────────────────
const getCID=()=>localStorage.getItem('ordo_clientId')||'';
const nsKey=k=>{const c=getCID();return c?c+'::'+k:k;};
const LS={
  g:(k,d=null)=>{try{const v=localStorage.getItem(nsKey(k));return v!=null?JSON.parse(v):d;}catch{return d;}},
  s:(k,v)=>{try{localStorage.setItem(nsKey(k),JSON.stringify(v));}catch{}},
  rm:k=>localStorage.removeItem(nsKey(k))
};
// ── Firebase cloud sync helper ───────────────────────────────────────────────
const FB={
  _db:null, _ref:null,
  init(cfg,cid){
    try{
      if(!cfg||!cfg.apiKey)return false;
      if(!firebase.apps.length)firebase.initializeApp(cfg);
      else firebase.app(); // reuse
      this._db=firebase.firestore();
      this._ref=this._db.collection('ordo_clients').doc(cid);
      this._db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
      return true;
    }catch(e){console.warn('Firebase init failed:',e);return false;}
  },
  async save(col,data){
    if(!this._ref)return;
    try{await this._ref.collection(col).doc('__data__').set({v:data,ts:Date.now()});}
    catch(e){console.warn('FB save failed:',e);}
  },
  async load(col){
    if(!this._ref)return null;
    try{
      const d=await this._ref.collection(col).doc('__data__').get();
      return d.exists?d.data().v:null;
    }catch(e){return null;}
  },
  get ready(){return!!this._ref;}
};

/* ══════════════════════════════════════════════════════════════
   LICENSE ENGINE
══════════════════════════════════════════════════════════════ */
// Split secret to resist trivial grep — joined at runtime
const _S=['ORDO','_LIC','_2K2','5_XK','7Q9Z'];
const LIC_SECRET=_S.join('');

async function _sha256(msg){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
// Encode payload → base64url
function _b64e(str){return btoa(str).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
function _b64d(str){return atob(str.replace(/-/g,'+').replace(/_/g,'/'));}

async function generateLicenseKey({email='',phone='',plan='basic',days=365,forClientId='*'}){
  const payload=JSON.stringify({e:email.toLowerCase().trim(),m:phone.replace(/\s/g,''),p:plan,x:Date.now()+days*864e5,c:forClientId,i:Date.now()});
  const b64=_b64e(payload);
  const sig=(await _sha256(LIC_SECRET+b64)).slice(0,12);
  const raw=(b64+'.'+sig).toUpperCase();
  // Format as groups of 5
  const flat=raw.replace(/\./g,'D').replace(/[^A-Z0-9]/g,'');
  return flat.match(/.{1,5}/g).join('-');
}

async function validateLicenseKey(rawKey){
  try{
    if(!rawKey)return{valid:false,reason:'No license key'};
    const flat=rawKey.replace(/-/g,'').toUpperCase().replace(/D/g,'.');
    const dotIdx=flat.lastIndexOf('.');
    if(dotIdx<0)return{valid:false,reason:'Invalid format'};
    const b64=flat.slice(0,dotIdx).toLowerCase().replace(/\./g,'');
    const keySig=flat.slice(dotIdx+1).toLowerCase();
    const expectedSig=(await _sha256(LIC_SECRET+b64)).slice(0,12);
    if(keySig!==expectedSig)return{valid:false,reason:'Invalid license key — signature mismatch'};
    const payload=JSON.parse(_b64d(b64));
    if(Date.now()>payload.x)return{valid:false,expired:true,payload,reason:'License expired on '+new Date(payload.x).toLocaleDateString()};
    const cid=getCID();
    if(payload.c&&payload.c!=='*'&&payload.c!==cid)return{valid:false,reason:'License is for client "'+payload.c+'" — your ID is "'+cid+'"'};
    return{valid:true,payload,daysLeft:Math.ceil((payload.x-Date.now())/864e5)};
  }catch(e){return{valid:false,reason:'License parse error: '+e.message};}
}

function getLicenseState(){
  const raw=localStorage.getItem('ordo_license_key');
  if(!raw)return null;
  return LS.g('ordo_license_cache');
}

/* ══════════════════════════════════════════════════════════════
   LOGIN LOCKOUT
══════════════════════════════════════════════════════════════ */
const LOCK_KEY=u=>'lockout::'+u;
const LOCK_MAX=5;const LOCK_MINS=15;
function getLockout(username){
  try{
    const v=localStorage.getItem(LOCK_KEY(username));
    if(!v)return null;
    const l=JSON.parse(v);
    if(Date.now()>l.until){localStorage.removeItem(LOCK_KEY(username));return null;}
    return l;
  }catch{return null;}
}
function recordBadAttempt(username){
  const l=getLockout(username)||{attempts:0,until:0};
  l.attempts++;
  if(l.attempts>=LOCK_MAX)l.until=Date.now()+LOCK_MINS*60000;
  localStorage.setItem(LOCK_KEY(username),JSON.stringify(l));
  return l;
}
function clearLockout(username){localStorage.removeItem(LOCK_KEY(username));}

/* ══════════════════════════════════════════════════════════════
   AUDIT LOG
══════════════════════════════════════════════════════════════ */
function writeAudit(action,detail,username){
  try{
    const key=nsKey('audit_log');
    const logs=JSON.parse(localStorage.getItem(key)||'[]');
    logs.unshift({action,detail:detail||'',user:username||'—',at:new Date().toISOString(),id:uid()});
    localStorage.setItem(key,JSON.stringify(logs.slice(0,500)));
  }catch{}
}

/* ======================================================
   KITCHEN TICKET PRINTER
====================================================== */
function printKitchenTicket(order,settings,copies){
  if(!settings.autoPrintKitchen)return;
  const n=Math.max(1,copies||settings.kitchenPrintCopies||1);
  for(let i=0;i<n;i++){
    const w=window.open('','_blank','width=340,height=620,left=99999,top=99999');
    if(!w)return;
    const items=(order.items||[]).map(it=>`
      <tr>
        <td style="font-size:22px;font-weight:900;padding:4px 8px 4px 0;vertical-align:top">${it.qty}×</td>
        <td style="padding:4px 0;vertical-align:top">
          <div style="font-size:15px;font-weight:700">${it.nameAr||it.name}</div>
          ${it.name!==it.nameAr&&it.nameAr?`<div style="font-size:12px;color:#555">${it.name}</div>`:''}
          ${Object.keys(it.selectedMods||{}).length>0?`<div style="font-size:11px;color:#333;margin-top:1px">↳ options applied</div>`:''}
          ${it.itemNote?`<div style="font-size:11px;font-style:italic;margin-top:1px">📝 ${it.itemNote}</div>`:''}
        </td>
      </tr>`).join('');
    w.document.write(`<!DOCTYPE html><html dir="rtl"><head>
      <meta charset="UTF-8"/>
      <title>KT-${order.id.slice(-6)}</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Courier New',monospace;width:280px;padding:10px;background:#fff;color:#000;}
        .dashed{border-top:2px dashed #000;margin:8px 0;}
        .center{text-align:center;}
        .rest{font-size:13px;font-weight:bold;}
        .tbl{font-size:28px;font-weight:900;margin:2px 0;}
        .meta{font-size:11px;color:#444;}
        .rush{background:#000;color:#fff;text-align:center;padding:5px 0;font-size:14px;font-weight:900;letter-spacing:2px;margin:6px 0;}
        table{width:100%;border-collapse:collapse;}
        .note-box{border:2px dashed #000;padding:6px 8px;margin-top:8px;font-size:12px;}
        .footer{text-align:center;font-size:10px;margin-top:8px;}
        @media print{@page{size:80mm auto;margin:0;}body{width:72mm;padding:4mm;}}
      </style>
    </head><body>
      <div class="center">
        <div class="rest">${settings.restaurantName||'Kitchen'}</div>
        <div class="tbl">🪑 ${order.tableNum||order.orderType||'Takeaway'}</div>
        <div class="meta">${new Date(order.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})} &nbsp;|&nbsp; #${order.id.slice(-8)}</div>
        ${order.waiterName?`<div class="meta">Waiter: ${order.waiterName}</div>`:''}
      </div>
      ${order.priority==='rush'?'<div class="rush">⚡ RUSH / عاجل ⚡</div>':''}
      <div class="dashed"></div>
      <table>${items}</table>
      ${order.note?('<div class="note-box">📝 '+order.note+'</div>'):''}
      <div class="dashed"></div>
      <div class="footer">— Kitchen Copy | نسخة المطبخ —</div>
      <script>
        window.onload=function(){
          window.print();
          setTimeout(function(){window.close();},2500);
        };
      <\/script>
    </body></html>`);
    w.document.close();
  }
}

const safeArr=(k,def)=>{try{const v=localStorage.getItem(nsKey(k));if(!v)return def;const p=JSON.parse(v);return Array.isArray(p)?p:def;}catch{return def;}};

function ClientSetupModal({onSave}){
  const[id,setId]=useState('');
  const[err,setErr]=useState('');
  const clean=v=>v.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  const save=()=>{
    const c=clean(id);
    if(c.length<3){setErr('ID must be at least 3 characters (letters, numbers, - or _)');return;}
    onSave(c);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'linear-gradient(135deg,#0d0d14,#1a1a2e)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,padding:20}}>
      <div style={{width:'100%',maxWidth:420,background:'var(--card)',borderRadius:20,padding:28,border:'1px solid var(--border)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>🏪</div>
          <div style={{fontSize:20,fontWeight:800,background:'linear-gradient(135deg,var(--primary),#fb923c)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            Welcome to Ordo POS
          </div>
          <div style={{fontSize:12,color:'var(--t2)',marginTop:6}}>
            Set a unique Client ID for your restaurant. This keeps your data isolated from other clients on the same app.
          </div>
        </div>
        <div style={{background:'var(--elevated)',borderRadius:12,padding:16,marginBottom:16,fontSize:12,color:'var(--t2)'}}>
          <div style={{fontWeight:700,color:'var(--primary)',marginBottom:6}}>📋 What is a Client ID?</div>
          <div style={{lineHeight:1.7}}>
            A short unique slug for your restaurant, e.g. <strong style={{color:'var(--t1)'}}>al-nakheel</strong>, <strong style={{color:'var(--t1)'}}>pizza-hub-medina</strong>, or <strong style={{color:'var(--t1)'}}>cafe123</strong>.
            All your orders, menu, and settings are stored under this ID. If you use cloud sync, this is also your cloud folder name.
          </div>
        </div>
        <div className="form-g">
          <label className="form-lbl">Client ID (letters, numbers, - or _ only)</label>
          <input className="input" value={id} onChange={e=>setId(clean(e.target.value))}
            onKeyDown={e=>e.key==='Enter'&&save()}
            placeholder="e.g. my-restaurant"
            style={{fontSize:15,fontWeight:700,letterSpacing:1}}
          />
          {id&&<div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>Will use: <strong style={{color:'var(--primary)'}}>{clean(id)||'…'}</strong></div>}
        </div>
        {err&&<div style={{color:'var(--red)',fontSize:12,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,marginBottom:10}}>{err}</div>}
        <button className="btn btn-primary btn-block btn-lg" onClick={save} disabled={clean(id).length<3}>
          <i className="fa fa-check"/> Set Client ID &amp; Start
        </button>
        <div style={{marginTop:12,fontSize:11,color:'var(--t3)',textAlign:'center'}}>
          You can change this later in Settings → Data
        </div>
      </div>
    </div>
  );
}

function Provider({children}){
  const[lang,setLangS]=useState(()=>LS.g('lang','en'));
  const[user,setUser]=useState(null);
  const[tables,setTables]=useState(()=>safeArr('tables',DEF_TABLES));
  const[orders,setOrders]=useState(()=>safeArr('orders',[]));
  const[cats,setCats]=useState(()=>safeArr('cats',DEF_CATS));
  const[items,setItems]=useState(()=>safeArr('items',DEF_ITEMS));
  const[staff,setStaff]=useState(()=>safeArr('staff',DEF_STAFF));
  const[settings,setSettingsS]=useState(()=>{try{const s=LS.g('settings');return(s&&typeof s==='object')?Object.assign({},DEF_SETTINGS,s):DEF_SETTINGS;}catch{return DEF_SETTINGS;}});
  const[toasts,setToasts]=useState([]);
  const[pwaEvt,setPwaEvt]=useState(null);
  const[ready,setReady]=useState(false);
  const[theme,setThemeS]=useState(()=>LS.g('theme','dark'));
  const[clientId,setClientIdS]=useState(()=>localStorage.getItem('ordo_clientId')||'');
  const[fbReady,setFbReady]=useState(false);
  const[showClientSetup,setShowClientSetup]=useState(false);

  // Auto-initialise clientId on first run — no welcome dialog needed
  useEffect(()=>{
    if(!localStorage.getItem('ordo_clientId')){
      localStorage.setItem('ordo_clientId','ordo-main');
      setClientIdS('ordo-main');
    }
  },[]);
  const[license,setLicense]=useState(null); // {valid,payload,daysLeft,reason}
  const[licenseChecked,setLicenseChecked]=useState(false);
  const[inactiveWarning,setInactiveWarning]=useState(false);
  const _inactiveTimer=useRef(null);
  const _warnTimer=useRef(null);

  // Apply theme class to html element
  useEffect(()=>{
    document.documentElement.classList.toggle('light',theme==='light');
    LS.s('theme',theme);
  },[theme]);
  const toggleTheme=useCallback(()=>setThemeS(t=>t==='dark'?'light':'dark'),[]);

  // ── License validation ─────────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      const raw=localStorage.getItem('ordo_license_key');
      if(!raw){
        // Check trial period
        let trial=LS.g('trial_start');
        if(!trial){trial=Date.now();LS.s('trial_start',trial);}
        const trialDays=30;
        const daysLeft=Math.ceil((trial+trialDays*864e5-Date.now())/864e5);
        if(daysLeft>0){
          setLicense({valid:true,trial:true,daysLeft,reason:null});
        }else{
          setLicense({valid:false,trial:true,expired:true,reason:'Trial expired '+Math.abs(daysLeft)+' days ago'});
        }
      }else{
        const result=await validateLicenseKey(raw);
        if(result.valid){
          LS.s('ordo_license_cache',result);
          writeAudit('LICENSE_OK','plan='+result.payload.p+' daysLeft='+result.daysLeft,'system');
        }else{
          writeAudit('LICENSE_FAIL',result.reason,'system');
        }
        setLicense(result);
      }
      setLicenseChecked(true);
    })();
  },[]);

  // ── Inactivity auto-logout ───────────────────────────────────────────────
  const resetInactivity=useCallback(()=>{
    if(!settings.sessionTimeout)return;
    const ms=(settings.sessionTimeout||480)*60000;
    const warnMs=ms-60000; // warn 1 min before
    clearTimeout(_inactiveTimer.current);
    clearTimeout(_warnTimer.current);
    setInactiveWarning(false);
    if(warnMs>0){
      _warnTimer.current=setTimeout(()=>setInactiveWarning(true),warnMs);
    }
    _inactiveTimer.current=setTimeout(()=>{
      setInactiveWarning(false);
      LS.rm('session');setUser(null);
      writeAudit('AUTO_LOGOUT','Session timeout','system');
    },ms);
  },[settings.sessionTimeout]);

  useEffect(()=>{
    if(!user)return;
    resetInactivity();
    const events=['mousedown','keydown','touchstart','scroll'];
    events.forEach(e=>window.addEventListener(e,resetInactivity,{passive:true}));
    return()=>{
      events.forEach(e=>window.removeEventListener(e,resetInactivity));
      clearTimeout(_inactiveTimer.current);
      clearTimeout(_warnTimer.current);
    };
  },[user,resetInactivity]);

  // ── Set client ID and reinitialise storage namespace
  const setClientId=useCallback((id)=>{
    const clean=id.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
    if(!clean)return false;
    localStorage.setItem('ordo_clientId',clean);
    setClientIdS(clean);
    setShowClientSetup(false);
    window.location.reload(); // reload so all state re-reads from correct namespace
    return true;
  },[]);

  // Firebase init whenever firebaseApiKey/projectId changes
  useEffect(()=>{
    const cfg=LS.g('settings');
    if(cfg&&cfg.firebaseApiKey&&cfg.firebaseProjectId&&getCID()){
      const ok=FB.init({
        apiKey:cfg.firebaseApiKey,
        projectId:cfg.firebaseProjectId,
        appId:cfg.firebaseAppId||''
      },getCID());
      setFbReady(ok);
      if(ok){
        // Try to load latest data from cloud on startup
        Promise.all([
          FB.load('orders'),FB.load('items'),FB.load('cats'),
          FB.load('tables'),FB.load('settings')
        ]).then(([fo,fi,fc,ft,fs])=>{
          if(fo&&Array.isArray(fo))setOrders(fo);
          if(fi&&Array.isArray(fi))setItems(fi);
          if(fc&&Array.isArray(fc))setCats(fc);
          if(ft&&Array.isArray(ft))setTables(ft);
          if(fs&&typeof fs==='object')setSettingsS(s=>Object.assign({},s,fs));
        }).catch(()=>{});
      }
    }
  },[]);

  // Hash default passwords on first boot — force rehash if upgrading from old prefix
  useEffect(()=>{
    (async()=>{
      const saved=LS.g('staff');
      const ver=LS.g('staffVer');
      if(!saved||!ver||ver!=='ordo2'||saved.some(s=>!s.hash)){
        const base=saved||DEF_STAFF;
        const hashed=await Promise.all(base.map(async s=>({
          ...s,
          hash:await hashPw(DEF_PASSES[s.username]||s.username+'123')
        })));
        setStaff(hashed);LS.s('staff',hashed);LS.s('staffVer','ordo2');
      }
      setReady(true);
    })();
  },[]);

  // Restore session
  useEffect(()=>{
    if(!ready)return;
    const sess=LS.g('session');
    if(sess&&sess.uid&&sess.exp>Date.now()){
      const all=LS.g('staff')||DEF_STAFF;
      const u=all.find(s=>s.id===sess.uid&&s.active);
      if(u)setUser(u);
    }
  },[ready]);

  // PWA
  useEffect(()=>{
    const h=e=>{e.preventDefault();setPwaEvt(e);};
    window.addEventListener('beforeinstallprompt',h);
    return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);

  // Persist
  useEffect(()=>{LS.s('tables',tables);if(FB.ready)FB.save('tables',tables);},[tables]);
  useEffect(()=>{LS.s('orders',orders);if(FB.ready)FB.save('orders',orders);},[orders]);
  useEffect(()=>{LS.s('cats',cats);if(FB.ready)FB.save('cats',cats);},[cats]);
  useEffect(()=>{LS.s('items',items);if(FB.ready)FB.save('items',items);},[items]);
  useEffect(()=>{LS.s('staff',staff);},[staff]);
  useEffect(()=>{LS.s('settings',settings);if(FB.ready)FB.save('settings',settings);},[settings]);
  useEffect(()=>{
    LS.s('lang',lang);
    document.documentElement.lang=lang;
    document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  },[lang]);

  const t=useCallback(k=>(TR[lang]||TR.en)[k]||k,[lang]);
  const setLang=l=>setLangS(l);
  const setSettings=upd=>setSettingsS(p=>({...p,...(typeof upd==='function'?upd(p):upd)}));

  const toast=useCallback((msg,type='info',dur=3500)=>{
    const id=uid();
    setToasts(p=>[...p.slice(-4),{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),dur);
  },[]);

  const beep=useCallback(()=>{
    if(!settings.kitchenSound)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [880,660].forEach((freq,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=freq;
        const t0=ctx.currentTime+i*.3;
        g.gain.setValueAtTime(.25,t0);
        g.gain.exponentialRampToValueAtTime(.001,t0+.4);
        o.start(t0);o.stop(t0+.4);
      });
    }catch{}
  },[settings.kitchenSound]);

  const login=useCallback(async(username,pw)=>{
    const uname=username.trim().toLowerCase();
    // Check lockout
    const lock=getLockout(uname);
    if(lock&&lock.until>Date.now()){
      const mins=Math.ceil((lock.until-Date.now())/60000);
      return{locked:true,mins};
    }
    const allStaff=LS.g('staff')||staff;
    const s=allStaff.find(s=>s.username===uname&&s.active);
    if(!s){recordBadAttempt(uname);writeAudit('LOGIN_FAIL','Unknown user: '+uname,'—');return false;}
    const h=await hashPw(pw);
    if(h!==s.hash){
      const l=recordBadAttempt(uname);
      writeAudit('LOGIN_FAIL','Bad password for '+uname+' (attempt '+l.attempts+')','—');
      if(l.attempts>=LOCK_MAX)return{locked:true,mins:LOCK_MINS};
      return{failed:true,attemptsLeft:LOCK_MAX-l.attempts};
    }
    clearLockout(uname);
    const exp=Date.now()+(settings.sessionTimeout||480)*60000;
    LS.s('session',{uid:s.id,exp});
    writeAudit('LOGIN_OK','Role: '+s.role,uname);
    setUser(s);return{ok:true};
  },[staff,settings.sessionTimeout]);

  const logout=useCallback(()=>{
    if(user)writeAudit('LOGOUT','Manual logout',user.username);
    LS.rm('session');setUser(null);
  },[user]);

  // Calc order total
  const calcTotal=useCallback((order)=>{
    if(!order)return{sub:0,disc:0,after:0,vat:0,tip:0,total:0};
    const vr=(settings.vatRate||15)/100;
    const sub=(order.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    const disc=sub*(order.discount||0)/100;
    const after=sub-disc;
    const vatAmt=after*vr;
    const tip=order.tip||0;
    return{sub,disc,after,vat:vatAmt,tip,total:after+vatAmt+tip};
  },[settings.vatRate]);

  const createOrder=useCallback((tableId,tableNum,itemsList,waiterName,note,orderType)=>{
    const id=`ORD-${Date.now()}`;
    const order={id,tableId,tableNum,items:itemsList,waiterName:waiterName||'',
      note:note||'',status:'new',discount:0,tip:0,paymentMethod:'cash',
      orderType:orderType||'dine-in',priority:'normal',
      createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    setOrders(p=>[...p,order]);
    if(tableId)setTables(p=>p.map(tb=>tb.id===tableId?{...tb,status:'ordered',orderId:id}:tb));
    writeAudit('ORDER_NEW','Table:'+tableNum+' Items:'+itemsList.length,user?.username);
    toast(t('orderSent'),'success');beep();
    setTimeout(()=>printKitchenTicket(order,settings),100);
    return id;
  },[t,toast,beep,settings,user]);

  const addItemsToOrder=useCallback((orderId,newItems,note)=>{
    setOrders(p=>p.map(o=>{
      if(o.id!==orderId)return o;
      const merged=[...(o.items||[])];
      newItems.forEach(ni=>{
        const key=ni.id+'_'+(ni.selectedMods?JSON.stringify(ni.selectedMods):'');
        const idx=merged.findIndex(m=>m.id+'_'+(m.selectedMods?JSON.stringify(m.selectedMods):'')===key);
        if(idx>=0){merged[idx]={...merged[idx],qty:merged[idx].qty+ni.qty};}else{merged.push({...ni});}
      });
      const updated={...o,items:merged,note:note||o.note,updatedAt:new Date().toISOString(),status:'new'};
      setTimeout(()=>printKitchenTicket({...updated,items:newItems},settings),100);
      return updated;
    }));
    toast('Items added to order','success');beep();
  },[toast,beep,settings]);

  const updateOrder=useCallback((orderId,updates)=>{
    setOrders(p=>p.map(o=>{
      if(o.id!==orderId)return o;
      const upd={...o,...updates,updatedAt:new Date().toISOString()};
      if(updates.status==='paid'){
        setTables(tt=>tt.map(tb=>tb.id===o.tableId?{...tb,status:'available',orderId:null}:tb));
        writeAudit('ORDER_PAID','Order:'+orderId+' Method:'+(updates.paymentMethod||'?'),user?.username);
      }
      if(updates.status==='voided'){
        setTables(tt=>tt.map(tb=>tb.id===o.tableId?{...tb,status:'available',orderId:null}:tb));
        writeAudit('ORDER_VOIDED','Order:'+orderId+' Reason:'+(updates.voidReason||'none'),user?.username);
      }
      if(updates.status==='billed'){
        setTables(tt=>tt.map(tb=>tb.id===o.tableId?{...tb,status:'bill'}:tb));
      }
      return upd;
    }));
  },[user]);

  const _confirmResolve=React.useRef(null);
  const[_confirmState,_setConfirmState]=useState({show:false,msg:''});
  const confirm=useCallback(function(msg){return new Promise(function(res){_confirmResolve.current=res;_setConfirmState({show:true,msg:msg});});},[]); 
  const _resolveConfirm=useCallback(function(val){if(_confirmResolve.current){_confirmResolve.current(val);_confirmResolve.current=null;}_setConfirmState({show:false,msg:''});},[]); 

  const pwaInstall=useCallback(async()=>{
    if(!pwaEvt)return;
    pwaEvt.prompt();
    const{outcome}=await pwaEvt.userChoice;
    if(outcome==='accepted')setPwaEvt(null);
  },[pwaEvt]);

  return(
    <Ctx.Provider value={{
      lang,t,setLang,user,setUser,login,logout,ready,
      tables,setTables,orders,setOrders,cats,setCats,items,setItems,
      staff,setStaff,settings,setSettings,
      toasts,toast,createOrder,addItemsToOrder,updateOrder,calcTotal,beep,confirm,
      pwaEvt,pwaInstall,theme,toggleTheme,
      clientId,setClientId,fbReady,showClientSetup,setShowClientSetup,
      license,licenseChecked,inactiveWarning,setInactiveWarning,resetInactivity,writeAudit
    }}>
      {children}
      <ToastContainer/>
      {showClientSetup&&<ClientSetupModal onSave={setClientId}/>}
      {inactiveWarning&&user&&(
        <div className="overlay" style={{zIndex:9997}}>
          <div className="modal" style={{maxWidth:340,textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>⏱️</div>
            <h3 style={{marginBottom:8}}>Session Expiring</h3>
            <p style={{fontSize:13,color:'var(--t2)',marginBottom:20}}>You will be logged out in <strong style={{color:'var(--yellow)'}}>60 seconds</strong> due to inactivity.</p>
            <button className="btn btn-primary btn-block btn-lg" onClick={()=>{setInactiveWarning(false);resetInactivity();}}>
              <i className="fa fa-check"/> Stay Logged In
            </button>
          </div>
        </div>
      )}
      {_confirmState.show&&(
        <div className="overlay" style={{zIndex:9998}} onClick={function(e){if(e.target===e.currentTarget)_resolveConfirm(false);}}>
          <div className="modal" style={{maxWidth:360}}>
            <p style={{fontSize:14,marginBottom:20}}>{_confirmState.msg}</p>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={function(){_resolveConfirm(false);}}>Cancel</button>
              <button className="btn btn-danger" onClick={function(){_resolveConfirm(true);}}>Confirm</button>
            </div>
          </div>
        </div>
      )}
    </Ctx.Provider>
  );
}

function KitTimer({at}){
  const[min,setMin]=useState(0);
  useEffect(()=>{
    const upd=()=>setMin(Math.floor((Date.now()-new Date(at).getTime())/60000));
    upd();const id=setInterval(upd,30000);return()=>clearInterval(id);
  },[at]);
  const cls=min<10?'t-fresh':min<20?'t-warn':'t-hot';
  return<span className={`timer ${cls}`}>⏱ {min}m</span>;
}

   LOGIN SCREEN
====================================================== */
function LoginScreen(){
  const{t,login,lang,setLang,pwaEvt,pwaInstall,ready,theme,toggleTheme,license}=useApp();
  const[u,setU]=useState('');const[p,setP]=useState('');
  const[err,setErr]=useState('');const[loading,setLoad]=useState(false);
  const[lockMins,setLockMins]=useState(0);

  // Update lockout countdown
  useEffect(()=>{
    if(!lockMins)return;
    const t=setInterval(()=>{
      const l=getLockout(u.trim().toLowerCase());
      if(!l)setLockMins(0);
      else setLockMins(Math.ceil((l.until-Date.now())/60000));
    },5000);
    return()=>clearInterval(t);
  },[lockMins,u]);

  const go=async()=>{
    if(!u.trim()||!p.trim()){setErr('Please enter username and password');return;}
    // Pre-check lockout
    const lock=getLockout(u.trim().toLowerCase());
    if(lock&&lock.until>Date.now()){setLockMins(Math.ceil((lock.until-Date.now())/60000));return;}
    setLoad(true);setErr('');
    const result=await login(u,p);
    if(!result)setErr(lang==='ar'?'اسم المستخدم أو كلمة المرور غير صحيحة':'Invalid username or password');
    else if(result.locked){setLockMins(result.mins);setErr('');}
    else if(result.failed){setErr('Wrong password. '+result.attemptsLeft+' attempt'+(result.attemptsLeft===1?'':'s')+' remaining before lockout.');}
    setLoad(false);
  };
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100dvh',padding:20,background:'var(--bg)'}}>
      {/* top-right theme toggle */}
      <div style={{position:'absolute',top:14,right:14,display:'flex',gap:6}}>
        <button className="theme-tog" onClick={toggleTheme}>
          {theme==='dark'?<><i className="fa fa-sun"/> Day</>:<><i className="fa fa-moon"/> Night</>}
        </button>
        <button className="btn btn-ghost btn-sm" onClick={()=>setLang(lang==='ar'?'en':'ar')}>{lang==='ar'?'EN':'ع'}</button>
      </div>
      <div style={{width:'100%',maxWidth:350}}>
        <div style={{textAlign:'center',marginBottom:26}}>
          <div style={{fontSize:52,fontWeight:900,letterSpacing:'-2px',background:'linear-gradient(135deg,var(--primary),#fb923c)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:4}}>
            Ordo
          </div>
          <div style={{fontSize:12,color:'var(--t2)',fontWeight:600,letterSpacing:'3px',textTransform:'uppercase',marginBottom:2}}>Point of Sale</div>
          <div style={{fontSize:10,color:'var(--t3)'}}>Restaurant Management System · v2.0</div>
        </div>
        <div className="card" style={{padding:22}}>
          {!ready?(
            <div style={{textAlign:'center',padding:24,color:'var(--t2)',fontSize:13}}>
              <i className="fa fa-spinner" style={{animation:'spin 1s linear infinite',fontSize:20,display:'block',marginBottom:8}}/>
              Initializing…
            </div>
          ):(
            <>
              <div className="form-g">
                <label className="form-lbl">{t('username')}</label>
                <input className="input" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="admin" autoComplete="username"/>
              </div>
              <div className="form-g">
                <label className="form-lbl">{t('password')}</label>
                <input className="input" type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••••••" autoComplete="current-password"/>
              </div>
              {lockMins>0&&(
                <div style={{color:'var(--red)',fontSize:12,marginBottom:8,padding:'10px',background:'var(--red-dim)',borderRadius:6,textAlign:'center'}}>
                  <i className="fa fa-lock"/> Account locked — try again in <strong>{lockMins} minute{lockMins===1?'':'s'}</strong>
                </div>
              )}
              {!lockMins&&err&&<div style={{color:'var(--red)',fontSize:12,marginBottom:8,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6}}>{err}</div>}
              <button className="btn btn-primary btn-block btn-lg" onClick={go} disabled={loading||!u||!p||lockMins>0}>
                {loading?<i className="fa fa-spinner" style={{animation:'spin 1s linear infinite'}}/>:<i className="fa fa-sign-in-alt"/>}
                {' '}{t('login')}
              </button>
            </>
          )}
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:12}}>
          {pwaEvt&&<button className="btn btn-ghost btn-sm" onClick={pwaInstall}><i className="fa fa-download"/> {t('installApp')}</button>}
        </div>
        {license&&license.trial&&license.valid&&(
          <div style={{marginTop:10,padding:'8px 12px',background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,fontSize:11,color:'var(--yellow)',textAlign:'center'}}>
            ⏳ Trial — <strong>{license.daysLeft} day{license.daysLeft===1?'':'s'} remaining</strong>
            {' · Contact your reseller to activate a full license.'}
          </div>
        )}
        <div style={{marginTop:14,padding:10,background:'var(--elevated)',borderRadius:8,fontSize:10,color:'var(--t3)',textAlign:'center',lineHeight:1.8}}>
          {t('loginHint')}:<br/>admin / admin123 · cashier / cash123<br/>waiter / wait123 · kitchen / kitchen123
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   DASHBOARD
====================================================== */
function Dashboard(){
  const{t,orders,tables,settings,lang}=useApp();
  const revRef=useRef();const topRef=useRef();
  const revChart=useRef();const topChart=useRef();
  const vr=(settings.vatRate||15)/100;
  const cur=settings.currency||'SAR';

  const paid=useMemo(()=>orders.filter(o=>o.status==='paid'),[orders]);
  const todayPaid=useMemo(()=>paid.filter(o=>new Date(o.createdAt).toDateString()===today()),[paid]);

  const calcRev=o=>{
    const sub=(o.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    return(sub*(1-(o.discount||0)/100))*(1+vr)+(o.tip||0);
  };

  const todayRev=useMemo(()=>todayPaid.reduce((s,o)=>s+calcRev(o),0),[todayPaid]);
  const totalRev=useMemo(()=>paid.reduce((s,o)=>s+calcRev(o),0),[paid]);
  const active=tables.filter(t=>t.status!=='available').length;
  const pending=orders.filter(o=>['new','in-progress'].includes(o.status)).length;

  const last7=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toDateString();
    const rev=paid.filter(o=>new Date(o.createdAt).toDateString()===ds).reduce((s,o)=>s+calcRev(o),0);
    return{label:d.toLocaleDateString('en',{weekday:'short'}),rev};
  }),[paid]);

  const topItems=useMemo(()=>{
    const cnt={};
    paid.forEach(o=>(o.items||[]).forEach(i=>{const n=lang==='ar'?i.nameAr:i.name;cnt[n]=(cnt[n]||0)+i.qty;}));
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[paid,lang]);

  useEffect(()=>{
    if(!revRef.current)return;
    if(revChart.current)revChart.current.destroy();
    revChart.current=new Chart(revRef.current,{
      type:'bar',
      data:{labels:last7.map(d=>d.label),datasets:[{data:last7.map(d=>Math.round(d.rev)),backgroundColor:'rgba(251,191,36,.45)',borderColor:'#fbbf24',borderWidth:1.5,borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'#9898b0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#9898b0',font:{size:11}},grid:{display:false}}}}
    });
    return()=>{revChart.current?.destroy();};
  },[last7]);

  useEffect(()=>{
    if(!topRef.current||!topItems.length)return;
    if(topChart.current)topChart.current.destroy();
    topChart.current=new Chart(topRef.current,{
      type:'doughnut',
      data:{labels:topItems.map(([n])=>n),datasets:[{data:topItems.map(([,v])=>v),backgroundColor:['#fbbf24','#f97316','#8b5cf6','#3b82f6','#10b981'],borderWidth:0,hoverBorderWidth:2,hoverBorderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9898b0',boxWidth:10,font:{size:11}}}}}
    });
    return()=>{topChart.current?.destroy();};
  },[topItems]);

  return(
    <div className="scroll-y mb-pad" style={{padding:16,flex:1}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(148px,1fr))',gap:10,marginBottom:14}}>
        {[
          {icon:'💰',val:`${cur} ${fmtInt(todayRev)}`,lbl:t('revenueToday'),col:'var(--primary)'},
          {icon:'📋',val:todayPaid.length,lbl:t('ordersToday')},
          {icon:'🪑',val:active,lbl:t('activeTables')},
          {icon:'⏳',val:pending,lbl:t('pendingOrders'),col:pending>0?'var(--yellow)':undefined}
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div style={{fontSize:24}}>{s.icon}</div>
            <div className="stat-v" style={{color:s.col}}>{s.val}</div>
            <div className="stat-l">{s.lbl}</div>
          </div>
        ))}
      </div>
      <div className="dash-charts" style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) minmax(0,2fr)',gap:12,marginBottom:12}}>
        <div className="card">
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>🏆 {t('topItems')}</div>
          {topItems.length?<div style={{height:160}}><canvas ref={topRef}/></div>:<div style={{textAlign:'center',padding:24,color:'var(--t3)',fontSize:12}}>{t('noData')}</div>}
        </div>
        <div className="card">
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>📈 {t('weeklySales')}</div>
          <div style={{height:160}}><canvas ref={revRef}/></div>
        </div>
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:11,color:'var(--t2)'}}>🧾 {t('recentTx')}</span>
          <span style={{fontSize:11,color:'var(--t2)'}}>{t('totalRevenue')}: <strong style={{color:'var(--primary)'}}>{cur} {totalRev.toFixed(2)}</strong></span>
        </div>
        {todayPaid.length===0&&<div style={{textAlign:'center',padding:18,color:'var(--t3)',fontSize:12}}>{t('noData')}</div>}
        {todayPaid.slice().reverse().slice(0,8).map(o=>{
          const rev=calcRev(o);
          return(
            <div key={o.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
              <span style={{color:'var(--t2)'}}>{o.tableNum||o.orderType} · {new Date(o.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <span className={`badge badge-${o.paymentMethod==='cash'?'green':o.paymentMethod==='mada'?'yellow':'blue'}`}>{o.paymentMethod}</span>
                <span style={{fontWeight:700,color:'var(--primary)',minWidth:80,textAlign:'right'}}>{cur} {rev.toFixed(2)}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
