                    <span style={{fontSize:14,flexShrink:0}}>{e.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:checked?700:500,color:checked?'var(--t1)':'var(--t2)',lineHeight:1.2}}>
                        {lang==='ar'?e.nameAr:e.name}
                      </div>
                      {e.adj>0&&<div style={{fontSize:10,color:'var(--primary)',marginTop:2}}>+{cur} {Number(e.adj).toFixed(2)}</div>}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Special instructions */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:7}}>
            {lang==='ar'?'ملاحظة خاصة':'Special Instructions'}
          </div>
          <textarea className="input" rows={2}
            placeholder={lang==='ar'?'مثال: بدون ثوم، مطبوخ جيداً…':'e.g. no garlic, extra crispy…'}
            value={itemNote} onChange={e=>setNote(e.target.value)}
            style={{fontSize:13,resize:'none'}}/>
        </div>

        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={onClose}>{lang==='ar'?'إلغاء':'Cancel'}</button>
          <button className="btn btn-primary btn-lg" style={{flex:2,justifyContent:'center'}} disabled={!canConfirm}
            onClick={()=>onConfirm({...item,selectedMods:sel,modAdj:totalAdj,itemNote:finalNote})}>
            <i className="fa fa-plus"/> {lang==='ar'?'إضافة':'Add'} · {cur} {(item.price+totalAdj).toFixed(2)}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   ORDER SCREEN (waiter ordering)
====================================================== */
function OrderScreen({table,existingOrder,onBack}){
  const{t,lang,items,cats,createOrder,addItemsToOrder,toast,settings}=useApp();
  const cur=settings.currency||'SAR';
  const[selCat,setSelCat]=useState(0);const[cart,setCart]=useState([]);
  const[note,setNote]=useState('');const[search,setSearch]=useState('');
  const[orderType,setOrderType]=useState('dine-in');const[modItem,setModItem]=useState(null);
  const isAdd=!!existingOrder;

  const cartKey=c=>c.id+'|'+(c.selectedMods?JSON.stringify(c.selectedMods):'{}');
  const insert=item=>{
    setCart(p=>{
      const k=cartKey(item);
      const ex=p.find(c=>cartKey(c)===k);
      return ex?p.map(c=>cartKey(c)===k?{...c,qty:c.qty+1}:c):[...p,{...item,qty:1}];
    });
  };
  const tryAdd=item=>{
    if(!item.available)return;
    setModItem(item); // always show modal for global extras
  };
  const chQty=(k,d)=>setCart(p=>p.map(c=>cartKey(c)===k?{...c,qty:Math.max(0,c.qty+d)}:c).filter(c=>c.qty>0));
  const cartTotal=cart.reduce((s,c)=>s+(c.price+(c.modAdj||0))*c.qty,0);
  const cartQty=cart.reduce((s,c)=>s+c.qty,0);

  const send=()=>{
    if(!cart.length){toast('Add items first!','warning');return;}
    if(isAdd){addItemsToOrder(existingOrder.id,cart,note);}
    else{createOrder(table?.id,table?.num,cart,null,note,orderType);}
    onBack();
  };

  const filtered=items.filter(i=>(selCat===0||i.catId===selCat)&&(!search||(i.name+i.nameAr).toLowerCase().includes(search.toLowerCase())));

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden'}} className="split">
      {modItem&&<ModModal item={modItem} lang={lang} onConfirm={itm=>{insert(itm);setModItem(null);}} onClose={()=>setModItem(null)}/>}

      {/* Left: menu */}
      <div className="left-pane" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}><i className="fa fa-arrow-left"/></button>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>{table?.num||t('newOrder')}</div>
            <div style={{fontSize:11,color:'var(--t2)'}}>{isAdd?t('addToOrder'):t('addItem')}</div>
          </div>
          {!isAdd&&(
            <div style={{display:'flex',gap:5}}>
              {[['dine-in','🪑',t('dineIn')],['takeaway','🛍',t('takeaway')],['delivery','🛵',t('delivery')]].map(([tp,em,lb])=>(
                <button key={tp} className={`chip${orderType===tp?' active':''}`} onClick={()=>setOrderType(tp)} style={{fontSize:11,padding:'3px 9px'}}>
                  {em} <span className="hide-sm">{lb}</span>
                </button>
              ))}
            </div>
          )}
          <div style={{flex:1,minWidth:100,marginLeft:'auto'}}>
            <input className="input" placeholder={t('search')} value={search} onChange={e=>setSearch(e.target.value)} style={{padding:'7px 11px'}}/>
          </div>
        </div>
        <div style={{padding:'7px 10px',display:'flex',gap:6,overflowX:'auto',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <button className={`chip${selCat===0?' active':''}`} onClick={()=>setSelCat(0)}>{t('all')}</button>
          {cats.map(c=>(
            <button key={c.id} className={`chip${selCat===c.id?' active':''}`} onClick={()=>setSelCat(c.id)}>
              {c.emoji} <span className="hide-sm">{lang==='ar'?c.nameAr:c.name}</span>
            </button>
          ))}
        </div>
        <div className="scroll-y" style={{flex:1,padding:10}}>
          {isAdd&&existingOrder&&(
            <div style={{marginBottom:10,padding:9,background:'var(--blue-dim)',borderRadius:8,border:'1px solid rgba(59,130,246,.2)'}}>
              <div style={{fontSize:11,color:'var(--blue)',fontWeight:700,marginBottom:5}}>{t('existingOrder')} — {(existingOrder.items||[]).length} items</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {(existingOrder.items||[]).map((it,i)=>(
                  <span key={i} style={{fontSize:10,padding:'2px 7px',background:'var(--elevated)',borderRadius:99,color:'var(--t2)'}}>{it.emoji} {lang==='ar'?it.nameAr:it.name} ×{it.qty}</span>
                ))}
              </div>
            </div>
          )}
          <div className="m-grid-2" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:9}}>
            {filtered.map(item=>(
              <div key={item.id} className={`m-card${!item.available?' unavailable':''}${cart.some(c=>c.id===item.id)?' incart':''}`} onClick={()=>tryAdd(item)}>
                {item.imageData?<img src={item.imageData} className="m-img" alt=""/>:item.imageUrl?<img src={item.imageUrl} className="m-img" alt=""/>:<div className="m-emoji">{item.emoji}</div>}
                <div style={{padding:'7px 9px'}}>
                  <div style={{fontWeight:600,fontSize:11,lineHeight:1.3,marginBottom:2}}>{lang==='ar'?item.nameAr:item.name}</div>
                  <div style={{color:'var(--primary)',fontSize:12,fontWeight:700}}>{cur} {item.price}</div>
                  {item.modifiers?.length>0&&<div style={{fontSize:9,color:'var(--t3)',marginTop:1}}>+ options ▾</div>}
                </div>
              </div>
            ))}
            {!filtered.length&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:32,color:'var(--t3)',fontSize:12}}>{t('noItems')}</div>}
          </div>
        </div>
      </div>

      {/* Right: cart */}
      <div className="order-panel" style={{width:280,flexShrink:0}}>
        <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13,flexShrink:0}}>
          🛒 {t('cart')} ({cartQty})
        </div>
        <div className="scroll-y" style={{flex:1,padding:8}}>
          {!cart.length&&<div style={{textAlign:'center',padding:28,color:'var(--t3)',fontSize:12}}>{lang==='ar'?'اختر من القائمة':'Tap menu items to add'}</div>}
          {cart.map(c=>{
            const k=cartKey(c);
            return(
              <div key={k} style={{display:'flex',alignItems:'center',gap:7,marginBottom:7,padding:8,background:'var(--elevated)',borderRadius:8}}>
                <span style={{fontSize:18,flexShrink:0}}>{c.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,lineHeight:1.3}}>{lang==='ar'?c.nameAr:c.name}</div>
                  {c.modAdj>0&&<div style={{fontSize:10,color:'var(--t3)'}}>+{c.modAdj} options</div>}
                  {c.itemNote&&<div style={{fontSize:10,color:'var(--primary)',marginTop:1,opacity:.85}}>📝 {c.itemNote}</div>}
                  <div style={{fontSize:11,color:'var(--primary)',fontWeight:700}}>{cur} {((c.price+(c.modAdj||0))*c.qty).toFixed(2)}</div>
                </div>
                <div style={{display:'flex',gap:3,alignItems:'center',flexShrink:0}}>
                  <button className="btn btn-ghost btn-icon" style={{width:26,height:26,fontSize:14}} onClick={()=>chQty(k,-1)}>-</button>
                  <span style={{width:18,textAlign:'center',fontSize:12,fontWeight:700}}>{c.qty}</span>
                  <button className="btn btn-ghost btn-icon" style={{width:26,height:26,fontSize:14}} onClick={()=>chQty(k,1)}>+</button>
                </div>
              </div>
            );
          })}
        </div>
    <div style={{padding:10,borderTop:'1px solid var(--border)',flexShrink:0, paddingBottom:'calc(12px + env(safe-area-inset-bottom, 0px) + 70px)'}}>
  <textarea className="input" placeholder={t('addNote')} value={note} onChange={e=>setNote(e.target.value)} rows={2} style={{marginBottom:8,fontSize:12}}/>
  {cart.length>0&&(
    <div className="row-between" style={{marginBottom:8}}>
      <span style={{fontSize:12,color:'var(--t2)'}}>{t('total')}</span>
      <span style={{fontWeight:700,color:'var(--primary)',fontSize:14}}>{cur} {cartTotal.toFixed(2)}</span>
    </div>
  )}
  <button className="btn btn-primary btn-block" onClick={send} disabled={!cart.length} style={{marginBottom:'10px'}}>
    <i className={`fa ${isAdd?'fa-plus':'fa-paper-plane'}`}/> {isAdd?t('addToOrder'):t('sendKitchen')}
  </button>
</div>
      </div>
    </div>
  );
}

/* ======================================================
   WAITER SCREEN - WITH ADD TO EXISTING ORDER FEATURE
====================================================== */
function WaiterScreen(){
  const{t,lang,tables,orders,setTables,confirm,toast}=useApp();
  const[selTbl,setSelTbl]=useState(null);
  const[addMode,setAddMode]=useState(false);
  const[selectedOrderId,setSelectedOrderId]=useState(null); // Which order to add to
  const[tableAction,setTableAction]=useState(null); // {table, activeOrders}
  const statusLbl={available:t('avail'),ordered:t('occupied'),bill:t('billReady')};

  // If in order screen
  if(selTbl){
    const existingOrder = addMode && selectedOrderId 
      ? orders.find(o => o.id === selectedOrderId)
      : null;
    return(
      <OrderScreen 
        table={selTbl} 
        existingOrder={existingOrder} 
        onBack={() => {
          setSelTbl(null);
          setAddMode(false);
          setSelectedOrderId(null);
        }} 
      />
    );
  }

  // Handle table tap - shows modal with options
  const handleTableTap = (tb) => {
    if(tb.status === 'available'){
      // Free table - start new order directly
      setAddMode(false);
      setSelectedOrderId(null);
      setSelTbl(tb);
    } else {
      // Occupied table - show options
      const activeOrders = orders.filter(o => 
        o.tableId === tb.id && 
        !['paid','voided','closed'].includes(o.status)
      );
      setTableAction({table: tb, activeOrders});
    }
  };

  return(
    <div className="scroll-y mb-pad" style={{padding:16,flex:1}}>
      
      {/* Modal for occupied table - shows order options */}
      {tableAction && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setTableAction(null)}>
          <div className="modal" style={{maxWidth:400}}>
            
            {/* Header */}
            <div className="row-between" style={{marginBottom:16}}>
              <div>
                <h3 style={{fontSize:18}}>🪑 {tableAction.table.num}</h3>
                <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>
                  {tableAction.activeOrders.length} active order{tableAction.activeOrders.length !== 1 ? 's' : ''}
                </div>
              </div>
              <button className="btn btn-ghost btn-icon btn-sm" onClick={() => setTableAction(null)}>
                <i className="fa fa-times"/>
              </button>
            </div>

            {/* Existing orders list */}
            {tableAction.activeOrders.length > 0 && (
              <div style={{marginBottom:16}}>
                <div className="section-hdr" style={{marginBottom:8}}>📋 EXISTING ORDERS</div>
                {tableAction.activeOrders.map(order => {
                  const orderTotal = (order.items || []).reduce((s, i) => s + (i.price + (i.modAdj || 0)) * i.qty, 0);
                  const currency = 'SAR';
                  return (
                    <div 
                      key={order.id} 
                      style={{
                        display:'flex',
                        alignItems:'center',
                        gap:10,
                        padding:'10px 12px',
                        background:'var(--elevated)',
                        borderRadius:10,
                        marginBottom:8,
                        cursor:'pointer',
                        border:'1px solid transparent',
                        transition:'all .15s'
                      }}
                      onClick={() => {
                        setSelectedOrderId(order.id);
                        setAddMode(true);
                        setSelTbl(tableAction.table);
                        setTableAction(null);
                      }}
                      onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--primary)'}
                      onMouseLeave={e => e.currentTarget.style.borderColor = 'transparent'}
                    >
                      <div style={{fontSize:28}}>🧾</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13}}>
                          Order #{order.id.slice(-6)}
                        </div>
                        <div style={{fontSize:11,color:'var(--t2)'}}>
                          {(order.items || []).length} items · {currency} {orderTotal.toFixed(2)}
                        </div>
                        <div style={{fontSize:10,color:'var(--t3)',marginTop:2}}>
                          {new Date(order.createdAt).toLocaleTimeString()} · {order.orderType}
                        </div>
                      </div>
                      <span className={`badge badge-${order.status === 'new' ? 'yellow' : order.status === 'in-progress' ? 'blue' : 'green'}`}>
                        {order.status}
                      </span>
                      <i className="fa fa-chevron-right" style={{color:'var(--t3)',fontSize:12}}/>
                    </div>
                  );
                })}
              </div>
            )}

            <div className="divider" />

            {/* Action buttons */}
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button 
                className="btn btn-primary btn-block btn-lg" 
                style={{justifyContent:'center'}}
                onClick={() => {
                  setSelectedOrderId(null);
                  setAddMode(false);
                  setSelTbl(tableAction.table);
                  setTableAction(null);
                }}
              >
                <i className="fa fa-plus-circle"/> Start New Order on {tableAction.table.num}
              </button>
              
              {tableAction.activeOrders.length === 0 && (
                <div style={{textAlign:'center',padding:16,color:'var(--t3)',fontSize:12}}>
                  No active orders on this table
                </div>
              )}
              
              <button 
                className="btn btn-ghost btn-block" 
                onClick={() => setTableAction(null)}
              >
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Tables Grid */}
      <div className="tbl-grid">
        {tables.map(tb => {
          const activeOrds = orders.filter(o => 
            o.tableId === tb.id && 
            !['paid','voided','closed'].includes(o.status)
          );
          const totalItems = activeOrds.reduce((sum, o) => sum + (o.items || []).length, 0);
          
          return (
            <div 
              key={tb.id} 
              className={`tbl-card ${tb.status}`} 
              onClick={() => handleTableTap(tb)}
            >
              <div className="sdot"/>
              <span style={{fontSize:28}}>🪑</span>
              <div className="tbl-num">{tb.num}</div>
              <div style={{fontSize:10,color:'var(--t3)',marginTop:2}}>{tb.seats} seats</div>
              
              <span className={`badge badge-${tb.status==='available'?'green':tb.status==='ordered'?'yellow':'red'}`} style={{marginTop:5,fontSize:10}}>
                {statusLbl[tb.status]}
              </span>
              
              {/* Show order count badge if multiple orders */}
              {activeOrds.length > 0 && (
                <div style={{marginTop:6}}>
                  {activeOrds.length === 1 ? (
                    <div style={{fontSize:10,color:'var(--t2)'}}>
                      {activeOrds[0].items?.length || 0} items
                    </div>
                  ) : (
                    <div style={{
                      background:'var(--purple)',
                      color:'#fff',
                      borderRadius:99,
                      fontSize:10,
                      fontWeight:700,
                      padding:'2px 8px',
                      display:'inline-block'
                    }}>
                      {activeOrds.length} orders · {totalItems} items
                    </div>
                  )}
                  <KitTimer at={activeOrds[0].createdAt}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ======================================================
   KITCHEN SCREEN
====================================================== */
function KitchenScreen(){
  const{t,lang,orders,updateOrder,settings}=useApp();
  const active=orders.filter(o=>['new','in-progress','ready'].includes(o.status));
  const[filter,setFilter]=useState('all');

  const shown=filter==='all'?active:active.filter(o=>o.status===filter);
  const cols={new:{label:lang==='ar'?'جديد':'New',color:'var(--yellow)',bg:'var(--yellow-dim)'},
    'in-progress':{label:t('inProgress'),color:'var(--blue)',bg:'var(--blue-dim)'},
    ready:{label:t('ready'),color:'var(--green)',bg:'var(--green-dim)'}};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'9px 14px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
        <i className="fa fa-fire-flame-curved" style={{color:'var(--orange)'}}/>
        <span style={{fontWeight:700,fontSize:14}}>{t('kitchenDisplay')}</span>
        <div style={{display:'flex',gap:5,marginLeft:'auto'}}>
          {['all','new','in-progress','ready'].map(f=>(
            <button key={f} className={`chip${filter===f?' active':''}`} style={{fontSize:11}} onClick={()=>setFilter(f)}>
              {f==='all'?t('all'):cols[f]?.label||f}
              {f!=='all'&&<span style={{marginLeft:4,background:'var(--elevated)',borderRadius:99,padding:'1px 5px'}}>{active.filter(o=>o.status===f).length}</span>}
            </button>
          ))}
        </div>
      </div>
      <div className="scroll-y mb-pad" style={{flex:1,padding:12}}>
        {!shown.length&&<div style={{textAlign:'center',padding:40,color:'var(--t3)',fontSize:13}}>{lang==='ar'?'لا توجد طلبات نشطة':'No active orders'}</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(min(100%,260px),1fr))',gap:10}}>
          {shown.map(order=>{
            const c=cols[order.status]||cols.new;
            const isRush=order.priority==='rush';
            return(
              <div key={order.id} className={`kit-card${isRush?' rush':''}`} style={{borderLeft:`4px solid ${c.color}`}}>
                <div className="row-between" style={{marginBottom:9}}>
                  <div style={{display:'flex',gap:7,alignItems:'center'}}>
                    <span style={{fontSize:15,fontWeight:800}}>{order.tableNum||order.orderType}</span>
                    <span className={`badge badge-${order.status==='new'?'yellow':order.status==='in-progress'?'blue':'green'}`} style={{fontSize:10}}>
                      {c.label}
                    </span>
                    {isRush&&<span className="badge badge-red" style={{fontSize:10}}>{t('rush')}</span>}
                  </div>
                  <div style={{display:'flex',gap:5,alignItems:'center'}}>
                    <KitTimer at={order.createdAt}/>
                    <button className="btn btn-warning btn-icon btn-sm" title="Mark Rush" onClick={()=>updateOrder(order.id,{priority:order.priority==='rush'?'normal':'rush'})}>
                      <i className="fa fa-bolt" style={{fontSize:11}}/>
                    </button>
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  {(order.items||[]).map((it,i)=>(
                    <div key={i} style={{display:'flex',gap:7,padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                      <span>{it.emoji}</span>
                      <span style={{flex:1}}>{lang==='ar'?it.nameAr:it.name}</span>
                      {it.modAdj>0&&<span style={{fontSize:10,color:'var(--t3)'}}>+options</span>}
                      <span style={{fontWeight:700}}>×{it.qty}</span>
                    </div>
                  ))}
                </div>
                {order.note&&<div style={{padding:'5px 8px',background:'var(--yellow-dim)',borderRadius:6,fontSize:11,marginBottom:8}}>📝 {order.note}</div>}
                <div style={{display:'flex',gap:6}}>
                  {order.status==='new'&&(
                    <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>updateOrder(order.id,{status:'in-progress'})}>
                      <i className="fa fa-play"/> Start
                    </button>
                  )}
                  {order.status==='in-progress'&&(
                    <button className="btn btn-success btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>updateOrder(order.id,{status:'ready'})}>
                      <i className="fa fa-check"/> Ready
                    </button>
                  )}
                  {order.status==='ready'&&(
                    <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>updateOrder(order.id,{status:'completed'})}>
                      <i className="fa fa-check-double"/> Served
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   SPLIT BILL MODAL
====================================================== */
function SplitModal({order,calcTotal,settings,onClose,onPay}){
  const[parts,setParts]=useState(2);
  const{total}=calcTotal(order);
  const per=total/parts;
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="row-between" style={{marginBottom:14}}>
          <h3>Split Bill — {order.tableNum}</h3>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>
        <div className="form-g">
          <label className="form-lbl">Split into {parts} parts</label>
          <input type="range" min={2} max={10} value={parts} onChange={e=>setParts(Number(e.target.value))} style={{width:'100%'}}/>
        </div>
        <div style={{padding:14,background:'var(--elevated)',borderRadius:8,textAlign:'center',marginBottom:14}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--primary)'}}>{settings.currency||'SAR'} {per.toFixed(2)}</div>
          <div style={{fontSize:12,color:'var(--t2)',marginTop:4}}>per person · total {(settings.currency||'SAR')} {total.toFixed(2)}</div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{onPay(parts);onClose();}}>
            <i className="fa fa-check"/> Confirm Split Payment
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   EDIT ORDER MODAL
====================================================== */
function EditOrderModal({order,onClose}){
  const{t,lang,items:menuItems,cats,updateOrder,settings,toast}=useApp();
  const cur=settings.currency||'SAR';

  // Deep-copy order items into local state
  const[editItems,setEditItems]=useState(()=>(order.items||[]).map(i=>({...i})));
  const[note,setNote]=useState(order.note||'');
  const[orderType,setOrderType]=useState(order.orderType||'dine-in');
  const[tab,setTab]=useState('items'); // 'items' | 'add'
  const[selCat,setSelCat]=useState(0);
  const[search,setSearch]=useState('');

  const cartKey=i=>i.id+'|'+(i.selectedMods?JSON.stringify(i.selectedMods):'{}');

  // ── Edit existing items ──────────────────────────────
  const changeQty=(idx,delta)=>{
    setEditItems(p=>{
      const next=[...p];
      const newQty=next[idx].qty+delta;
      if(newQty<=0){next.splice(idx,1);}
      else{next[idx]={...next[idx],qty:newQty};}
      return next;
    });
  };

  // ── Add menu item ────────────────────────────────────
  const addItem=item=>{
    if(!item.available)return;
    setEditItems(p=>{
      const key=cartKey({...item,selectedMods:{}});
      const idx=p.findIndex(i=>cartKey(i)===key);
      if(idx>=0){const n=[...p];n[idx]={...n[idx],qty:n[idx].qty+1};return n;}
      return[...p,{...item,qty:1,selectedMods:{},modAdj:0,itemNote:''}];
    });
  };

  const filtered=menuItems.filter(i=>i.available&&(selCat===0||i.catId===selCat)&&(!search||(i.name+i.nameAr).toLowerCase().includes(search.toLowerCase())));

  const sub=editItems.reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);

  const save=()=>{
    if(!editItems.length){toast('Order must have at least one item','warning');return;}
    updateOrder(order.id,{items:editItems,note,orderType,updatedAt:new Date().toISOString()});
    toast('Order updated','success');
    onClose();
  };

  return(
    <div className="overlay" style={{zIndex:1050}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg" style={{maxHeight:'95vh',display:'flex',flexDirection:'column'}}>

        {/* Header */}
        <div className="row-between" style={{marginBottom:14,flexShrink:0}}>
          <div>
            <h3 style={{fontSize:15}}>✏️ Edit Order — {order.tableNum||order.orderType}</h3>
            <div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>{order.id}</div>
          </div>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:6,marginBottom:12,flexShrink:0}}>
          <button className={`chip${tab==='items'?' active':''}`} onClick={()=>setTab('items')}>
            <i className="fa fa-list"/> Current Items ({editItems.length})
          </button>
          <button className={`chip${tab==='add'?' active':''}`} onClick={()=>setTab('add')}>
            <i className="fa fa-plus"/> Add Items
          </button>
        </div>

        {/* Tab: current items */}
        {tab==='items'&&(
          <div className="scroll-y" style={{flex:1,minHeight:0}}>
            {!editItems.length&&(
              <div style={{textAlign:'center',padding:32,color:'var(--t3)',fontSize:13}}>No items — add some from the menu</div>
            )}
            {editItems.map((it,idx)=>(
              <div key={idx} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:22,flexShrink:0}}>{it.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600}}>{lang==='ar'?it.nameAr:it.name}</div>
                  {it.modAdj>0&&<div style={{fontSize:10,color:'var(--t3)'}}>+{it.modAdj} options</div>}
                  {it.itemNote&&<div style={{fontSize:10,color:'var(--t3)'}}>📝 {it.itemNote}</div>}
                  <div style={{fontSize:12,color:'var(--primary)',fontWeight:700}}>{cur} {((it.price+(it.modAdj||0))*it.qty).toFixed(2)}</div>
                </div>
                {/* Qty controls */}
                <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                  <button className="btn btn-danger btn-icon btn-sm" style={{width:28,height:28}} onClick={()=>changeQty(idx,-1)}>
                    {it.qty===1?<i className="fa fa-trash" style={{fontSize:10}}/>:<span style={{fontSize:16,lineHeight:1}}>−</span>}
                  </button>
                  <span style={{width:24,textAlign:'center',fontWeight:700,fontSize:13}}>{it.qty}</span>
                  <button className="btn btn-ghost btn-icon btn-sm" style={{width:28,height:28}} onClick={()=>changeQty(idx,1)}>
                    <span style={{fontSize:16,lineHeight:1}}>+</span>
                  </button>
                </div>
              </div>
            ))}

            {/* Order type + note */}
            <div style={{marginTop:14}}>
              <div className="form-g">
                <label className="form-lbl">{t('orderType')}</label>
                <div style={{display:'flex',gap:6}}>
                  {[['dine-in','🪑',t('dineIn')],['takeaway','🛍',t('takeaway')],['delivery','🛵',t('delivery')]].map(([tp,em,lb])=>(
                    <button key={tp} className={`chip${orderType===tp?' active':''}`} onClick={()=>setOrderType(tp)} style={{fontSize:11}}>
                      {em} {lb}
                    </button>
                  ))}
                </div>
              </div>
              <div className="form-g" style={{marginBottom:0}}>
                <label className="form-lbl">{t('addNote')}</label>
                <textarea className="input" rows={2} value={note} onChange={e=>setNote(e.target.value)} style={{fontSize:12}}/>
              </div>
            </div>
          </div>
        )}

        {/* Tab: add items */}
        {tab==='add'&&(
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',gap:7,marginBottom:8,flexShrink:0,flexWrap:'wrap'}}>
              <input className="input" placeholder={t('search')} value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:120,padding:'7px 11px'}}/>
            </div>
            <div style={{display:'flex',gap:6,marginBottom:8,overflowX:'auto',flexShrink:0}}>
              <button className={`chip${selCat===0?' active':''}`} onClick={()=>setSelCat(0)}>{t('all')}</button>
              {cats.map(c=><button key={c.id} className={`chip${selCat===c.id?' active':''}`} onClick={()=>setSelCat(c.id)}>{c.emoji} {lang==='ar'?c.nameAr:c.name}</button>)}
            </div>
            <div className="scroll-y" style={{flex:1,minHeight:0}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
                {filtered.map(item=>{
                  const inOrder=editItems.find(i=>i.id===item.id);
                  return(
                    <div key={item.id} className={`m-card${inOrder?' incart':''}`} onClick={()=>addItem(item)}
                      style={{position:'relative'}}>
                      {item.imageData||item.imageUrl
                        ?<img src={item.imageData||item.imageUrl} className="m-img" alt=""/>
                        :<div className="m-emoji">{item.emoji}</div>}
                      <div style={{padding:'7px 9px'}}>
                        <div style={{fontWeight:600,fontSize:11}}>{lang==='ar'?item.nameAr:item.name}</div>
                        <div style={{color:'var(--primary)',fontSize:12,fontWeight:700}}>{cur} {item.price}</div>
                      </div>
                      {inOrder&&(
                        <div style={{position:'absolute',top:6,right:6,background:'var(--primary)',color:'#0d0d14',borderRadius:99,width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>
                          {inOrder.qty}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:10,flexShrink:0}}>
          <div className="row-between" style={{marginBottom:10}}>
            <span style={{fontSize:12,color:'var(--t2)'}}>{editItems.reduce((s,i)=>s+i.qty,0)} items</span>
            <span style={{fontWeight:700,fontSize:15,color:'var(--primary)'}}>{cur} {sub.toFixed(2)}</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-primary" style={{flex:2,justifyContent:'center'}} onClick={save}>
              <i className="fa fa-save"/> Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   CASHIER SCREEN
====================================================== */
function CashierScreen(){
  const{t,lang,tables,orders,updateOrder,calcTotal,settings,toast}=useApp();
  const[selTbl,setSelTbl]=useState(null);const[discount,setDisc]=useState(0);
  const[payMethod,setPay]=useState('cash');const[received,setReceived]=useState('');
  const[tip,setTip]=useState(0);const[showSplit,setShowSplit]=useState(false);
  const[voidId,setVoidId]=useState(null);const[voidReason,setVoidReason]=useState('');
  const[editOrder,setEditOrder]=useState(null);
  const cur=settings.currency||'SAR';

  const activeTables=tables.filter(tb=>tb.status==='ordered'||tb.status==='bill');
  const selOrder=selTbl?orders.find(o=>o.id===selTbl.orderId):null;

  const{sub,disc,after,vat,total}=selOrder?{...calcTotal({...selOrder,discount,tip}),tip}:{sub:0,disc:0,after:0,vat:0,total:0,tip:0};
  const change=received?Math.max(0,parseFloat(received)-total):0;

  const pay=()=>{
    if(!selOrder)return;
    updateOrder(selOrder.id,{status:'paid',discount,tip,paymentMethod:payMethod,paidAt:new Date().toISOString()});
    toast(`Payment accepted · ${cur} ${total.toFixed(2)}`,'success');
    setSelTbl(null);setDisc(0);setTip(0);setReceived('');
  };

  const printReceipt=()=>{
    if(!selOrder)return;
    const vr=(settings.vatRate||15)/100;
    const sub2=(selOrder.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    const disc2=sub2*(discount/100);
    const after2=sub2-disc2;
    const vat2=after2*vr;
    const tip2=tip||0;
    const tot2=after2+vat2+tip2;
    const change2=received?Math.max(0,parseFloat(received)-tot2):0;
    const paperW=settings.thermalPaper==='57mm'?'57mm':'80mm';
    const bodyW=settings.thermalPaper==='57mm'?'50mm':'72mm';
    const w=window.open('','_blank','width=380,height=700');
    w.document.write(`<!DOCTYPE html><html><head><title>Receipt</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Courier New',Courier,monospace;font-size:12px;padding:6px}
      .c{text-align:center}.d{border-top:1px dashed #000;margin:7px 0}.r{display:flex;justify-content:space-between;margin:2px 0}
      h2{font-size:15px;margin-bottom:2px}.big{font-size:16px;font-weight:bold}
      .logo{font-size:18px;font-weight:900;letter-spacing:1px}
      .item-name{flex:1;padding-right:6px;word-break:break-word}
      @media print{
        @page{size:${paperW} auto;margin:0;}
        body{width:${bodyW};padding:4px;}
        .no-print{display:none!important;}
      }
    </style></head><body>
    <div class="c">
      <div class="logo">${settings.restaurantName||'Ordo POS'}</div>
      ${settings.restaurantNameAr?`<div style="font-family:Arial;font-size:12px">${settings.restaurantNameAr}</div>`:''}
      ${settings.address?`<div style="font-size:10px;margin-top:2px">${settings.address}</div>`:''}
      ${settings.phone?`<div style="font-size:10px">📞 ${settings.phone}</div>`:''}
      ${settings.vatNumber?`<div style="font-size:10px">VAT: ${settings.vatNumber}</div>`:''}
      ${settings.crNumber?`<div style="font-size:10px">CR: ${settings.crNumber}</div>`:''}
      <div style="font-size:10px;margin-top:3px">${new Date().toLocaleString()}</div>
    </div>
    <div class="d"></div>
    <div class="r"><span>Table: <strong>${selTbl?.num||'-'}</strong></span><span>Order: #${selOrder.id.slice(-8)}</span></div>
    <div class="r"><span>Type: ${selOrder.orderType||'dine-in'}</span><span>Staff: ${selOrder.waiterName||'-'}</span></div>
    <div class="d"></div>
    ${(selOrder.items||[]).map(i=>`
      <div class="r">
        <span class="item-name">${lang==='ar'?i.nameAr:i.name}${i.itemNote?' ('+i.itemNote+')':''} ×${i.qty}</span>
        <span>${cur} ${((i.price+(i.modAdj||0))*i.qty).toFixed(2)}</span>
      </div>`).join('')}
    <div class="d"></div>
    <div class="r"><span>Subtotal</span><span>${cur} ${sub2.toFixed(2)}</span></div>
    ${discount>0?`<div class="r"><span>Discount ${discount}%</span><span>- ${cur} ${disc2.toFixed(2)}</span></div>`:''}
    <div class="r"><span>VAT ${settings.vatRate||15}%</span><span>${cur} ${vat2.toFixed(2)}</span></div>
    ${tip2>0?`<div class="r"><span>Tip</span><span>${cur} ${tip2.toFixed(2)}</span></div>`:''}
    <div class="d"></div>
    <div class="r big"><span>TOTAL</span><span>${cur} ${tot2.toFixed(2)}</span></div>
    ${payMethod==='cash'&&received?`
      <div class="r"><span>Received</span><span>${cur} ${parseFloat(received).toFixed(2)}</span></div>
      <div class="r" style="color:#059669"><span>Change</span><span>${cur} ${change2.toFixed(2)}</span></div>`:''}
    ${payMethod!=='cash'?`<div class="r"><span>Paid by</span><span>${payMethod.toUpperCase()}</span></div>`:''}
    <div class="d"></div>
    <div class="c" style="font-size:11px;line-height:1.6">${lang==='ar'?settings.receiptFooterAr:settings.receiptFooter}</div>
    <div style="text-align:center;margin-top:14px" class="no-print">
      <button onclick="window.print()" style="padding:8px 20px;font-family:monospace;cursor:pointer">🖨️ Print</button>
    </div>
    <script>window.onload=function(){window.print();setTimeout(function(){window.close();},3000);};<\/script>
    </body></html>`);
    w.document.close();
  };

  const printToken=()=>{
    if(!selOrder)return;
    const w=window.open('','_blank','width=340,height=400');
    const tokenNum=selOrder.id.slice(-4).toUpperCase();
    w.document.write(`<!DOCTYPE html><html><head><title>Token</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Courier New',monospace;padding:10px;background:#fff;color:#000}
      .center{text-align:center}
      .rest{font-size:13px;font-weight:bold}
      .dashed{border-top:2px dashed #000;margin:8px 0}
      @media print{@page{size:80mm auto;margin:0;}body{width:72mm;padding:4mm;}}
    </style></head><body>
    <div class="center">
      <div class="rest">${settings.restaurantName||'Ordo POS'}</div>
      <div class="dashed"></div>
      <div style="font-size:12px;color:#555">${selOrder.tableNum?'Table: '+selOrder.tableNum:'Takeaway'}</div>
      <div style="font-size:64px;font-weight:900;margin:8px 0;letter-spacing:4px">${tokenNum}</div>
      <div style="font-size:11px;color:#555">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true})}</div>
      <div class="dashed"></div>
      <div style="font-size:11px">Please wait for your number to be called</div>
    </div>
    <script>window.onload=function(){window.print();setTimeout(function(){window.close();},2500);};<\/script>
    </body></html>`);
    w.document.close();
  };

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden'}} className="split cashier-wrap">
      {editOrder&&<EditOrderModal order={editOrder} onClose={()=>setEditOrder(null)}/>}
      {showSplit&&selOrder&&<SplitModal order={{...selOrder,discount,tip}} calcTotal={calcTotal} settings={settings} onClose={()=>setShowSplit(false)} onPay={(parts)=>{
        updateOrder(selOrder.id,{status:'paid',discount,tip,paymentMethod:'split',splits:parts,paidAt:new Date().toISOString()});
        toast(`Split payment (${parts} ways) · ${cur} ${(total/parts).toFixed(2)} each`,'success');
        setSelTbl(null);setDisc(0);setTip(0);
      }}/>}
      {voidId&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setVoidId(null)}>

            <h3 style={{marginBottom:12}}>{t('voidOrder')}</h3>

              <button className="btn btn-ghost" onClick={()=>setVoidId(null)}>{t('cancel')}</button>

                toast('Order voided','warning');setVoidId(null);setSelTbl(null);
              }}>{t('confirm')}</button>
            </div>
          </div>
        </div>

      <div className="cashier-left" style={{width:240,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
        <div style={{padding:'10px 12px',fontWeight:700,fontSize:13,borderBottom:'1px solid var(--border)',flexShrink:0}}>{t('tables')}</div>
        <div className="scroll-y" style={{flex:1}}>
          {!activeTables.length&&<div style={{padding:20,textAlign:'center',color:'var(--t3)',fontSize:12}}>No active tables</div>}
          {activeTables.map(tb=>(
            <div key={tb.id} onClick={()=>{setSelTbl(tb);setDisc(0);setTip(0);setReceived('');setPay('cash');}}
              style={{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',background:selTbl?.id===tb.id?'var(--primary-dim)':'transparent',transition:'all .15s'}}>
              <div className="row-between">
                <span style={{fontWeight:700}}>{tb.num}</span>
                <span className={`badge badge-${tb.status==='bill'?'red':'yellow'}`}>{tb.status==='bill'?t('billReady'):t('occupied')}</span>
              </div>
              {orders.find(o=>o.id===tb.orderId)&&(
                <div style={{fontSize:11,color:'var(--t2)',marginTop:3}}>
                  {orders.find(o=>o.id===tb.orderId)?.items.length} items
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Right: bill */}
      <div style={{flex:1,overflow:'auto',padding:14,minWidth:0}}>
        {!selOrder?(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--t3)',fontSize:13,flexDirection:'column',gap:10}}>
            <i className="fa fa-receipt" style={{fontSize:32,opacity:.3}}/>
            <span>Select a table to process payment</span>

        ):(
          <div style={{maxWidth:520}}>
            <div className="row-between" style={{marginBottom:14}}>

                <h3 style={{fontSize:16}}>{selTbl?.num}</h3>
                <div style={{fontSize:11,color:'var(--t2)'}}>{selOrder.id} · {selOrder.orderType}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditOrder(selOrder)}><i className="fa fa-edit"/> Edit</button>

                <button className="btn btn-ghost btn-sm" onClick={printToken}><i className="fa fa-ticket"/> Token</button>
                <button className="btn btn-danger btn-sm" onClick={()=>setVoidId(selOrder.id)}><i className="fa fa-ban"/> Void</button>
              </div>
            </div>
            {/* Items */}
            <div className="card" style={{marginBottom:12,padding:12}}>

                  <label className="form-lbl">{t('tips')} ({cur})</label>

                    {[0,5,10,15,20].map(tv=>(
                      <button key={tv} className={`chip${tip===tv?' active':''}`} style={{fontSize:11}} onClick={()=>setTip(tv)}>{tv>0?`${cur} ${tv}`:'No tip'}</button>

              <div className="form-g">
                <label className="form-lbl">{t('payMethod')}</label>
                <div style={{display:'flex',gap:6}}>
                  {['cash','card','mada'].map(m=>(
                    <button key={m} className={`chip${payMethod===m?' active':''}`} onClick={()=>setPay(m)}>
                      {m==='cash'?'💵':m==='card'?'💳':'🏧'} {t(m)}
                    </button>
                  ))}
                </div>
              </div>
              {payMethod==='cash'&&(
                <div className="form-g">
                  <label className="form-lbl">{t('received')}</label>
                  <input type="number" className="input" value={received} onChange={e=>setReceived(e.target.value)} placeholder="0.00"/>
                </div>
              )}

function OrdersScreen(){

/* ======================================================
   REPORTS
====================================================== */
function Reports(){
  const{t,orders,settings,lang}=useApp();
  const[range,setRange]=useState(7);
  const cur=settings.currency||'SAR';
  const vr=(settings.vatRate||15)/100;
  const lineRef=useRef();const lineChart=useRef();

  const paid=useMemo(()=>orders.filter(o=>o.status==='paid'),[orders]);

  const calcRev=o=>{
    const sub=(o.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    return(sub*(1-(o.discount||0)/100))*(1+vr)+(o.tip||0);
  };

  const days=useMemo(()=>Array.from({length:range},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(range-1-i));
    const ds=d.toDateString();
    const dayOrders=paid.filter(o=>new Date(o.createdAt).toDateString()===ds);
    return{label:d.toLocaleDateString('en',{month:'short',day:'numeric'}),rev:dayOrders.reduce((s,o)=>s+calcRev(o),0),cnt:dayOrders.length};
  }),[paid,range]);

  const totalRev=days.reduce((s,d)=>s+d.rev,0);
  const totalOrds=days.reduce((s,d)=>s+d.cnt,0);
  const avgOrder=totalOrds?totalRev/totalOrds:0;

  const itemStats=useMemo(()=>{
    const m={};
    paid.forEach(o=>(o.items||[]).forEach(i=>{
      const n=lang==='ar'?i.nameAr:i.name;
      if(!m[n])m[n]={name:n,qty:0,rev:0};
      m[n].qty+=i.qty;m[n].rev+=(i.price+(i.modAdj||0))*i.qty;
    }));
    return Object.values(m).sort((a,b)=>b.rev-a.rev).slice(0,10);
  },[paid,lang]);

  useEffect(()=>{
    if(!lineRef.current)return;
    if(lineChart.current)lineChart.current.destroy();
    lineChart.current=new Chart(lineRef.current,{
      type:'line',
      data:{labels:days.map(d=>d.label),datasets:[{label:'Revenue',data:days.map(d=>Math.round(d.rev)),borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,.1)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#fbbf24'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'#9898b0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#9898b0',font:{size:11}},grid:{display:false}}}}
    });
    return()=>lineChart.current?.destroy();
  },[days]);

  return(
    <div className="scroll-y mb-pad" style={{padding:14,flex:1}}>
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:12,color:'var(--t2)',marginRight:4}}>Range:</span>
        {[7,14,30,90].map(r=>(
          <button key={r} className={`chip${range===r?' active':''}`} style={{fontSize:11}} onClick={()=>setRange(r)}>Last {r}d</button>
        ))}
        <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>{
          const data=JSON.stringify({orders,exportedAt:new Date().toISOString()},null,2);
          const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(data);
          a.download=`ordo-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
        }}><i className="fa fa-download"/> Export</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:10,marginBottom:14}}>
        {[
          {l:'Total Revenue',v:`${cur} ${totalRev.toFixed(2)}`,col:'var(--primary)'},
          {l:'Orders',v:totalOrds},
          {l:'Avg Order',v:`${cur} ${avgOrder.toFixed(2)}`},
          {l:'Total Items',v:paid.reduce((s,o)=>s+(o.items||[]).reduce((ss,i)=>ss+i.qty,0),0)},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-v" style={{color:s.col,fontSize:22}}>{s.v}</div>
            <div className="stat-l">{s.l}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>Revenue Trend</div>
        <div style={{height:180}}><canvas ref={lineRef}/></div>
      </div>

      <div className="card">
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:10}}>Top Items by Revenue</div>
        {!itemStats.length&&<div style={{textAlign:'center',padding:20,color:'var(--t3)',fontSize:12}}>{t('noData')}</div>}
        {itemStats.map((it,i)=>{
          const pct=itemStats[0]?.rev?it.rev/itemStats[0].rev*100:0;
          return(
            <div key={i} style={{marginBottom:8}}>
              <div className="row-between" style={{marginBottom:3}}>
                <span style={{fontSize:12}}>{it.name}</span>
                <span style={{fontSize:12,color:'var(--t2)'}}>{it.qty} sold · <span style={{color:'var(--primary)',fontWeight:700}}>{cur} {it.rev.toFixed(2)}</span></span>
              </div>
              <div style={{height:5,background:'var(--elevated)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:'var(--primary)',borderRadius:99,transition:'width .4s'}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ======================================================

function MenuManagement(){
  const{t,lang,cats,setCats,items,setItems,toast,confirm,settings}=useApp();
  const cur=settings.currency||'SAR';
  const[tab,setTab]=useState('items');const[showModal,setShowModal]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const blank={name:'',nameAr:'',price:'',emoji:'🍽️',imageUrl:'',imageData:'',catId:'',available:true,modifiers:[]};
  const[form,setForm]=useState(blank);
  const[showCatModal,setShowCatModal]=useState(false);
  const[editCat,setEditCat]=useState(null);
  const[catForm,setCatForm]=useState({name:'',nameAr:'',emoji:'🍽️'});

  const openItem=(item=null)=>{
    if(item){setEditItem(item);setForm({...item});}
    else{setEditItem(null);setForm({...blank,catId:cats[0]?.id||''});}
    setShowModal(true);
  };

  const saveItem=()=>{
    if(!form.name.trim()||!form.price){toast('Name and price required','warning');return;}
    const it={...form,id:editItem?.id||Date.now(),price:parseFloat(form.price),catId:parseInt(form.catId),modifiers:form.modifiers||[]};
    if(editItem)setItems(p=>p.map(i=>i.id===editItem.id?it:i));
    else setItems(p=>[...p,it]);
    setShowModal(false);toast(t('save'),'success');
  };

  const delItem=function(id){confirm('Delete this item?').then(function(yes){if(yes){setItems(p=>p.filter(i=>i.id!==id));toast('Deleted','warning');}});};

  const handleImg=e=>{
    const f=e.target.files?.[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>setForm(p=>({...p,imageData:ev.target.result,imageUrl:''}));
    reader.readAsDataURL(f);
  };

  // Modifier management
  const addMod=()=>setForm(p=>({...p,modifiers:[...p.modifiers,{id:uid(),name:'',nameAr:'',required:false,opts:[{id:uid(),name:'',nameAr:'',adj:0}]}]}));
  const updMod=(mid,key,val)=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,[key]:val}:m)}));
  const delMod=mid=>setForm(p=>({...p,modifiers:p.modifiers.filter(m=>m.id!==mid)}));
  const addOpt=mid=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,opts:[...m.opts,{id:uid(),name:'',nameAr:'',adj:0}]}:m)}));
  const updOpt=(mid,oid,key,val)=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,opts:m.opts.map(o=>o.id===oid?{...o,[key]:val}:o)}:m)}));
  const delOpt=(mid,oid)=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,opts:m.opts.filter(o=>o.id!==oid)}:m)}));

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',gap:6,flexShrink:0}}>

          <button key={k} className={`chip${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
        <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>tab==='items'?openItem():setShowCatModal(true)}>
          <i className="fa fa-plus"/> {tab==='items'?t('addMenuItem'):t('addCat')}
        </button>

      {/* Items tab */}
      {tab==='items'&&(
        <div className="scroll-y mb-pad" style={{flex:1,padding:12}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
            {items.map(item=>(
              <div key={item.id} className="card" style={{display:'flex',gap:10,padding:12}}>
                <div style={{width:52,height:52,borderRadius:8,overflow:'hidden',flexShrink:0,background:'var(--elevated)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>
                  {item.imageData||item.imageUrl?<img src={item.imageData||item.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:item.emoji}
                </div>

/* ======================================================
   LICENSE STATUS CARD
======================================================*/
function LicenseStatusCard(){
  const{license}=useApp();
  const[showActivate,setShowActivate]=useState(false);
  const[keyInput,setKeyInput]=useState('');
  const[activateErr,setActivateErr]=useState('');
  const[activating,setActivating]=useState(false);

  if(!license)return null;
  const col=license.valid?(license.trial?'var(--yellow)':'var(--green)'):'var(--red)';
  const icon=license.valid?(license.trial?'fa-clock':'fa-check-circle'):'fa-times-circle';
  const planLabel=license.trial?'Trial':((license.payload&&license.payload.p)||'').toUpperCase();

  const doActivate=async()=>{
    if(!keyInput.trim()){setActivateErr('Please enter your license key');return;}
    setActivating(true);setActivateErr('');
    const result=await validateLicenseKey(keyInput.trim());
    if(result.valid){
      localStorage.setItem('ordo_license_key',keyInput.trim().toUpperCase());
      setTimeout(()=>window.location.reload(),800);
    }else{
      setActivateErr(result.reason||'Invalid key');
    }
    setActivating(false);
  };

  return(
    <div style={{marginBottom:14}}>
      {/* Status bar */}
      <div style={{padding:'12px 14px',background:'var(--elevated)',borderRadius:10,display:'flex',gap:10,alignItems:'center'}}>
        <i className={`fa ${icon}`} style={{color:col,fontSize:20}}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13,color:col}}>
            {license.valid?(license.trial?'Trial Mode':'Licensed — '+planLabel):'License Invalid'}
          </div>
          {license.valid&&(
            <div style={{fontSize:11,color:'var(--t2)',marginTop:3,display:'flex',flexDirection:'column',gap:2}}>
              <span>{license.daysLeft} days remaining</span>
              {license.payload?.e&&<span>📧 {license.payload.e}</span>}
              {license.payload?.m&&<span>📱 {license.payload.m}</span>}
              {license.payload?.c&&license.payload.c!=='*'&&<span>🏪 Locked to: <strong style={{color:'var(--primary)',fontFamily:'monospace'}}>{license.payload.c}</strong></span>}
            </div>
          )}
          {!license.valid&&<div style={{fontSize:11,color:'var(--red)',marginTop:2}}>{license.reason}</div>}
        </div>
        {license.valid&&!license.trial&&(
          <span className="badge badge-green" style={{fontSize:10}}>✓ Active</span>
        )}
        {license.trial&&(
          <button className="btn btn-warning btn-sm" onClick={()=>setShowActivate(s=>!s)}>
            <i className="fa fa-unlock"/> Activate
          </button>
        )}
        {!license.valid&&(
          <button className="btn btn-danger btn-sm" onClick={()=>setShowActivate(s=>!s)}>
            <i className="fa fa-key"/> Enter Key
          </button>
        )}
      </div>
      {/* Inline activate form */}
      {showActivate&&(
        <div style={{marginTop:8,padding:'12px 14px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:10}}>
          <div className="form-g" style={{marginBottom:8}}>
            <label className="form-lbl">License Key</label>
            <input className="input" value={keyInput}
              onChange={e=>setKeyInput(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==='Enter'&&doActivate()}
              placeholder="XXXXX-XXXXX-XXXXX-XXXXX"
              style={{fontFamily:'monospace',letterSpacing:2,fontSize:13}}/>
          </div>
          {activateErr&&<div style={{color:'var(--red)',fontSize:12,padding:'5px 9px',background:'var(--red-dim)',borderRadius:6,marginBottom:8}}>{activateErr}</div>}
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowActivate(false)}>Cancel</button>
            <button className="btn btn-primary btn-sm" onClick={doActivate} disabled={activating}>
              {activating?<i className="fa fa-spinner" style={{animation:'spin 1s linear infinite'}}/>:<i className="fa fa-unlock"/>} Activate License
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ======================================================
   AUDIT LOG VIEWER
======================================================*/
function AuditLogViewer(){
  const[logs,setLogs]=useState([]);
  const[open,setOpen]=useState(false);
  useEffect(()=>{
    if(!open)return;
    try{
      const raw=localStorage.getItem(nsKey('audit_log'));
      setLogs(JSON.parse(raw||'[]'));
    }catch{setLogs([]);}
  },[open]);
  const colors={LOGIN_OK:'var(--green)',LOGIN_FAIL:'var(--red)',AUTO_LOGOUT:'var(--yellow)',
    LOGOUT:'var(--t2)',ORDER_NEW:'var(--blue)',ORDER_PAID:'var(--green)',ORDER_VOIDED:'var(--red)',
    LICENSE_OK:'var(--green)',LICENSE_FAIL:'var(--red)',LICENSE_GENERATED:'var(--purple)'};
  return(
    <div style={{marginTop:16}}>
      <div className="row-between" style={{marginBottom:10}}>
        <span className="section-hdr" style={{margin:0}}>📋 Audit Log</span>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(o=>!o)}>
          <i className={`fa fa-chevron-${open?'up':'down'}`}/> {open?'Hide':'Show'}
        </button>
      </div>
      {open&&(
        <div className="card" style={{padding:0,maxHeight:320,overflowY:'auto'}}>
          {!logs.length&&<div style={{padding:20,textAlign:'center',color:'var(--t3)',fontSize:12}}>No audit records yet</div>}
          {logs.map((l,i)=>(
            <div key={l.id||i} style={{display:'flex',gap:8,padding:'8px 12px',borderBottom:'1px solid var(--border)',alignItems:'flex-start',fontSize:11}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:colors[l.action]||'var(--t3)',marginTop:2,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,color:'var(--t1)'}}>{l.action}</div>
                <div style={{color:'var(--t2)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.detail}</div>
              </div>
              <div style={{flexShrink:0,textAlign:'right'}}>
                <div style={{color:'var(--t3)'}}>{l.user}</div>
                <div style={{color:'var(--t3)'}}>{new Date(l.at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ======================================================
   SHARE MENU QR MODAL
====================================================== */
function ShareMenuQR({onClose}){
  const qrRef=useRef();
  const menuUrl=(window.location.href.split('#')[0])+'#/menu';

  useEffect(()=>{
    if(!qrRef.current)return;
    qrRef.current.innerHTML='';
    try{
      new window.QRCode(qrRef.current,{
        text:menuUrl,
        width:220,height:220,
        colorDark:'#0d0d14',colorLight:'#ffffff',
        correctLevel:window.QRCode.CorrectLevel.M
      });
    }catch(e){
      qrRef.current.innerHTML='<div style="padding:20px;font-size:12px;color:#ef4444;">QR generation failed</div>';
    }
  },[menuUrl]);

  const copy=()=>{
    navigator.clipboard.writeText(menuUrl).then(()=>{
      // simple feedback via title flash
    }).catch(()=>{});
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:340,textAlign:'center'}}>
        <div className="row-between" style={{marginBottom:18}}>
          <div>
            <h3 style={{fontSize:15}}>📋 Share Menu</h3>
            <div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>Customers scan to view the menu</div>
          </div>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>

        {/* QR Code */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
          <div style={{background:'#fff',padding:14,borderRadius:12,display:'inline-block',boxShadow:'0 4px 24px rgba(0,0,0,.18)'}}>
            <div ref={qrRef}/>
          </div>
        </div>

        {/* Features note */}
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16,padding:'10px 12px',background:'var(--elevated)',borderRadius:10,textAlign:'left'}}>
          <div style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><i className="fa fa-check" style={{color:'var(--green)',fontSize:10}}/> View-only — no ordering</div>
          <div style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><i className="fa fa-check" style={{color:'var(--green)',fontSize:10}}/> Day &amp; Night mode</div>
          <div style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><i className="fa fa-check" style={{color:'var(--green)',fontSize:10}}/> Arabic &amp; English</div>
        </div>

        {/* URL */}
        <div style={{background:'var(--elevated)',borderRadius:8,padding:'8px 12px',fontSize:10,color:'var(--t3)',wordBreak:'break-all',marginBottom:14,fontFamily:'monospace'}}>
          {menuUrl}
        </div>

        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={copy}>
            <i className="fa fa-copy"/> Copy Link
          </button>
          <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={()=>window.print()}>
            <i className="fa fa-print"/> Print QR
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================

====================================================== */
function MenuViewOnly(){

  const[theme,setTheme]=useState(()=>localStorage.getItem('mvTheme')||'dark');
  const[search,setSearch]=useState('');

  const toggleTheme=()=>{
    const next=theme==='dark'?'light':'dark';
    setTheme(next);
    localStorage.setItem('mvTheme',next);
  };

  const isLight=theme==='light';

  // Build inline CSS vars for light mode applied to wrapper
  const lightVars=isLight?{
    '--bg':'#f5f5ef','--surface':'#ffffff','--card':'#eeeee8','--elevated':'#e5e5df',
    '--border':'rgba(0,0,0,.10)','--t1':'#1a1a2e','--t2':'#55556a','--t3':'#9898b0',
    '--primary':'#d97706','--primary-dim':'rgba(217,119,6,.12)','--primary-dark':'#b45309',
    '--red':'#dc2626','--red-dim':'rgba(220,38,38,.10)',
    '--green':'#059669','--green-dim':'rgba(5,150,105,.10)',
    '--blue':'#2563eb','--blue-dim':'rgba(37,99,235,.10)',
    '--elevated':'#e5e5df'
  }:{};

  const filtered=items.filter(i=>i.available&&(selCat===0||i.catId===i.catId)&&(selCat===0||i.catId===selCat)&&(!search||(i.name+i.nameAr).toLowerCase().includes(search.toLowerCase())));

  const restName=lang==='ar'?settings.restaurantNameAr:settings.restaurantName;

  return(
    <div style={{
      minHeight:'100vh',
      background:'var(--bg)',
      color:'var(--t1)',
      ...lightVars
    }}>
      {/* Header */}
      <div style={{padding:'12px 16px',background:'var(--surface)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>

          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {/* Day/Night toggle */}
          <button className="theme-tog" style={{background:'var(--elevated)',border:'1px solid var(--border)',color:'var(--t2)'}} onClick={toggleTheme}>
            {isLight?<><i className="fa fa-moon"/> {lang==='ar'?'ليلي':'Night'}</>:<><i className="fa fa-sun"/> {lang==='ar'?'نهاري':'Day'}</>}
          </button>
          {/* Language toggle */}
          <button className="btn btn-ghost btn-sm" onClick={()=>setLang(lang==='ar'?'en':'ar')}>

          </button>
        </div>
      </div>

      {/* Search */}
      <div style={{padding:'10px 14px',background:'var(--surface)',borderBottom:'1px solid var(--border)'}}>
        <div style={{position:'relative'}}>
          <i className="fa fa-search" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--t3)',fontSize:12,pointerEvents:'none'}}/>
          <input
            className="input"
            placeholder={lang==='ar'?'ابحث في القائمة…':'Search menu…'}
            value={search}
            onChange={e=>setSearch(e.target.value)}
            style={{paddingLeft:30,fontSize:13,background:'var(--elevated)',border:'1px solid var(--border)',color:'var(--t1)'}}

      </div>

      {/* Categories */}
      <div style={{padding:'10px 12px',display:'flex',gap:7,overflowX:'auto',borderBottom:'1px solid var(--border)',background:'var(--surface)'}}>

          <button key={c.id} className={`chip${selCat===c.id?' active':''}`} onClick={()=>setSelCat(c.id)}>

function CustomerQR({tableNum}){

/* ======================================================
   LICENSE SCREEN  (shown when license invalid/expired)
======================================================*/
function LicenseScreen({license}){
  const[key,setKey]=useState('');
  const[err,setErr]=useState(license.reason||'');
  const[loading,setLoading]=useState(false);
  const[success,setSuccess]=useState(false);

  const activate=async()=>{
    if(!key.trim()){setErr('Please enter a license key');return;}
    setLoading(true);setErr('');
    const result=await validateLicenseKey(key.trim());
    if(result.valid){
      localStorage.setItem('ordo_license_key',key.trim().toUpperCase());
      setSuccess(true);
      setTimeout(()=>window.location.reload(),1200);
    }else{
      setErr(result.reason||'Invalid key');
    }
    setLoading(false);
  };

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',padding:20}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>{license.expired?'⏰':'🔐'}</div>
          <div style={{fontSize:20,fontWeight:800,color:'var(--t1)'}}>{license.expired?'License Expired':'Activation Required'}</div>
          <div style={{fontSize:12,color:'var(--t2)',marginTop:6,lineHeight:1.6}}>{license.reason}</div>
        </div>
        {success?(
          <div style={{textAlign:'center',padding:20,background:'var(--green-dim)',borderRadius:12,color:'var(--green)',fontWeight:700}}>
            <i className="fa fa-check-circle" style={{fontSize:24,display:'block',marginBottom:8}}/>
            License activated! Reloading…
          </div>
        ):(
          <div className="card">
            <div className="form-g">
              <label className="form-lbl">License Key</label>
              <input className="input" value={key} onChange={e=>setKey(e.target.value.toUpperCase())}
                onKeyDown={e=>e.key==='Enter'&&activate()}
                placeholder="XXXXX-XXXXX-XXXXX-XXXXX"
                style={{fontFamily:'monospace',letterSpacing:2,fontSize:13}}/>
            </div>
            {err&&<div style={{color:'var(--red)',fontSize:12,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,marginBottom:10}}>{err}</div>}
            <button className="btn btn-primary btn-block" onClick={activate} disabled={loading}>
              {loading?<i className="fa fa-spinner" style={{animation:'spin 1s linear infinite'}}/>:<i className="fa fa-unlock"/>}
              {' '}Activate License
            </button>
            <div style={{marginTop:14,fontSize:11,color:'var(--t3)',textAlign:'center',lineHeight:1.8}}>
              Contact your Ordo POS reseller to purchase or renew.<br/>
              Your Client ID: <strong style={{color:'var(--primary)',fontFamily:'monospace'}}>{getCID()||'(not set)'}</strong>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ======================================================
   CLOSE ORDERS (END OF DAY) — admin only
====================================================== */
function CloseOrdersModal({onClose}){
  const{orders,setOrders,tables,setTables,calcTotal,settings,toast,user,writeAudit}=useApp();
  const cur=settings.currency||'SAR';

  const paid=orders.filter(o=>o.status==='paid');
  const voided=orders.filter(o=>o.status==='voided');
  const active=orders.filter(o=>!['paid','voided','closed'].includes(o.status));
  const archived=orders.filter(o=>o.status==='closed');

  const totalRevenue=paid.reduce((s,o)=>s+calcTotal(o).total,0);
  const todayPaid=paid.filter(o=>new Date(o.paidAt||o.updatedAt).toDateString()===new Date().toDateString());
  const todayRevenue=todayPaid.reduce((s,o)=>s+calcTotal(o).total,0);

  const closeDay=()=>{
    // Mark all paid/voided as 'closed', free any stuck tables
    const now=new Date().toISOString();
    setOrders(prev=>prev.map(o=>
      ['paid','voided'].includes(o.status)?{...o,status:'closed',closedAt:now}:o
    ));
    // Free any tables that might be stuck
    setTables(prev=>prev.map(tb=>{
      const order=orders.find(o=>o.id===tb.orderId);
      if(!order||['paid','voided','closed'].includes(order.status)){
        return{...tb,status:'available',orderId:null};
      }
      return tb;
    }));
    writeAudit('DAY_CLOSED',`Revenue: ${cur} ${todayRevenue.toFixed(2)} | Orders: ${todayPaid.length}`,user?.username);
    toast(`Day closed — ${todayPaid.length} orders archived`,'success');
    onClose();
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="row-between" style={{marginBottom:16}}>
          <div>
            <h3 style={{fontSize:16}}>🌙 Close Orders / End of Day</h3>
            <div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>Archive all paid &amp; voided orders</div>
          </div>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>

        {/* Today's summary */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
          <div style={{padding:'12px 14px',background:'var(--green-dim)',borderRadius:10}}>
            <div style={{fontSize:11,color:'var(--green)',fontWeight:700,marginBottom:4}}>Today's Revenue</div>
            <div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{cur} {todayRevenue.toFixed(2)}</div>
          </div>
          <div style={{padding:'12px 14px',background:'var(--blue-dim)',borderRadius:10}}>
            <div style={{fontSize:11,color:'var(--blue)',fontWeight:700,marginBottom:4}}>Today's Orders</div>
            <div style={{fontSize:20,fontWeight:800,color:'var(--blue)'}}>{todayPaid.length}</div>
          </div>
        </div>

        {/* Status breakdown */}
        <div style={{padding:'10px 14px',background:'var(--elevated)',borderRadius:10,marginBottom:14}}>
          {[
            ['Active (open orders)',active.length,'var(--yellow)'],
            ['Paid (will be archived)',paid.length,'var(--green)'],
            ['Voided (will be archived)',voided.length,'var(--red)'],
            ['Already archived',archived.length,'var(--t3)'],
          ].map(([label,count,col])=>(
            <div key={label} className="row-between" style={{padding:'4px 0',fontSize:12}}>
              <span style={{color:'var(--t2)'}}>{label}</span>
              <span style={{fontWeight:700,color:col}}>{count}</span>
            </div>
          ))}
        </div>

        {active.length>0&&(
          <div style={{padding:'8px 12px',background:'var(--yellow-dim)',borderRadius:8,fontSize:12,color:'var(--yellow)',marginBottom:12,display:'flex',gap:8,alignItems:'flex-start'}}>
            <i className="fa fa-triangle-exclamation" style={{marginTop:1}}/>
            <span><strong>{active.length} order(s) are still open.</strong> Close them first or they will remain active after end-of-day.</span>
          </div>
        )}

        <div style={{fontSize:11,color:'var(--t3)',marginBottom:14}}>
          Closing archives all paid &amp; voided orders. Active orders stay open. All tables with closed orders will be freed.
        </div>

        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-lg" style={{flex:1,justifyContent:'center'}} onClick={closeDay}
            disabled={paid.length===0&&voided.length===0}>
            <i className="fa fa-moon"/> Close Day — Archive {paid.length+voided.length} Orders
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   MAIN APP
====================================================== */
function MainApp(){
  const{user}=useApp();
  const[screen,setScreen]=useState('tables');
  const[qrTable,setQrTable]=useState(null);
  const[menuView,setMenuView]=useState(false);

  useEffect(()=>{
    const h=window.location.hash;
    const m=h.match(/^#\/table\/(\w+)$/i);
    if(m)setQrTable(m[1].toUpperCase());
    if(h==='#/menu')setMenuView(true);
  },[]);

  const roleScreens={
    admin:['dashboard','tables','orders','menu','kitchen','reports','settings','payments'],
    cashier:['tables','orders','reports'],
    waiter:['tables'],
    kitchen:['kitchen']
  };
  const role=user?user.role:null;
  const allowed=roleScreens[role]||['tables'];

  useEffect(()=>{
    if(role&&!allowed.includes(screen))setScreen(allowed[0]);
  },[role]);

  const{licenseChecked,license}=useApp();

  if(!licenseChecked)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12,background:'var(--bg)'}}>
      <i className="fa fa-spinner" style={{fontSize:28,animation:'spin 1s linear infinite',color:'var(--primary)'}}/>
      <div style={{fontSize:13,color:'var(--t2)'}}>Verifying license…</div>
    </div>
  );

  if(license&&!license.valid)return<LicenseScreen license={license}/>;

  if(menuView)return<MenuViewOnly/>;
  if(qrTable)return<CustomerQR tableNum={qrTable}/>;
  if(!user)return<LoginScreen/>;

  const panels={
    dashboard:<Dashboard/>,
    tables:role==='cashier'?<CashierScreen/>:<WaiterScreen/>,
    orders:<OrdersScreen/>,
    payments: <CashierScreen />,
    menu:<MenuManagement/>,
    kitchen:<KitchenScreen/>,
    reports:<Reports/>,
    settings:<Settings/>
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',overflow:'hidden'}}>
      <Header screen={screen} setScreen={setScreen} allowed={allowed}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>{panels[screen]||panels[allowed[0]]}</div>
      <BotNav screen={screen} setScreen={setScreen} allowed={allowed}/>
    </div>
  );
}

<script>
/* ── Safe-area / browser-toolbar detector ──────────────────
   Measures the gap between the visual viewport and the layout
   viewport — that gap IS the browser toolbar or system nav bar.
   Writes it into --extra-bot so all CSS picks it up.          */
(function(){
  var root=document.documentElement;
  function update(){
    var gap=0;
    if(window.visualViewport){
      gap=Math.max(0,
        window.innerHeight
        - window.visualViewport.height
        - window.visualViewport.offsetTop
      );
    }
    root.style.setProperty('--extra-bot', Math.ceil(gap)+'px');
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',update);
    window.visualViewport.addEventListener('scroll',update);
  }
  window.addEventListener('resize',update);
  update();
  setTimeout(update,300);
  setTimeout(update,800);
})();
</script>
