<style>
:root{
  --bg:#0d0d14;--surface:#13131f;--card:#1a1a2e;--elevated:#1f1f35;
  --border:rgba(255,255,255,0.07);
  --primary:#fbbf24;--primary-dim:rgba(251,191,36,0.12);--primary-dark:#d97706;
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --purple:#8b5cf6;--orange:#f97316;
  --t1:#f1f1f8;--t2:#9898b0;--t3:#5a5a72;
  --r:14px;--rs:8px;--rl:20px;
  --nav:60px;--bot:62px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Sora','Cairo',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;}
body[dir=rtl]{font-family:'Cairo','Sora',sans-serif;}
#root{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* --- BUTTONS --- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#0d0d14;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(251,191,36,.4);}
.btn-primary:disabled,.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.btn-success:hover{background:var(--green);color:#fff;}
.btn-warning{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(245,158,11,.25);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-lg{padding:13px 26px;font-size:15px;border-radius:var(--r);}
.btn-icon{padding:0;width:34px;height:34px;justify-content:center;border-radius:var(--rs);}
.btn-block{width:100%;justify-content:center;}

/* --- FORMS --- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.input{width:100%;padding:10px 13px;background:var(--elevated);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-family:inherit;font-size:13px;outline:none;transition:border .2s;}
.input:focus{border-color:var(--primary);}
select.input>option{background:var(--card);}
textarea.input{resize:none;}
.form-g{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;}
.divider{height:1px;background:var(--border);margin:14px 0;}

/* --- BADGES --- */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-purple{background:rgba(139,92,246,.12);color:var(--purple);}
.badge-orange{background:rgba(249,115,22,.12);color:var(--orange);}

/* --- CHIPS --- */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--t2);background:transparent;transition:all .15s;}
.chip.active{background:var(--primary);color:#0d0d14;border-color:var(--primary);}

/* --- MODAL --- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:14px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:22px;width:100%;max-width:480px;max-height:94vh;overflow-y:auto;}
.modal-lg{max-width:680px;}

/* --- TOAST --- */
.toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
[dir=rtl] .toast-wrap{right:auto;left:14px;}
.toast{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;display:flex;align-items:center;gap:10px;animation:slideUp .3s ease;}

/* --- NAVIGATION --- */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:var(--nav);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-logo{font-size:14px;font-weight:800;background:linear-gradient(135deg,var(--primary),#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;background:var(--card);border-radius:var(--rs);padding:3px;overflow-x:auto;}
.nav-tab{padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px;white-space:nowrap;border:none;background:none;transition:all .18s;}
.nav-tab.active{background:var(--primary);color:#0d0d14;}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bot);background:var(--surface);border-top:1px solid var(--border);z-index:99;}
.bot-inner{display:flex;height:100%;align-items:center;justify-content:space-around;}
.bot-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 10px;cursor:pointer;color:var(--t3);font-size:10px;font-weight:600;border:none;background:none;min-width:46px;border-radius:8px;}
.bot-tab.active{color:var(--primary);}
.bot-tab i{font-size:16px;}

/* --- TABLES --- */
.tbl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;}
.tbl-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .2s;text-align:center;position:relative;}
.tbl-card.available{border-color:rgba(16,185,129,.35);}
.tbl-card.ordered{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.04);}
.tbl-card.bill{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04);}
.tbl-card:hover{transform:translateY(-2px);border-color:var(--primary);}
.tbl-num{font-size:17px;font-weight:700;margin-top:5px;}
.sdot{width:9px;height:9px;border-radius:50%;position:absolute;top:10px;right:10px;}
[dir=rtl] .sdot{right:auto;left:10px;}
.available .sdot{background:var(--green);box-shadow:0 0 5px var(--green);}
.ordered .sdot{background:var(--yellow);}
.bill .sdot{background:var(--red);}

/* --- MENU CARDS --- */
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;}
.m-card:hover{border-color:var(--primary);transform:translateY(-2px);}
.m-card.unavailable{opacity:.4;cursor:not-allowed;}
.m-card.incart{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary-dim);}
.m-img{width:100%;height:110px;object-fit:cover;}
.m-emoji{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,#1a1a2e,#0d0d14);}

/* --- ORDER PANEL --- */
.order-panel{display:flex;flex-direction:column;height:100%;background:var(--surface);border-left:1px solid var(--border);}
[dir=rtl] .order-panel{border-left:none;border-right:1px solid var(--border);}

/* --- KITCHEN --- */
.kit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:all .2s;}
.kit-card.rush{border-color:rgba(239,68,68,.6);animation:pulse 2s infinite;}

/* --- STATS --- */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.stat-v{font-size:26px;font-weight:800;margin-top:6px;}
.stat-l{font-size:12px;color:var(--t2);margin-top:3px;}

/* --- TOGGLE --- */
.tog{position:relative;width:42px;height:23px;border-radius:99px;background:var(--elevated);border:1px solid var(--border);cursor:pointer;transition:.2s;flex-shrink:0;}
.tog.on{background:var(--primary);border-color:var(--primary);}
.tog-thumb{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s;pointer-events:none;}
.tog.on .tog-thumb{left:21px;}

/* --- LIGHT MODE GLOBAL THEME --- */
html.light{
  --bg:#f0f0ea;--surface:#ffffff;--card:#e8e8e2;--elevated:#deded8;
  --border:rgba(0,0,0,.09);
  --primary:#d97706;--primary-dim:rgba(217,119,6,.13);--primary-dark:#b45309;
  --red:#dc2626;--red-dim:rgba(220,38,38,.10);
  --green:#059669;--green-dim:rgba(5,150,105,.10);
  --yellow:#d97706;--yellow-dim:rgba(217,119,6,.10);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.10);
  --purple:#7c3aed;--orange:#ea580c;
  --t1:#111827;--t2:#4b5563;--t3:#9ca3af;
}
html.light body{background:var(--bg);color:var(--t1);}
html.light .btn-primary{color:#fff;}
html.light .m-emoji{background:linear-gradient(135deg,#e8e8e2,#deded8)!important;}
html.light select.input>option{background:#fff;}
html.light .nav-bar,html.light .bot-nav{box-shadow:0 1px 8px rgba(0,0,0,.08);}
html.light .modal{box-shadow:0 8px 40px rgba(0,0,0,.15);}
html.light .overlay{background:rgba(0,0,0,.55);}
*{transition:background-color .25s,border-color .2s,color .15s;}
.btn,.chip,.badge,.nav-tab,.bot-tab,.tog,.input{transition:all .2s!important;}
.theme-tog{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--elevated);cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);}
.theme-tog:hover{border-color:var(--primary);color:var(--primary);}


.timer{font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;font-variant-numeric:tabular-nums;}
.t-fresh{background:var(--green-dim);color:var(--green);}
.t-warn{background:var(--yellow-dim);color:var(--yellow);}
.t-hot{background:var(--red-dim);color:var(--red);}

/* --- MISC --- */
.scroll-y{overflow-y:auto;overflow-x:hidden;}
.section-hdr{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.row-between{display:flex;justify-content:space-between;align-items:center;}

/* --- ANIMATIONS --- */
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* --- RESPONSIVE --- */
@media print{.no-print{display:none!important;}body{background:#fff;color:#000;overflow:auto;}#root{height:auto;}}
@media(max-width:768px){
  .nav-tabs,.hide-sm{display:none!important;}
  .bot-nav{display:flex;}
  .mb-pad{padding-bottom:calc(var(--bot) + 16px)!important;}
  .order-panel{width:100%!important;border:none!important;}
  .split{flex-direction:column!important;}
  .split>.left-pane{height:55%!important;flex:none!important;}
  .split>.order-panel{height:45%!important;}
}
</style>

// ── GLOBAL ERROR HANDLER ──────────────────────────────────────────────────
window.addEventListener('error', function(e){
  var el=document.getElementById('root');
  if(el&&el.children.length===0){
    el.style.cssText='display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0d14;color:#ef4444;font-family:monospace;font-size:13px;padding:20px;text-align:center;';
    el.textContent='App Error: '+(e.message||'Unknown error')+' (line '+(e.lineno||'?')+')';
  }
});
window.addEventListener('unhandledrejection', function(e){
  console.error('Unhandled promise rejection:', e.reason);
});

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('React error:',e,info);}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0d0d14',color:'#ef4444',fontFamily:'monospace',fontSize:'13px',padding:'20px',textAlign:'center',flexDirection:'column',gap:'10px'}},
        React.createElement('div',{style:{fontSize:'32px'}},'⚠️'),
        React.createElement('div',{style:{fontWeight:'bold'}},'Render Error'),
        React.createElement('div',null,this.state.err.message),
        React.createElement('button',{onClick:()=>{localStorage.clear();location.reload();},style:{marginTop:'16px',padding:'8px 16px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',fontFamily:'monospace'}},'Clear Data & Reload')
      );
    }
    return this.props.children;
  }
}

async function hashPw(pw){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('ORDO2_'+pw));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

  rm:k=>localStorage.removeItem(k)
};

const DEF_TABLES=Array.from({length:20},(_,i)=>({id:i+1,num:`T${i+1}`,status:'available',orderId:null,seats:i<5?8:i<12?6:4,area:'Main'}));

/* ======================================================
   CONTEXT
====================================================== */
const safeArr=(k,def)=>{try{const v=localStorage.getItem(k);if(!v)return def;const p=JSON.parse(v);return Array.isArray(p)?p:def;}catch{return def;}};
const Ctx=createContext(null);
const useApp=()=>useContext(Ctx);

function Provider({children}){
  const[lang,setLangS]=useState(()=>LS.g('lang','en'));
  const[user,setUser]=useState(null);
  const[tables,setTables]=useState(()=>safeArr('tables',DEF_TABLES));
  const[orders,setOrders]=useState(()=>safeArr('orders',[]));
  const[cats,setCats]=useState(()=>safeArr('cats',DEF_CATS));
  const[items,setItems]=useState(()=>safeArr('items',DEF_ITEMS));
  const[staff,setStaff]=useState(()=>safeArr('staff',DEF_STAFF));
  const[settings,setSettingsS]=useState(()=>{try{const s=LS.g('settings');return(s&&typeof s==='object')?Object.assign({},DEF_SETTINGS,s):DEF_SETTINGS;}catch{return DEF_SETTINGS;}});
  const[toasts,setToasts]=useState([]);
  const[pwaEvt,setPwaEvt]=useState(null);
  const[ready,setReady]=useState(false);
  const[theme,setThemeS]=useState(()=>LS.g('theme','dark'));
  const[fbMode,setFbMode]=useState(false);
  const[fbConnected,setFbConnected]=useState(false);
  // SaaS tenant state
  const[tenant,setTenant]=useState(null);  // { uid, plan, status, trialEnd, restaurantName, ... }
  const[trialDaysLeft,setTrialDaysLeft]=useState(null);
  const[showPaywall,setShowPaywall]=useState(false);
  const fbRef=useRef(null);
  const tenantId=useRef(null);

  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDTzLb-bqmZiNB0G0W4WTRGseMM37GUcpI",
  authDomain: "pos-ordo.firebaseapp.com",
  projectId: "pos-ordo",
  storageBucket: "pos-ordo.firebasestorage.app",
  messagingSenderId: "575923763514",
  appId: "1:575923763514:web:f81283d99aafd2460f3803",
  measurementId: "G-PND9FKHRVF"
};

  // ── Init Firebase once ─────────────────────────────
  useEffect(()=>{
    try{
      const app=window.firebase.apps.length?window.firebase.app():window.firebase.initializeApp(FIREBASE_CONFIG);
      const fs=window.firebase.firestore(app);
      fs.enablePersistence({synchronizeTabs:true}).catch(()=>{});
      fbRef.current=fs;
      setFbMode(true);
      setFbConnected(true);
    }catch(e){console.error('[Ordo SaaS] Firebase init error:',e);}
  },[]);

  // ── Auth listener — resolve tenant on login ────────
  useEffect(()=>{
    if(!fbMode)return;
    const auth=window.firebase.auth();
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(!fbUser){
        // Not logged in — redirect to register
        window.location.href='register.html';
        return;
      }
      tenantId.current=fbUser.uid;
      const snap=await fbRef.current.collection('tenants').doc(fbUser.uid).get();
      if(!snap.exists){window.location.href='register.html';return;}
      const t=snap.data();
      setTenant(t);

      // Trial / paywall logic
      if(t.status==='trial'){
        const daysLeft=Math.ceil((new Date(t.trialEnd)-new Date())/86400000);
        setTrialDaysLeft(Math.max(0,daysLeft));
        if(daysLeft<=0){setShowPaywall(true);}
      }else if(t.status==='expired'){
        setShowPaywall(true);
      }

      // Load tenant settings into app
      const settingsSnap=await fbRef.current.collection('tenants').doc(fbUser.uid).collection('app').doc('settings').get();
      if(settingsSnap.exists){
        const s=settingsSnap.data();
        setSettingsS(prev=>({...prev,...s}));
      }

      setReady(true);
    });
    return()=>unsub();
  },[fbMode]);

  // ── Tenant-scoped Firestore path ───────────────────
  const tenantDoc=(col)=>{
    if(!fbRef.current||!tenantId.current)return null;
    return fbRef.current.collection('tenants').doc(tenantId.current).collection('app').doc(col);
  };

  // ── Firestore real-time listeners per tenant ───────
  useEffect(()=>{
    if(!fbMode||!tenant)return;
    const unsubs=[];
    const listen=(col,setter)=>{
      const ref=tenantDoc(col);
      if(!ref)return;
      unsubs.push(ref.onSnapshot(snap=>{
        if(snap.exists){
          const d=snap.data()?.data;
          if(Array.isArray(d)&&d.length)setter(d);
          else if(d&&typeof d==='object'&&!Array.isArray(d))setter(s=>({...s,...d}));
        }
      }));
    };
    listen('orders',  setOrders);
    listen('tables',  setTables);
    listen('cats',    setCats);
    listen('items',   setItems);
    listen('staff',   setStaff);
    return()=>unsubs.forEach(u=>u());
  },[fbMode,tenant]);

  // ── Write to tenant's scoped collection ───────────
  const fbWrite=useCallback((col,value)=>{
    LS.s(col,value);
    const ref=tenantDoc(col);
    if(!ref||!fbMode)return;
    ref.set({data:value,updatedAt:new Date().toISOString()},{merge:false}).catch(()=>{});
  },[fbMode,tenant]);

  // Apply theme class to html element
  useEffect(()=>{
    document.documentElement.classList.toggle('light',theme==='light');
    LS.s('theme',theme);
  },[theme]);
  const toggleTheme=useCallback(()=>setThemeS(t=>t==='dark'?'light':'dark'),[]);

  // Hash default passwords on first boot — force rehash if upgrading from old prefix
  useEffect(()=>{
    (async()=>{
      const saved=LS.g('staff');
      const ver=LS.g('staffVer');
      if(!saved||!ver||ver!=='ordo2'||saved.some(s=>!s.hash)){
        const base=saved||DEF_STAFF;
        const hashed=await Promise.all(base.map(async s=>({
          ...s,
          hash:await hashPw(DEF_PASSES[s.username]||s.username+'123')
        })));
        setStaff(hashed);LS.s('staff',hashed);LS.s('staffVer','ordo2');
      }
      setReady(true);
    })();
  },[]);

  // Restore session
  useEffect(()=>{
    if(!ready)return;
    const sess=LS.g('session');
    if(sess&&sess.uid&&sess.exp>Date.now()){
      const all=LS.g('staff')||DEF_STAFF;
      const u=all.find(s=>s.id===sess.uid&&s.active);
      if(u)setUser(u);
    }
  },[ready]);

  // PWA
  useEffect(()=>{
    const h=e=>{e.preventDefault();setPwaEvt(e);};
    window.addEventListener('beforeinstallprompt',h);
    return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);

  // Persist locally + sync to Firestore
  useEffect(()=>{fbWrite('tables',tables);},[tables]);
  useEffect(()=>{fbWrite('orders',orders);},[orders]);
  useEffect(()=>{fbWrite('cats',cats);},[cats]);
  useEffect(()=>{fbWrite('items',items);},[items]);
  useEffect(()=>{fbWrite('staff',staff);},[staff]);
  useEffect(()=>{fbWrite('settings',settings);},[settings]);
  useEffect(()=>{
    LS.s('lang',lang);
    document.documentElement.lang=lang;
    document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  },[lang]);

  const t=useCallback(k=>(TR[lang]||TR.en)[k]||k,[lang]);
  const setLang=l=>setLangS(l);
  const setSettings=upd=>setSettingsS(p=>({...p,...(typeof upd==='function'?upd(p):upd)}));

  const toast=useCallback((msg,type='info',dur=3500)=>{
    const id=uid();
    setToasts(p=>[...p.slice(-4),{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),dur);
  },[]);

  const beep=useCallback(()=>{
    if(!settings.kitchenSound)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [880,660].forEach((freq,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=freq;
        const t0=ctx.currentTime+i*.3;
        g.gain.setValueAtTime(.25,t0);
        g.gain.exponentialRampToValueAtTime(.001,t0+.4);
        o.start(t0);o.stop(t0+.4);
      });
    }catch{}
  },[settings.kitchenSound]);

  const login=useCallback(async(username,pw)=>{
    const allStaff=LS.g('staff')||staff;
    const s=allStaff.find(s=>s.username===username.trim().toLowerCase()&&s.active);
    if(!s)return false;
    const h=await hashPw(pw);
    if(h!==s.hash)return false;
    const exp=Date.now()+(settings.sessionTimeout||480)*60000;
    LS.s('session',{uid:s.id,exp});
    setUser(s);return true;
  },[staff,settings.sessionTimeout]);

  const logout=useCallback(()=>{LS.rm('session');setUser(null);},[]);

  // Calc order total
  const calcTotal=useCallback((order)=>{
    if(!order)return{sub:0,disc:0,after:0,vat:0,tip:0,total:0};
    const vr=(settings.vatRate||15)/100;
    const sub=(order.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    const disc=sub*(order.discount||0)/100;
    const after=sub-disc;
    const vatAmt=after*vr;
    const tip=order.tip||0;
    return{sub,disc,after,vat:vatAmt,tip,total:after+vatAmt+tip};
  },[settings.vatRate]);

  const createOrder=useCallback((tableId,tableNum,itemsList,waiterName,note,orderType)=>{
    const id=`ORD-${Date.now()}`;
    const order={id,tableId,tableNum,items:itemsList,waiterName:waiterName||'',
      note:note||'',status:'new',discount:0,tip:0,paymentMethod:'cash',
      orderType:orderType||'dine-in',priority:'normal',
      createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    setOrders(p=>[...p,order]);
    if(tableId)setTables(p=>p.map(tb=>tb.id===tableId?{...tb,status:'ordered',orderId:id}:tb));
    toast(t('orderSent'),'success');beep();
    return id;
  },[t,toast,beep]);

  const addItemsToOrder=useCallback((orderId,newItems,note)=>{
    setOrders(p=>p.map(o=>{
      if(o.id!==orderId)return o;
      const merged=[...(o.items||[])];
      newItems.forEach(ni=>{
        const key=ni.id+'_'+(ni.selectedMods?JSON.stringify(ni.selectedMods):'');
        const idx=merged.findIndex(m=>m.id+'_'+(m.selectedMods?JSON.stringify(m.selectedMods):'')===key);
        if(idx>=0){merged[idx]={...merged[idx],qty:merged[idx].qty+ni.qty};}else{merged.push({...ni});}
      });
      return{...o,items:merged,note:note||o.note,updatedAt:new Date().toISOString(),status:'new'};
    }));
    toast('Items added to order','success');beep();
  },[toast,beep]);

  const updateOrder=useCallback((orderId,updates)=>{
    setOrders(p=>p.map(o=>{
      if(o.id!==orderId)return o;
      const upd={...o,...updates,updatedAt:new Date().toISOString()};
      if(updates.status==='paid'||updates.status==='voided'){
        setTables(tt=>tt.map(tb=>tb.id===o.tableId?{...tb,status:'available',orderId:null}:tb));
      }
      if(updates.status==='billed'){
        setTables(tt=>tt.map(tb=>tb.id===o.tableId?{...tb,status:'bill'}:tb));
      }
      return upd;
    }));
  },[]);

  const _confirmResolve=React.useRef(null);
  const[_confirmState,_setConfirmState]=useState({show:false,msg:''});
  const confirm=useCallback(function(msg){return new Promise(function(res){_confirmResolve.current=res;_setConfirmState({show:true,msg:msg});});},[]); 
  const _resolveConfirm=useCallback(function(val){if(_confirmResolve.current){_confirmResolve.current(val);_confirmResolve.current=null;}_setConfirmState({show:false,msg:''});},[]); 

  const pwaInstall=useCallback(async()=>{
    if(!pwaEvt)return;
    pwaEvt.prompt();
    const{outcome}=await pwaEvt.userChoice;
    if(outcome==='accepted')setPwaEvt(null);
  },[pwaEvt]);

  return(
    <Ctx.Provider value={{
      lang,t,setLang,user,setUser,login,logout,ready,
      tables,setTables,orders,setOrders,cats,setCats,items,setItems,
      staff,setStaff,settings,setSettings,
      toasts,toast,createOrder,addItemsToOrder,updateOrder,calcTotal,beep,confirm,
      pwaEvt,pwaInstall,theme,toggleTheme,
      fbMode,fbConnected,tenant,trialDaysLeft,showPaywall,setShowPaywall
    }}>
      {children}
      <ToastContainer/>
      {_confirmState.show&&(
        <div className="overlay" style={{zIndex:9998}} onClick={function(e){if(e.target===e.currentTarget)_resolveConfirm(false);}}>
          <div className="modal" style={{maxWidth:360}}>
            <p style={{fontSize:14,marginBottom:20}}>{_confirmState.msg}</p>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={function(){_resolveConfirm(false);}}>Cancel</button>
              <button className="btn btn-danger" onClick={function(){_resolveConfirm(true);}}>Confirm</button>
            </div>
          </div>
        </div>
      )}
    </Ctx.Provider>
  );
}

function ToastContainer(){
  const{toasts}=useApp();
  const ic={success:'fa-check-circle',warning:'fa-exclamation-triangle',error:'fa-times-circle',info:'fa-info-circle'};
  const col={success:'var(--green)',warning:'var(--yellow)',error:'var(--red)',info:'var(--blue)'};
  return(
    <div className="toast-wrap no-print">
      {toasts.map(x=>(
        <div key={x.id} className="toast">
          <i className={`fa ${ic[x.type]||ic.info}`} style={{color:col[x.type]||col.info,fontSize:13}}/>
          <span style={{fontSize:13}}>{x.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ======================================================
   TIMER COMPONENT
====================================================== */
function KitTimer({at}){
  const[min,setMin]=useState(0);
  useEffect(()=>{
    const upd=()=>setMin(Math.floor((Date.now()-new Date(at).getTime())/60000));
    upd();const id=setInterval(upd,30000);return()=>clearInterval(id);
  },[at]);
  const cls=min<10?'t-fresh':min<20?'t-warn':'t-hot';
  return<span className={`timer ${cls}`}>⏱ {min}m</span>;
}

function LoginScreen(){
  const{t,login,lang,setLang,pwaEvt,pwaInstall,ready,theme,toggleTheme}=useApp();

          <div style={{fontSize:10,color:'var(--t3)'}}>Restaurant Management System · v2.0</div>
        </div>
        <div className="card" style={{padding:22}}>
          {!ready?(
            <div style={{textAlign:'center',padding:24,color:'var(--t2)',fontSize:13}}>
              <i className="fa fa-spinner" style={{animation:'spin 1s linear infinite',fontSize:20,display:'block',marginBottom:8}}/>

            </div>
          ):(
            <>
              <div className="form-g">
                <label className="form-lbl">{t('username')}</label>
                <input className="input" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="admin" autoComplete="username"/>
              </div>
              <div className="form-g">
                <label className="form-lbl">{t('password')}</label>
                <input className="input" type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••••••" autoComplete="current-password"/>
              </div>
              {err&&<div style={{color:'var(--red)',fontSize:12,marginBottom:8,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6}}>{err}</div>}

                {loading?<i className="fa fa-spinner" style={{animation:'spin 1s linear infinite'}}/>:<i className="fa fa-sign-in-alt"/>}
                {' '}{t('login')}

        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:12}}>

          {t('loginHint')}:<br/>admin / admin123 · cashier / cash123<br/>waiter / wait123 · kitchen / kitchen123
        </div>
      </div>
    </div>
  );

/* ======================================================
   DASHBOARD
====================================================== */
function Dashboard(){
  const{t,orders,tables,settings,lang}=useApp();
  const revRef=useRef();const topRef=useRef();
  const revChart=useRef();const topChart=useRef();
  const vr=(settings.vatRate||15)/100;
  const cur=settings.currency||'SAR';

  const paid=useMemo(()=>orders.filter(o=>o.status==='paid'),[orders]);
  const todayPaid=useMemo(()=>paid.filter(o=>new Date(o.createdAt).toDateString()===today()),[paid]);

  const calcRev=o=>{
    const sub=(o.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    return(sub*(1-(o.discount||0)/100))*(1+vr)+(o.tip||0);
  };

  const todayRev=useMemo(()=>todayPaid.reduce((s,o)=>s+calcRev(o),0),[todayPaid]);
  const totalRev=useMemo(()=>paid.reduce((s,o)=>s+calcRev(o),0),[paid]);
  const active=tables.filter(t=>t.status!=='available').length;
  const pending=orders.filter(o=>['new','in-progress'].includes(o.status)).length;

  const last7=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toDateString();
    const rev=paid.filter(o=>new Date(o.createdAt).toDateString()===ds).reduce((s,o)=>s+calcRev(o),0);
    return{label:d.toLocaleDateString('en',{weekday:'short'}),rev};
  }),[paid]);

  const topItems=useMemo(()=>{
    const cnt={};
    paid.forEach(o=>(o.items||[]).forEach(i=>{const n=lang==='ar'?i.nameAr:i.name;cnt[n]=(cnt[n]||0)+i.qty;}));
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[paid,lang]);

  useEffect(()=>{
    if(!revRef.current)return;
    if(revChart.current)revChart.current.destroy();
    revChart.current=new Chart(revRef.current,{
      type:'bar',
      data:{labels:last7.map(d=>d.label),datasets:[{data:last7.map(d=>Math.round(d.rev)),backgroundColor:'rgba(251,191,36,.45)',borderColor:'#fbbf24',borderWidth:1.5,borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'#9898b0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#9898b0',font:{size:11}},grid:{display:false}}}}
    });
    return()=>{revChart.current?.destroy();};
  },[last7]);

  useEffect(()=>{
    if(!topRef.current||!topItems.length)return;
    if(topChart.current)topChart.current.destroy();
    topChart.current=new Chart(topRef.current,{
      type:'doughnut',
      data:{labels:topItems.map(([n])=>n),datasets:[{data:topItems.map(([,v])=>v),backgroundColor:['#fbbf24','#f97316','#8b5cf6','#3b82f6','#10b981'],borderWidth:0,hoverBorderWidth:2,hoverBorderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9898b0',boxWidth:10,font:{size:11}}}}}
    });
    return()=>{topChart.current?.destroy();};
  },[topItems]);

  return(
    <div className="scroll-y mb-pad" style={{padding:16,flex:1}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(148px,1fr))',gap:10,marginBottom:14}}>
        {[
          {icon:'💰',val:`${cur} ${fmtInt(todayRev)}`,lbl:t('revenueToday'),col:'var(--primary)'},
          {icon:'📋',val:todayPaid.length,lbl:t('ordersToday')},
          {icon:'🪑',val:active,lbl:t('activeTables')},
          {icon:'⏳',val:pending,lbl:t('pendingOrders'),col:pending>0?'var(--yellow)':undefined}
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div style={{fontSize:24}}>{s.icon}</div>
            <div className="stat-v" style={{color:s.col}}>{s.val}</div>
            <div className="stat-l">{s.lbl}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) minmax(0,2fr)',gap:12,marginBottom:12}}>
        <div className="card">
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>🏆 {t('topItems')}</div>
          {topItems.length?<div style={{height:160}}><canvas ref={topRef}/></div>:<div style={{textAlign:'center',padding:24,color:'var(--t3)',fontSize:12}}>{t('noData')}</div>}
        </div>
        <div className="card">
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>📈 {t('weeklySales')}</div>
          <div style={{height:160}}><canvas ref={revRef}/></div>
        </div>
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:11,color:'var(--t2)'}}>🧾 {t('recentTx')}</span>
          <span style={{fontSize:11,color:'var(--t2)'}}>{t('totalRevenue')}: <strong style={{color:'var(--primary)'}}>{cur} {totalRev.toFixed(2)}</strong></span>
        </div>
        {todayPaid.length===0&&<div style={{textAlign:'center',padding:18,color:'var(--t3)',fontSize:12}}>{t('noData')}</div>}
        {todayPaid.slice().reverse().slice(0,8).map(o=>{
          const rev=calcRev(o);
          return(
            <div key={o.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
              <span style={{color:'var(--t2)'}}>{o.tableNum||o.orderType} · {new Date(o.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <span className={`badge badge-${o.paymentMethod==='cash'?'green':o.paymentMethod==='mada'?'yellow':'blue'}`}>{o.paymentMethod}</span>
                <span style={{fontWeight:700,color:'var(--primary)',minWidth:80,textAlign:'right'}}>{cur} {rev.toFixed(2)}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ======================================================
   MODIFIER MODAL
====================================================== */
function ModModal({item,lang,onConfirm,onClose}){
  const{settings}=useApp();
  const cur=(settings&&settings.currency)||'SAR';
  const[sel,setSel]=useState({});const[itemNote,setNote]=useState('');
  const groups=item.modifiers||[];
  const canConfirm=groups.filter(g=>g.required).every(g=>!!sel[g.id]);
  const adj=groups.reduce((s,g)=>{const o=g.opts?.find(o=>o.id===sel[g.id]);return s+(o?.adj||0);},0);
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{fontSize:15}}>{lang==='ar'?item.nameAr:item.name}</h3>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>
        {groups.map(g=>(
          <div key={g.id} className="form-g">
            <label className="form-lbl">{lang==='ar'?g.nameAr:g.name} {g.required&&<span style={{color:'var(--red)'}}>*</span>}</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
              {(g.opts||[]).map(o=>(
                <button key={o.id} className={`chip${sel[g.id]===o.id?' active':''}`} onClick={()=>setSel(p=>({...p,[g.id]:o.id}))}>
                  {lang==='ar'?o.nameAr||o.name:o.name}
                  {o.adj>0&&<span style={{fontSize:10}}> +{o.adj}</span>}
                </button>
              ))}
            </div>
          </div>
        ))}
        <div className="form-g">
          <label className="form-lbl">Special instructions</label>
          <input className="input" placeholder="e.g. no onions, well done…" value={itemNote} onChange={e=>setNote(e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
          <button className="btn btn-ghost" onClick={onClose}>{lang==='ar'?'إلغاء':'Cancel'}</button>
          <button className="btn btn-primary" disabled={!canConfirm} onClick={()=>onConfirm({...item,selectedMods:sel,modAdj:adj,itemNote})}>
            {lang==='ar'?'إضافة':'Add'} · {cur} {(item.price+adj).toFixed(2)}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   ORDER SCREEN (waiter ordering)
====================================================== */
function OrderScreen({table,existingOrder,onBack}){
  const{t,lang,items,cats,createOrder,addItemsToOrder,toast,settings}=useApp();
  const cur=settings.currency||'SAR';
  const[selCat,setSelCat]=useState(0);const[cart,setCart]=useState([]);
  const[note,setNote]=useState('');const[search,setSearch]=useState('');
  const[orderType,setOrderType]=useState('dine-in');const[modItem,setModItem]=useState(null);
  const isAdd=!!existingOrder;

  const cartKey=c=>c.id+'|'+(c.selectedMods?JSON.stringify(c.selectedMods):'{}');
  const insert=item=>{
    setCart(p=>{
      const k=cartKey(item);
      const ex=p.find(c=>cartKey(c)===k);
      return ex?p.map(c=>cartKey(c)===k?{...c,qty:c.qty+1}:c):[...p,{...item,qty:1}];
    });
  };
  const tryAdd=item=>{
    if(!item.available)return;
    if(item.modifiers?.length>0){setModItem(item);}
    else insert({...item,selectedMods:{},modAdj:0,itemNote:''});
  };
  const chQty=(k,d)=>setCart(p=>p.map(c=>cartKey(c)===k?{...c,qty:Math.max(0,c.qty+d)}:c).filter(c=>c.qty>0));
  const cartTotal=cart.reduce((s,c)=>s+(c.price+(c.modAdj||0))*c.qty,0);
  const cartQty=cart.reduce((s,c)=>s+c.qty,0);

  const send=()=>{
    if(!cart.length){toast('Add items first!','warning');return;}
    if(isAdd){addItemsToOrder(existingOrder.id,cart,note);}
    else{createOrder(table?.id,table?.num,cart,null,note,orderType);}
    onBack();
  };

  const filtered=items.filter(i=>(selCat===0||i.catId===selCat)&&(!search||(i.name+i.nameAr).toLowerCase().includes(search.toLowerCase())));

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden'}} className="split">
      {modItem&&<ModModal item={modItem} lang={lang} onConfirm={itm=>{insert(itm);setModItem(null);}} onClose={()=>setModItem(null)}/>}

      {/* Left: menu */}
      <div className="left-pane" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}><i className="fa fa-arrow-left"/></button>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>{table?.num||t('newOrder')}</div>
            <div style={{fontSize:11,color:'var(--t2)'}}>{isAdd?t('addToOrder'):t('addItem')}</div>
          </div>
          {!isAdd&&(
            <div style={{display:'flex',gap:5}}>
              {[['dine-in','🪑',t('dineIn')],['takeaway','🛍',t('takeaway')],['delivery','🛵',t('delivery')]].map(([tp,em,lb])=>(
                <button key={tp} className={`chip${orderType===tp?' active':''}`} onClick={()=>setOrderType(tp)} style={{fontSize:11,padding:'3px 9px'}}>
                  {em} <span className="hide-sm">{lb}</span>
                </button>
              ))}
            </div>
          )}
          <div style={{flex:1,minWidth:100,marginLeft:'auto'}}>
            <input className="input" placeholder={t('search')} value={search} onChange={e=>setSearch(e.target.value)} style={{padding:'7px 11px'}}/>
          </div>
        </div>
        <div style={{padding:'7px 10px',display:'flex',gap:6,overflowX:'auto',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <button className={`chip${selCat===0?' active':''}`} onClick={()=>setSelCat(0)}>{t('all')}</button>
          {cats.map(c=>(
            <button key={c.id} className={`chip${selCat===c.id?' active':''}`} onClick={()=>setSelCat(c.id)}>
              {c.emoji} <span className="hide-sm">{lang==='ar'?c.nameAr:c.name}</span>
            </button>
          ))}
        </div>
        <div className="scroll-y" style={{flex:1,padding:10}}>
          {isAdd&&existingOrder&&(
            <div style={{marginBottom:10,padding:9,background:'var(--blue-dim)',borderRadius:8,border:'1px solid rgba(59,130,246,.2)'}}>
              <div style={{fontSize:11,color:'var(--blue)',fontWeight:700,marginBottom:5}}>{t('existingOrder')} — {(existingOrder.items||[]).length} items</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {(existingOrder.items||[]).map((it,i)=>(
                  <span key={i} style={{fontSize:10,padding:'2px 7px',background:'var(--elevated)',borderRadius:99,color:'var(--t2)'}}>{it.emoji} {lang==='ar'?it.nameAr:it.name} ×{it.qty}</span>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:9}}>
            {filtered.map(item=>(
              <div key={item.id} className={`m-card${!item.available?' unavailable':''}${cart.some(c=>c.id===item.id)?' incart':''}`} onClick={()=>tryAdd(item)}>
                {item.imageData?<img src={item.imageData} className="m-img" alt=""/>:item.imageUrl?<img src={item.imageUrl} className="m-img" alt=""/>:<div className="m-emoji">{item.emoji}</div>}
                <div style={{padding:'7px 9px'}}>
                  <div style={{fontWeight:600,fontSize:11,lineHeight:1.3,marginBottom:2}}>{lang==='ar'?item.nameAr:item.name}</div>
                  <div style={{color:'var(--primary)',fontSize:12,fontWeight:700}}>{cur} {item.price}</div>
                  {item.modifiers?.length>0&&<div style={{fontSize:9,color:'var(--t3)',marginTop:1}}>+ options ▾</div>}
                </div>
              </div>
            ))}
            {!filtered.length&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:32,color:'var(--t3)',fontSize:12}}>{t('noItems')}</div>}
          </div>
        </div>
      </div>

      {/* Right: cart */}
      <div className="order-panel" style={{width:280,flexShrink:0}}>
        <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13,flexShrink:0}}>
          🛒 {t('cart')} ({cartQty})
        </div>
        <div className="scroll-y" style={{flex:1,padding:8}}>
          {!cart.length&&<div style={{textAlign:'center',padding:28,color:'var(--t3)',fontSize:12}}>{lang==='ar'?'اختر من القائمة':'Tap menu items to add'}</div>}
          {cart.map(c=>{
            const k=cartKey(c);
            return(
              <div key={k} style={{display:'flex',alignItems:'center',gap:7,marginBottom:7,padding:8,background:'var(--elevated)',borderRadius:8}}>
                <span style={{fontSize:18,flexShrink:0}}>{c.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,lineHeight:1.3}}>{lang==='ar'?c.nameAr:c.name}</div>
                  {c.modAdj>0&&<div style={{fontSize:10,color:'var(--t3)'}}>+{c.modAdj} options</div>}
                  {c.itemNote&&<div style={{fontSize:9,color:'var(--t3)',marginTop:1}}>📝 {c.itemNote}</div>}
                  <div style={{fontSize:11,color:'var(--primary)',fontWeight:700}}>{cur} {((c.price+(c.modAdj||0))*c.qty).toFixed(2)}</div>
                </div>
                <div style={{display:'flex',gap:3,alignItems:'center',flexShrink:0}}>
                  <button className="btn btn-ghost btn-icon" style={{width:26,height:26,fontSize:14}} onClick={()=>chQty(k,-1)}>-</button>
                  <span style={{width:18,textAlign:'center',fontSize:12,fontWeight:700}}>{c.qty}</span>
                  <button className="btn btn-ghost btn-icon" style={{width:26,height:26,fontSize:14}} onClick={()=>chQty(k,1)}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:10,borderTop:'1px solid var(--border)',flexShrink:0}}>
          <textarea className="input" placeholder={t('addNote')} value={note} onChange={e=>setNote(e.target.value)} rows={2} style={{marginBottom:8,fontSize:12}}/>
          {cart.length>0&&(
            <div className="row-between" style={{marginBottom:8}}>
              <span style={{fontSize:12,color:'var(--t2)'}}>{t('total')}</span>
              <span style={{fontWeight:700,color:'var(--primary)',fontSize:14}}>{cur} {cartTotal.toFixed(2)}</span>
            </div>
          )}
          <button className="btn btn-primary btn-block" onClick={send} disabled={!cart.length}>
            <i className={`fa ${isAdd?'fa-plus':'fa-paper-plane'}`}/> {isAdd?t('addToOrder'):t('sendKitchen')}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   WAITER SCREEN
====================================================== */
function WaiterScreen(){
  const{t,lang,tables,orders,confirm}=useApp();
  const[selTbl,setSelTbl]=useState(null);const[addMode,setAddMode]=useState(false);
  const statusLbl={available:t('avail'),ordered:t('occupied'),bill:t('billReady')};

  if(selTbl){
    const existOrd=addMode?orders.find(o=>o.id===selTbl.orderId):null;
    return<OrderScreen table={selTbl} existingOrder={existOrd} onBack={()=>{setSelTbl(null);setAddMode(false);}}/>;
  }

  return(
    <div className="scroll-y mb-pad" style={{padding:16,flex:1}}>
      <div className="tbl-grid">
        {tables.map(tb=>{
          const ord=orders.find(o=>o.id===tb.orderId);
          return(
            <div key={tb.id} className={`tbl-card ${tb.status}`} onClick={()=>{
              if(tb.status==='available'){setAddMode(false);setSelTbl(tb);}
              else if(tb.status==='ordered'&&ord){
                confirm(tb.num+' — Add more items to existing order?').then(function(yes){if(yes){setAddMode(true);setSelTbl(tb);}});
              }
            }}>
              <div className="sdot"/>
              <span style={{fontSize:28}}>🪑</span>
              <div className="tbl-num">{tb.num}</div>
              <div style={{fontSize:10,color:'var(--t3)',marginTop:2}}>{tb.seats} seats</div>
              <span className={`badge badge-${tb.status==='available'?'green':tb.status==='ordered'?'yellow':'red'}`} style={{marginTop:5,fontSize:10}}>
                {statusLbl[tb.status]}
              </span>
              {ord&&<KitTimer at={ord.createdAt}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function KitchenScreen(){

  const[filter,setFilter]=useState('all');

  const cols={new:{label:lang==='ar'?'جديد':'New',color:'var(--yellow)',bg:'var(--yellow-dim)'},
    'in-progress':{label:t('inProgress'),color:'var(--blue)',bg:'var(--blue-dim)'},
    ready:{label:t('ready'),color:'var(--green)',bg:'var(--green-dim)'}};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>

                      <span style={{flex:1}}>{lang==='ar'?it.nameAr:it.name}</span>
                      {it.modAdj>0&&<span style={{fontSize:10,color:'var(--t3)'}}>+options</span>}
                      <span style={{fontWeight:700}}>×{it.qty}</span>
                    </div>
                  ))}
                </div>
                {order.note&&<div style={{padding:'5px 8px',background:'var(--yellow-dim)',borderRadius:6,fontSize:11,marginBottom:8}}>📝 {order.note}</div>}
                <div style={{display:'flex',gap:6}}>
                  {order.status==='new'&&(
                    <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>updateOrder(order.id,{status:'in-progress'})}>
                      <i className="fa fa-play"/> Start
                    </button>
                  )}
                  {order.status==='in-progress'&&(
                    <button className="btn btn-success btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>updateOrder(order.id,{status:'ready'})}>
                      <i className="fa fa-check"/> Ready
                    </button>
                  )}
                  {order.status==='ready'&&(
                    <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>updateOrder(order.id,{status:'completed'})}>
                      <i className="fa fa-check-double"/> Served
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   SPLIT BILL MODAL
====================================================== */
function SplitModal({order,calcTotal,settings,onClose,onPay}){
  const[parts,setParts]=useState(2);
  const{total}=calcTotal(order);
  const per=total/parts;
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="row-between" style={{marginBottom:14}}>
          <h3>Split Bill — {order.tableNum}</h3>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>
        <div className="form-g">
          <label className="form-lbl">Split into {parts} parts</label>
          <input type="range" min={2} max={10} value={parts} onChange={e=>setParts(Number(e.target.value))} style={{width:'100%'}}/>
        </div>
        <div style={{padding:14,background:'var(--elevated)',borderRadius:8,textAlign:'center',marginBottom:14}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--primary)'}}>{settings.currency||'SAR'} {per.toFixed(2)}</div>
          <div style={{fontSize:12,color:'var(--t2)',marginTop:4}}>per person · total {(settings.currency||'SAR')} {total.toFixed(2)}</div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{onPay(parts);onClose();}}>
            <i className="fa fa-check"/> Confirm Split Payment
          </button>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   EDIT ORDER MODAL
====================================================== */
function EditOrderModal({order,onClose}){
  const{t,lang,items:menuItems,cats,updateOrder,settings,toast}=useApp();
  const cur=settings.currency||'SAR';

  // Deep-copy order items into local state
  const[editItems,setEditItems]=useState(()=>(order.items||[]).map(i=>({...i})));
  const[note,setNote]=useState(order.note||'');
  const[orderType,setOrderType]=useState(order.orderType||'dine-in');
  const[tab,setTab]=useState('items'); // 'items' | 'add'
  const[selCat,setSelCat]=useState(0);
  const[search,setSearch]=useState('');

  const cartKey=i=>i.id+'|'+(i.selectedMods?JSON.stringify(i.selectedMods):'{}');

  // ── Edit existing items ──────────────────────────────
  const changeQty=(idx,delta)=>{
    setEditItems(p=>{
      const next=[...p];
      const newQty=next[idx].qty+delta;
      if(newQty<=0){next.splice(idx,1);}
      else{next[idx]={...next[idx],qty:newQty};}
      return next;
    });
  };

  // ── Add menu item ────────────────────────────────────
  const addItem=item=>{
    if(!item.available)return;
    setEditItems(p=>{
      const key=cartKey({...item,selectedMods:{}});
      const idx=p.findIndex(i=>cartKey(i)===key);
      if(idx>=0){const n=[...p];n[idx]={...n[idx],qty:n[idx].qty+1};return n;}
      return[...p,{...item,qty:1,selectedMods:{},modAdj:0,itemNote:''}];
    });
  };

  const filtered=menuItems.filter(i=>i.available&&(selCat===0||i.catId===selCat)&&(!search||(i.name+i.nameAr).toLowerCase().includes(search.toLowerCase())));

  const sub=editItems.reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);

  const save=()=>{
    if(!editItems.length){toast('Order must have at least one item','warning');return;}
    updateOrder(order.id,{items:editItems,note,orderType,updatedAt:new Date().toISOString()});
    toast('Order updated','success');
    onClose();
  };

  return(
    <div className="overlay" style={{zIndex:1050}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg" style={{maxHeight:'95vh',display:'flex',flexDirection:'column'}}>

        {/* Header */}
        <div className="row-between" style={{marginBottom:14,flexShrink:0}}>
          <div>
            <h3 style={{fontSize:15}}>✏️ Edit Order — {order.tableNum||order.orderType}</h3>
            <div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>{order.id}</div>
          </div>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:6,marginBottom:12,flexShrink:0}}>
          <button className={`chip${tab==='items'?' active':''}`} onClick={()=>setTab('items')}>
            <i className="fa fa-list"/> Current Items ({editItems.length})
          </button>
          <button className={`chip${tab==='add'?' active':''}`} onClick={()=>setTab('add')}>
            <i className="fa fa-plus"/> Add Items
          </button>
        </div>

        {/* Tab: current items */}
        {tab==='items'&&(
          <div className="scroll-y" style={{flex:1,minHeight:0}}>
            {!editItems.length&&(
              <div style={{textAlign:'center',padding:32,color:'var(--t3)',fontSize:13}}>No items — add some from the menu</div>
            )}
            {editItems.map((it,idx)=>(
              <div key={idx} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:22,flexShrink:0}}>{it.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600}}>{lang==='ar'?it.nameAr:it.name}</div>
                  {it.modAdj>0&&<div style={{fontSize:10,color:'var(--t3)'}}>+{it.modAdj} options</div>}
                  {it.itemNote&&<div style={{fontSize:10,color:'var(--t3)'}}>📝 {it.itemNote}</div>}
                  <div style={{fontSize:12,color:'var(--primary)',fontWeight:700}}>{cur} {((it.price+(it.modAdj||0))*it.qty).toFixed(2)}</div>
                </div>
                {/* Qty controls */}
                <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                  <button className="btn btn-danger btn-icon btn-sm" style={{width:28,height:28}} onClick={()=>changeQty(idx,-1)}>
                    {it.qty===1?<i className="fa fa-trash" style={{fontSize:10}}/>:<span style={{fontSize:16,lineHeight:1}}>−</span>}
                  </button>
                  <span style={{width:24,textAlign:'center',fontWeight:700,fontSize:13}}>{it.qty}</span>
                  <button className="btn btn-ghost btn-icon btn-sm" style={{width:28,height:28}} onClick={()=>changeQty(idx,1)}>
                    <span style={{fontSize:16,lineHeight:1}}>+</span>
                  </button>
                </div>
              </div>
            ))}

            {/* Order type + note */}
            <div style={{marginTop:14}}>
              <div className="form-g">
                <label className="form-lbl">{t('orderType')}</label>
                <div style={{display:'flex',gap:6}}>
                  {[['dine-in','🪑',t('dineIn')],['takeaway','🛍',t('takeaway')],['delivery','🛵',t('delivery')]].map(([tp,em,lb])=>(
                    <button key={tp} className={`chip${orderType===tp?' active':''}`} onClick={()=>setOrderType(tp)} style={{fontSize:11}}>
                      {em} {lb}
                    </button>
                  ))}
                </div>
              </div>
              <div className="form-g" style={{marginBottom:0}}>
                <label className="form-lbl">{t('addNote')}</label>
                <textarea className="input" rows={2} value={note} onChange={e=>setNote(e.target.value)} style={{fontSize:12}}/>
              </div>
            </div>
          </div>
        )}

        {/* Tab: add items */}
        {tab==='add'&&(
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',gap:7,marginBottom:8,flexShrink:0,flexWrap:'wrap'}}>
              <input className="input" placeholder={t('search')} value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:120,padding:'7px 11px'}}/>
            </div>
            <div style={{display:'flex',gap:6,marginBottom:8,overflowX:'auto',flexShrink:0}}>
              <button className={`chip${selCat===0?' active':''}`} onClick={()=>setSelCat(0)}>{t('all')}</button>
              {cats.map(c=><button key={c.id} className={`chip${selCat===c.id?' active':''}`} onClick={()=>setSelCat(c.id)}>{c.emoji} {lang==='ar'?c.nameAr:c.name}</button>)}
            </div>
            <div className="scroll-y" style={{flex:1,minHeight:0}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
                {filtered.map(item=>{
                  const inOrder=editItems.find(i=>i.id===item.id);
                  return(
                    <div key={item.id} className={`m-card${inOrder?' incart':''}`} onClick={()=>addItem(item)}
                      style={{position:'relative'}}>
                      {item.imageData||item.imageUrl
                        ?<img src={item.imageData||item.imageUrl} className="m-img" alt=""/>
                        :<div className="m-emoji">{item.emoji}</div>}
                      <div style={{padding:'7px 9px'}}>
                        <div style={{fontWeight:600,fontSize:11}}>{lang==='ar'?item.nameAr:item.name}</div>
                        <div style={{color:'var(--primary)',fontSize:12,fontWeight:700}}>{cur} {item.price}</div>
                      </div>
                      {inOrder&&(
                        <div style={{position:'absolute',top:6,right:6,background:'var(--primary)',color:'#0d0d14',borderRadius:99,width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>
                          {inOrder.qty}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:10,flexShrink:0}}>
          <div className="row-between" style={{marginBottom:10}}>
            <span style={{fontSize:12,color:'var(--t2)'}}>{editItems.reduce((s,i)=>s+i.qty,0)} items</span>
            <span style={{fontWeight:700,fontSize:15,color:'var(--primary)'}}>{cur} {sub.toFixed(2)}</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-primary" style={{flex:2,justifyContent:'center'}} onClick={save}>
              <i className="fa fa-save"/> Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ======================================================
   CASHIER SCREEN
====================================================== */
function CashierScreen(){
  const{t,lang,tables,orders,updateOrder,calcTotal,settings,toast}=useApp();
  const[selTbl,setSelTbl]=useState(null);const[discount,setDisc]=useState(0);
  const[payMethod,setPay]=useState('cash');const[received,setReceived]=useState('');
  const[tip,setTip]=useState(0);const[showSplit,setShowSplit]=useState(false);
  const[voidId,setVoidId]=useState(null);const[voidReason,setVoidReason]=useState('');
  const[editOrder,setEditOrder]=useState(null);
  const cur=settings.currency||'SAR';

  const activeTables=tables.filter(tb=>tb.status==='ordered'||tb.status==='bill');
  const selOrder=selTbl?orders.find(o=>o.id===selTbl.orderId):null;

  const{sub,disc,after,vat,total}=selOrder?{...calcTotal({...selOrder,discount,tip}),tip}:{sub:0,disc:0,after:0,vat:0,total:0,tip:0};
  const change=received?Math.max(0,parseFloat(received)-total):0;

  const pay=()=>{
    if(!selOrder)return;
    updateOrder(selOrder.id,{status:'paid',discount,tip,paymentMethod:payMethod,paidAt:new Date().toISOString()});
    toast(`Payment accepted · ${cur} ${total.toFixed(2)}`,'success');
    setSelTbl(null);setDisc(0);setTip(0);setReceived('');
  };

  const printReceipt=()=>{
    if(!selOrder)return;
    const vr=(settings.vatRate||15)/100;
    const sub2=(selOrder.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    const disc2=sub2*(discount/100);
    const after2=sub2-disc2;
    const vat2=after2*vr;
    const tip2=tip||0;
    const tot2=after2+vat2+tip2;
    const change2=received?Math.max(0,parseFloat(received)-tot2):0;
    const w=window.open('','_blank','width=380,height=700');
    w.document.write(`<!DOCTYPE html><html><head><title>Receipt</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;font-size:13px;max-width:300px;margin:0 auto;padding:16px}
    .c{text-align:center}.d{border-top:1px dashed #000;margin:8px 0}.r{display:flex;justify-content:space-between}
    h2{font-size:16px}h3{font-size:14px}.big{font-size:17px;font-weight:bold}</style></head><body>
    <div class="c"><h2>${settings.restaurantName}</h2>
    <div>${settings.address||''}</div><div>${settings.phone||''}</div>
    ${settings.vatNumber?`<div>VAT: ${settings.vatNumber}</div>`:''}
    ${settings.crNumber?`<div>CR: ${settings.crNumber}</div>`:''}
    <div>${new Date().toLocaleString()}</div></div>
    <div class="d"></div>
    <div class="r"><span>Table: ${selTbl?.num}</span><span>Order: ${selOrder.id.slice(-8)}</span></div>
    <div class="r"><span>Type: ${selOrder.orderType||'dine-in'}</span><span>Staff: ${selOrder.waiterName||'-'}</span></div>
    <div class="d"></div>
    ${(selOrder.items||[]).map(i=>`<div class="r"><span>${lang==='ar'?i.nameAr:i.name}${i.itemNote?` (${i.itemNote})`:''} x${i.qty}</span><span>${cur} ${((i.price+(i.modAdj||0))*i.qty).toFixed(2)}</span></div>`).join('')}
    <div class="d"></div>
    <div class="r"><span>Subtotal</span><span>${cur} ${sub2.toFixed(2)}</span></div>
    ${discount>0?`<div class="r"><span>Discount ${discount}%</span><span>-${cur} ${disc2.toFixed(2)}</span></div>`:''}
    <div class="r"><span>VAT ${settings.vatRate||15}%</span><span>${cur} ${vat2.toFixed(2)}</span></div>
    ${tip2>0?`<div class="r"><span>Tip</span><span>${cur} ${tip2.toFixed(2)}</span></div>`:''}
    <div class="d"></div>
    <div class="r big"><span>TOTAL</span><span>${cur} ${tot2.toFixed(2)}</span></div>
    ${payMethod==='cash'&&received?`<div class="r"><span>Received</span><span>${cur} ${parseFloat(received).toFixed(2)}</span></div><div class="r"><span>Change</span><span>${cur} ${change2.toFixed(2)}</span></div>`:''}
    <div class="d"></div>
    <div class="c"><p>${lang==='ar'?settings.receiptFooterAr:settings.receiptFooter}</p></div>
    <div style="text-align:center;margin-top:18px"><button onclick="window.print()" style="padding:8px 20px;font-family:monospace">Print</button></div>
    </body></html>`);
    w.document.close();
  };

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden'}} className="split">
      {editOrder&&<EditOrderModal order={editOrder} onClose={()=>setEditOrder(null)}/>}
      {showSplit&&selOrder&&<SplitModal order={{...selOrder,discount,tip}} calcTotal={calcTotal} settings={settings} onClose={()=>setShowSplit(false)} onPay={(parts)=>{
        updateOrder(selOrder.id,{status:'paid',discount,tip,paymentMethod:'split',splits:parts,paidAt:new Date().toISOString()});
        toast(`Split payment (${parts} ways) · ${cur} ${(total/parts).toFixed(2)} each`,'success');
        setSelTbl(null);setDisc(0);setTip(0);
      }}/>}
      {voidId&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setVoidId(null)}>
          <div className="modal">
            <h3 style={{marginBottom:12}}>{t('voidOrder')}</h3>
            <div className="form-g">
              <label className="form-lbl">{t('voidReason')}</label>
              <input className="input" placeholder={t('enterReason')} value={voidReason} onChange={e=>setVoidReason(e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:10}}>
              <button className="btn btn-ghost" onClick={()=>setVoidId(null)}>{t('cancel')}</button>
              <button className="btn btn-danger" onClick={()=>{
                updateOrder(voidId,{status:'voided',voidReason,voidedAt:new Date().toISOString()});
                toast('Order voided','warning');setVoidId(null);setSelTbl(null);
              }}>{t('confirm')}</button>
            </div>
          </div>
        </div>
      )}

      {/* Left: table list */}
      <div style={{width:240,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
        <div style={{padding:'10px 12px',fontWeight:700,fontSize:13,borderBottom:'1px solid var(--border)',flexShrink:0}}>{t('tables')}</div>
        <div className="scroll-y" style={{flex:1}}>
          {!activeTables.length&&<div style={{padding:20,textAlign:'center',color:'var(--t3)',fontSize:12}}>No active tables</div>}
          {activeTables.map(tb=>(
            <div key={tb.id} onClick={()=>{setSelTbl(tb);setDisc(0);setTip(0);setReceived('');setPay('cash');}}
              style={{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',background:selTbl?.id===tb.id?'var(--primary-dim)':'transparent',transition:'all .15s'}}>
              <div className="row-between">
                <span style={{fontWeight:700}}>{tb.num}</span>
                <span className={`badge badge-${tb.status==='bill'?'red':'yellow'}`}>{tb.status==='bill'?t('billReady'):t('occupied')}</span>
              </div>
              {orders.find(o=>o.id===tb.orderId)&&(
                <div style={{fontSize:11,color:'var(--t2)',marginTop:3}}>
                  {orders.find(o=>o.id===tb.orderId)?.items.length} items
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Right: bill */}
      <div style={{flex:1,overflow:'auto',padding:14}}>
        {!selOrder?(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--t3)',fontSize:13,flexDirection:'column',gap:10}}>
            <i className="fa fa-receipt" style={{fontSize:32,opacity:.3}}/>
            <span>Select a table to process payment</span>
          </div>
        ):(
          <div style={{maxWidth:520}}>
            <div className="row-between" style={{marginBottom:14}}>
              <div>
                <h3 style={{fontSize:16}}>{selTbl?.num}</h3>
                <div style={{fontSize:11,color:'var(--t2)'}}>{selOrder.id} · {selOrder.orderType}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditOrder(selOrder)}><i className="fa fa-edit"/> Edit</button>
                <button className="btn btn-ghost btn-sm" onClick={printReceipt}><i className="fa fa-print"/> {t('print')}</button>
                <button className="btn btn-danger btn-sm" onClick={()=>setVoidId(selOrder.id)}><i className="fa fa-ban"/> Void</button>
              </div>
            </div>
            {/* Items */}
            <div className="card" style={{marginBottom:12,padding:12}}>
              {(selOrder.items||[]).map((it,i)=>(
                <div key={i} className="row-between" style={{padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                  <span>{it.emoji} {lang==='ar'?it.nameAr:it.name}{it.modAdj>0?` (+${it.modAdj})`:''} ×{it.qty}</span>
                  <span style={{fontWeight:600}}>{cur} {((it.price+(it.modAdj||0))*it.qty).toFixed(2)}</span>
                </div>
              ))}
            </div>

/* ======================================================
   REPORTS
====================================================== */
function Reports(){
  const{t,orders,settings,lang}=useApp();
  const[range,setRange]=useState(7);
  const cur=settings.currency||'SAR';
  const vr=(settings.vatRate||15)/100;
  const lineRef=useRef();const lineChart=useRef();

  const paid=useMemo(()=>orders.filter(o=>o.status==='paid'),[orders]);

  const calcRev=o=>{
    const sub=(o.items||[]).reduce((s,i)=>s+(i.price+(i.modAdj||0))*i.qty,0);
    return(sub*(1-(o.discount||0)/100))*(1+vr)+(o.tip||0);
  };

  const days=useMemo(()=>Array.from({length:range},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(range-1-i));
    const ds=d.toDateString();
    const dayOrders=paid.filter(o=>new Date(o.createdAt).toDateString()===ds);
    return{label:d.toLocaleDateString('en',{month:'short',day:'numeric'}),rev:dayOrders.reduce((s,o)=>s+calcRev(o),0),cnt:dayOrders.length};
  }),[paid,range]);

  const totalRev=days.reduce((s,d)=>s+d.rev,0);
  const totalOrds=days.reduce((s,d)=>s+d.cnt,0);
  const avgOrder=totalOrds?totalRev/totalOrds:0;

  const itemStats=useMemo(()=>{
    const m={};
    paid.forEach(o=>(o.items||[]).forEach(i=>{
      const n=lang==='ar'?i.nameAr:i.name;
      if(!m[n])m[n]={name:n,qty:0,rev:0};
      m[n].qty+=i.qty;m[n].rev+=(i.price+(i.modAdj||0))*i.qty;
    }));
    return Object.values(m).sort((a,b)=>b.rev-a.rev).slice(0,10);
  },[paid,lang]);

  useEffect(()=>{
    if(!lineRef.current)return;
    if(lineChart.current)lineChart.current.destroy();
    lineChart.current=new Chart(lineRef.current,{
      type:'line',
      data:{labels:days.map(d=>d.label),datasets:[{label:'Revenue',data:days.map(d=>Math.round(d.rev)),borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,.1)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#fbbf24'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'#9898b0',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#9898b0',font:{size:11}},grid:{display:false}}}}
    });
    return()=>lineChart.current?.destroy();
  },[days]);

  return(
    <div className="scroll-y mb-pad" style={{padding:14,flex:1}}>
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:12,color:'var(--t2)',marginRight:4}}>Range:</span>
        {[7,14,30,90].map(r=>(
          <button key={r} className={`chip${range===r?' active':''}`} style={{fontSize:11}} onClick={()=>setRange(r)}>Last {r}d</button>
        ))}
        <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>{
          const data=JSON.stringify({orders,exportedAt:new Date().toISOString()},null,2);
          const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(data);
          a.download=`ordo-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
        }}><i className="fa fa-download"/> Export</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:10,marginBottom:14}}>
        {[
          {l:'Total Revenue',v:`${cur} ${totalRev.toFixed(2)}`,col:'var(--primary)'},
          {l:'Orders',v:totalOrds},
          {l:'Avg Order',v:`${cur} ${avgOrder.toFixed(2)}`},
          {l:'Total Items',v:paid.reduce((s,o)=>s+(o.items||[]).reduce((ss,i)=>ss+i.qty,0),0)},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-v" style={{color:s.col,fontSize:22}}>{s.v}</div>
            <div className="stat-l">{s.l}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>Revenue Trend</div>
        <div style={{height:180}}><canvas ref={lineRef}/></div>
      </div>

      <div className="card">
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:10}}>Top Items by Revenue</div>
        {!itemStats.length&&<div style={{textAlign:'center',padding:20,color:'var(--t3)',fontSize:12}}>{t('noData')}</div>}
        {itemStats.map((it,i)=>{
          const pct=itemStats[0]?.rev?it.rev/itemStats[0].rev*100:0;
          return(
            <div key={i} style={{marginBottom:8}}>
              <div className="row-between" style={{marginBottom:3}}>
                <span style={{fontSize:12}}>{it.name}</span>
                <span style={{fontSize:12,color:'var(--t2)'}}>{it.qty} sold · <span style={{color:'var(--primary)',fontWeight:700}}>{cur} {it.rev.toFixed(2)}</span></span>
              </div>
              <div style={{height:5,background:'var(--elevated)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:'var(--primary)',borderRadius:99,transition:'width .4s'}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ======================================================
   MENU MANAGEMENT
====================================================== */
function MenuManagement(){
  const{t,lang,cats,setCats,items,setItems,toast,confirm,settings}=useApp();
  const cur=settings.currency||'SAR';
  const[tab,setTab]=useState('items');const[showModal,setShowModal]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const blank={name:'',nameAr:'',price:'',emoji:'🍽️',imageUrl:'',imageData:'',catId:'',available:true,modifiers:[]};
  const[form,setForm]=useState(blank);
  const[showCatModal,setShowCatModal]=useState(false);
  const[editCat,setEditCat]=useState(null);
  const[catForm,setCatForm]=useState({name:'',nameAr:'',emoji:'🍽️'});

  const openItem=(item=null)=>{
    if(item){setEditItem(item);setForm({...item});}
    else{setEditItem(null);setForm({...blank,catId:cats[0]?.id||''});}
    setShowModal(true);
  };

  const saveItem=()=>{
    if(!form.name.trim()||!form.price){toast('Name and price required','warning');return;}
    const it={...form,id:editItem?.id||Date.now(),price:parseFloat(form.price),catId:parseInt(form.catId),modifiers:form.modifiers||[]};
    if(editItem)setItems(p=>p.map(i=>i.id===editItem.id?it:i));
    else setItems(p=>[...p,it]);
    setShowModal(false);toast(t('save'),'success');
  };

  const delItem=function(id){confirm('Delete this item?').then(function(yes){if(yes){setItems(p=>p.filter(i=>i.id!==id));toast('Deleted','warning');}});};

  const handleImg=e=>{
    const f=e.target.files?.[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>setForm(p=>({...p,imageData:ev.target.result,imageUrl:''}));
    reader.readAsDataURL(f);
  };

  // Modifier management
  const addMod=()=>setForm(p=>({...p,modifiers:[...p.modifiers,{id:uid(),name:'',nameAr:'',required:false,opts:[{id:uid(),name:'',nameAr:'',adj:0}]}]}));
  const updMod=(mid,key,val)=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,[key]:val}:m)}));
  const delMod=mid=>setForm(p=>({...p,modifiers:p.modifiers.filter(m=>m.id!==mid)}));
  const addOpt=mid=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,opts:[...m.opts,{id:uid(),name:'',nameAr:'',adj:0}]}:m)}));
  const updOpt=(mid,oid,key,val)=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,opts:m.opts.map(o=>o.id===oid?{...o,[key]:val}:o)}:m)}));
  const delOpt=(mid,oid)=>setForm(p=>({...p,modifiers:p.modifiers.map(m=>m.id===mid?{...m,opts:m.opts.filter(o=>o.id!==oid)}:m)}));

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',gap:6,flexShrink:0}}>
        {[['items','Items'],['cats','Categories']].map(([k,l])=>(
          <button key={k} className={`chip${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
        <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>tab==='items'?openItem():setShowCatModal(true)}>
          <i className="fa fa-plus"/> {tab==='items'?t('addMenuItem'):t('addCat')}
        </button>
      </div>

      {/* Items tab */}
      {tab==='items'&&(
        <div className="scroll-y mb-pad" style={{flex:1,padding:12}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
            {items.map(item=>(
              <div key={item.id} className="card" style={{display:'flex',gap:10,padding:12}}>
                <div style={{width:52,height:52,borderRadius:8,overflow:'hidden',flexShrink:0,background:'var(--elevated)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>
                  {item.imageData||item.imageUrl?<img src={item.imageData||item.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:item.emoji}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13}}>{lang==='ar'?item.nameAr:item.name}</div>
                  <div style={{fontSize:12,color:'var(--primary)',marginTop:2}}>{cur} {item.price}</div>
                  <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
                    <span className={`badge badge-${item.available?'green':'red'}`} style={{fontSize:10}}>{item.available?t('avail2'):t('unavail')}</span>
                    {item.modifiers?.length>0&&<span className="badge badge-purple" style={{fontSize:10}}>{item.modifiers.length} mod</span>}
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>openItem(item)}><i className="fa fa-edit"/></button>
