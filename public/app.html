                <div key={mg.id} style={{background:'var(--elevated)',borderRadius:8,padding:10,marginBottom:8}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto auto',gap:7,marginBottom:7,alignItems:'center'}}>
                    <input className="input" placeholder="Name (EN)" value={mg.name} onChange={e=>updMod(mg.id,'name',e.target.value)} style={{fontSize:12}}/>
                    <input className="input" placeholder="الاسم" value={mg.nameAr||''} onChange={e=>updMod(mg.id,'nameAr',e.target.value)} style={{fontSize:12}} dir="rtl"/>
                    <label style={{display:'flex',alignItems:'center',gap:5,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>
                      <div className={`tog${mg.required?' on':''}`} onClick={()=>updMod(mg.id,'required',!mg.required)} style={{width:32,height:18}}>
                        <div className="tog-thumb" style={{width:13,height:13,top:1,left:mg.required?16:2}}/>
                      </div>{t('required')}
                    </label>
                    <button className="btn btn-danger btn-icon btn-sm" onClick={()=>delMod(mg.id)}><i className="fa fa-times" style={{fontSize:10}}/></button>
                  </div>
                  {mg.opts.map(o=>(
                    <div key={o.id} style={{display:'grid',gridTemplateColumns:'1fr 1fr 60px auto',gap:5,marginBottom:5,alignItems:'center'}}>
                      <input className="input" placeholder="Option (EN)" value={o.name} onChange={e=>updOpt(mg.id,o.id,'name',e.target.value)} style={{fontSize:11,padding:'6px 9px'}}/>
                      <input className="input" placeholder="الخيار" value={o.nameAr||''} onChange={e=>updOpt(mg.id,o.id,'nameAr',e.target.value)} style={{fontSize:11,padding:'6px 9px'}} dir="rtl"/>
                      <input type="number" className="input" placeholder="+0" value={o.adj} onChange={e=>updOpt(mg.id,o.id,'adj',parseFloat(e.target.value)||0)} style={{fontSize:11,padding:'6px 8px'}}/>
                      <button className="btn btn-ghost btn-icon btn-sm" style={{width:26,height:26}} onClick={()=>delOpt(mg.id,o.id)}><i className="fa fa-times" style={{fontSize:9}}/></button>
                    </div>
                  ))}
                  <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>addOpt(mg.id)}><i className="fa fa-plus"/> {t('addOption')}</button>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:14}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>{t('cancel')}</button>
              <button className="btn btn-primary" onClick={saveItem}><i className="fa fa-save"/> {t('save')}</button>
            </div>
          </div>
        </div>
      )}

      {/* Category modal */}
      {showCatModal&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowCatModal(false)}>
          <div className="modal">
            <div className="row-between" style={{marginBottom:14}}>
              <h3>{editCat?'Edit Category':t('addCat')}</h3>
              <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>{setShowCatModal(false);setEditCat(null);}}><i className="fa fa-times"/></button>
            </div>
            <div className="form-g"><label className="form-lbl">English Name</label><input className="input" value={catForm.name} onChange={e=>setCatForm(p=>({...p,name:e.target.value}))}/></div>
            <div className="form-g"><label className="form-lbl">Arabic Name</label><input className="input" value={catForm.nameAr} onChange={e=>setCatForm(p=>({...p,nameAr:e.target.value}))} dir="rtl"/></div>
            <div className="form-g"><label className="form-lbl">Emoji</label><input className="input" value={catForm.emoji} onChange={e=>setCatForm(p=>({...p,emoji:e.target.value}))}/></div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:10}}>
              <button className="btn btn-ghost" onClick={()=>{setShowCatModal(false);setEditCat(null);}}>{t('cancel')}</button>
              <button className="btn btn-primary" onClick={()=>{
                if(!catForm.name.trim())return;
                const cat={...catForm,id:editCat?.id||Date.now()};
                if(editCat)setCats(p=>p.map(c=>c.id===editCat.id?cat:c));
                else setCats(p=>[...p,cat]);
                setShowCatModal(false);setEditCat(null);toast(t('save'),'success');
              }}>{t('save')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ======================================================
   SETTINGS
====================================================== */
function Settings(){
  const{t,lang,settings,setSettings,staff,setStaff,tables,setTables,toast,logout,confirm}=useApp();
  const[tab,setTab]=useState('restaurant');
  const[staffModal,setStaffModal]=useState(false);
  const[editStaff,setEditStaff]=useState(null);
  const[staffForm,setStaffForm]=useState({name:'',nameAr:'',username:'',password:'',role:'waiter',active:true});
  const[tblForm,setTblForm]=useState({num:'',seats:4,area:'Main'});
  const[passForm,setPassForm]=useState({cur:'',nw:'',nw2:''});
  const[passErr,setPassErr]=useState('');
  const[showShareQR,setShowShareQR]=useState(false);

  const Tog=({k,label})=>(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
      <span style={{fontSize:13}}>{label}</span>
      <div className={`tog${settings[k]?' on':''}`} onClick={()=>setSettings({[k]:!settings[k]})}>
        <div className="tog-thumb"/>
      </div>
    </div>
  );

  const saveStaff=async()=>{
    if(!staffForm.name||!staffForm.username){toast('Name and username required','warning');return;}
    if(!editStaff&&!staffForm.password){toast('Password required for new staff','warning');return;}
    let hash=editStaff?.hash||'';
    if(staffForm.password)hash=await hashPw(staffForm.password);
    const s={...staffForm,id:editStaff?.id||Date.now(),hash,pin:staffForm.pin||'0000'};
    delete s.password;
    if(editStaff)setStaff(p=>p.map(x=>x.id===editStaff.id?s:x));
    else setStaff(p=>[...p,s]);
    setStaffModal(false);setEditStaff(null);toast(t('save'),'success');
  };

  const changePass=async()=>{
    setPassErr('');
    if(passForm.nw!==passForm.nw2){setPassErr('Passwords do not match');return;}
    if(passForm.nw.length<6){setPassErr('Minimum 6 characters');return;}
    // verify current
    const h=await hashPw(passForm.cur);
    const me=staff.find(s=>s.id===(JSON.parse(localStorage.getItem('session')||'{}').uid));
    if(!me||h!==me.hash){setPassErr('Current password incorrect');return;}
    const nh=await hashPw(passForm.nw);
    setStaff(p=>p.map(s=>s.id===me.id?{...s,hash:nh}:s));
    setPassForm({cur:'',nw:'',nw2:''});toast('Password changed','success');
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',gap:5,flexShrink:0,overflowX:'auto'}}>
        {[['restaurant','🏪 Restaurant'],['security','🔐 Security'],['staff','👥 Staff'],['tables','🪑 Tables'],['data','💾 Data']].map(([k,l])=>(
          <button key={k} className={`chip${tab===k?' active':''}`} style={{fontSize:11,whiteSpace:'nowrap'}} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      <div className="scroll-y mb-pad" style={{flex:1,padding:14}}>

        {/* Restaurant */}
        {tab==='restaurant'&&(
          <div>
            <div className="section-hdr">🏪 Restaurant Info</div>
            <div className="card" style={{marginBottom:12}}>
              {[['restaurantName','Restaurant Name (EN)',''],['restaurantNameAr','Restaurant Name (AR)','rtl'],['address','Address (EN)',''],['addressAr','Address (AR)','rtl'],['phone','Phone',''],['crNumber','CR Number',''],['vatNumber','VAT Number (15-digit)','']].map(([k,l,d])=>(
                <div key={k} className="form-g">
                  <label className="form-lbl">{l}</label>
                  <input className="input" value={settings[k]||''} onChange={e=>setSettings({[k]:e.target.value})} dir={d||'auto'}/>
                </div>
              ))}
            </div>
            <div className="section-hdr">💰 Financial</div>
            <div className="card" style={{marginBottom:12}}>
              <div className="form-g">
                <label className="form-lbl">{t('vatRate')}</label>
                <input type="number" className="input" value={settings.vatRate||15} onChange={e=>setSettings({vatRate:Math.min(100,Math.max(0,+e.target.value))})} min={0} max={100}/>
              </div>
              <div className="form-g">
                <label className="form-lbl">Currency</label>
                <select className="input" value={settings.currency||'SAR'} onChange={e=>setSettings({currency:e.target.value})}>
                  {['SAR','USD','AED','KWD','BHD','QAR','OMR'].map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <Tog k="enableTips" label="Enable Tips"/>
              <Tog k="enableDelivery" label="Enable Delivery Orders"/>
            </div>
            <div className="section-hdr">🧾 Receipt</div>
            <div className="card" style={{marginBottom:12}}>
              <div className="form-g">
                <label className="form-lbl">{t('receiptMsg')} (EN)</label>
                <input className="input" value={settings.receiptFooter||''} onChange={e=>setSettings({receiptFooter:e.target.value})}/>
              </div>
              <div className="form-g">
                <label className="form-lbl">{t('receiptMsg')} (AR)</label>
                <input className="input" value={settings.receiptFooterAr||''} onChange={e=>setSettings({receiptFooterAr:e.target.value})} dir="rtl"/>

            </div>
            <div className="section-hdr">📋 Digital Menu</div>

              <div style={{display:'flex',gap:14,alignItems:'center'}}>
                <div style={{fontSize:38}}>📱</div>
                <div style={{flex:1}}>

                </div>
              </div>
              <button className="btn btn-primary" style={{marginTop:12,width:'100%',justifyContent:'center'}} onClick={()=>setShowShareQR(true)}>
                <i className="fa fa-qrcode"/> Generate Menu QR Code
              </button>
            </div>
          </div>
        )}
        {showShareQR&&<ShareMenuQR onClose={()=>setShowShareQR(false)}/>}

        {/* Security */}

                <label className="form-lbl">{t('sessionTimeout')}</label>

              </div>
              <Tog k="kitchenSound" label={t('kitchenSound')}/>
            </div>
            <div className="section-hdr">🔑 Change My Password</div>
            <div className="card">
              <div className="form-g"><label className="form-lbl">{t('currentPass')}</label><input className="input" type="password" value={passForm.cur} onChange={e=>setPassForm(p=>({...p,cur:e.target.value}))}/></div>
              <div className="form-g"><label className="form-lbl">{t('newPass')}</label><input className="input" type="password" value={passForm.nw} onChange={e=>setPassForm(p=>({...p,nw:e.target.value}))}/></div>
              <div className="form-g"><label className="form-lbl">Confirm New Password</label><input className="input" type="password" value={passForm.nw2} onChange={e=>setPassForm(p=>({...p,nw2:e.target.value}))}/></div>
              {passErr&&<div style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{passErr}</div>}
              <button className="btn btn-primary btn-sm" onClick={changePass}><i className="fa fa-lock"/> {t('changePass')}</button>
            </div>
          </div>
        )}

        {/* Staff */}
        {tab==='staff'&&(
          <div>
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10}}>
              <button className="btn btn-primary btn-sm" onClick={()=>{setEditStaff(null);setStaffForm({name:'',nameAr:'',username:'',password:'',role:'waiter',active:true});setStaffModal(true);}}>

            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
              {staff.map(s=>(
                <div key={s.id} className="card" style={{display:'flex',gap:10,padding:12,opacity:s.active?1:.55}}>

                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13}}>{lang==='ar'?s.nameAr||s.name:s.name}</div>
                    <div style={{fontSize:11,color:'var(--t2)'}}>{s.username}</div>
                    <span className={`badge badge-${s.role==='admin'?'red':s.role==='cashier'?'blue':s.role==='waiter'?'green':'orange'}`} style={{fontSize:10,marginTop:4}}>{s.role}</span>

                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>{setEditStaff(s);setStaffForm({...s,password:''});setStaffModal(true);}}><i className="fa fa-edit"/></button>
                    <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>setStaff(p=>p.map(x=>x.id===s.id?{...x,active:!x.active}:x))}>

            {staffModal&&(
              <div className="overlay" onClick={e=>e.target===e.currentTarget&&setStaffModal(false)}>
                <div className="modal">
                  <div className="row-between" style={{marginBottom:14}}>
                    <h3>{editStaff?'Edit Staff':t('addStaff')}</h3>
                    <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>setStaffModal(false)}><i className="fa fa-times"/></button>
                  </div>
                  <div className="form-g"><label className="form-lbl">Full Name (EN)</label><input className="input" value={staffForm.name} onChange={e=>setStaffForm(p=>({...p,name:e.target.value}))}/></div>
                  <div className="form-g"><label className="form-lbl">Full Name (AR)</label><input className="input" value={staffForm.nameAr||''} onChange={e=>setStaffForm(p=>({...p,nameAr:e.target.value}))} dir="rtl"/></div>

                <div className="form-g" style={{marginBottom:0}}><label className="form-lbl">{t('seats')}</label><input type="number" className="input" value={tblForm.seats} onChange={e=>setTblForm(p=>({...p,seats:+e.target.value}))} min={1}/></div>

        {tab==='data'&&(
          <div>
            <div className="section-hdr">💾 Data Management</div>
            <div className="card" style={{marginBottom:12}}>
              <p style={{fontSize:13,color:'var(--t2)',marginBottom:14}}>Export a full JSON backup of all orders, settings, and menu data.</p>
              <button className="btn btn-ghost" onClick={()=>{
                const data={orders:JSON.parse(localStorage.getItem('orders')||'[]'),items:JSON.parse(localStorage.getItem('items')||'[]'),cats:JSON.parse(localStorage.getItem('cats')||'[]'),settings:JSON.parse(localStorage.getItem('settings')||'{}'),exportedAt:new Date().toISOString()};
                const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(data,null,2));
                a.download=`ordo-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
              }}><i className="fa fa-download"/> {t('exportData')}</button>
            </div>
            <div className="card" style={{marginBottom:12,border:'1px solid rgba(59,130,246,.25)'}}>
              <div className="section-hdr" style={{marginBottom:8}}>🔥 Firebase Connection</div>
              <p style={{fontSize:13,color:'var(--t2)',marginBottom:12}}>Disconnect Firebase to re-enter a different config or switch to offline mode.</p>
              <button className="btn btn-ghost" onClick={()=>{
                localStorage.removeItem('fbConfig');

              }}><i className="fa fa-unlink"/> Disconnect Firebase</button>
            </div>
            <div className="card" style={{border:'1px solid rgba(239,68,68,.3)'}}>
              <p style={{fontSize:13,color:'var(--t2)',marginBottom:14}}>⚠️ This will permanently delete ALL orders, settings, and menu data. This cannot be undone.</p>
              <button className="btn btn-danger" onClick={function(){
                confirm('Are you SURE? This permanently deletes ALL data and cannot be undone.').then(function(yes){
                  if(yes){['orders','tables','cats','items','staff','settings','session','lang'].forEach(function(k){localStorage.removeItem(k);});window.location.reload();}
                });
              }}><i className="fa fa-trash"/> {t('clearData')}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ======================================================
   SHARE MENU QR MODAL
====================================================== */
function ShareMenuQR({onClose}){
  const qrRef=useRef();
  const menuUrl=(window.location.href.split('#')[0])+'#/menu';

  useEffect(()=>{
    if(!qrRef.current)return;
    qrRef.current.innerHTML='';
    try{
      new window.QRCode(qrRef.current,{
        text:menuUrl,
        width:220,height:220,
        colorDark:'#0d0d14',colorLight:'#ffffff',
        correctLevel:window.QRCode.CorrectLevel.M
      });
    }catch(e){
      qrRef.current.innerHTML='<div style="padding:20px;font-size:12px;color:#ef4444;">QR generation failed</div>';
    }
  },[menuUrl]);

  const copy=()=>{
    navigator.clipboard.writeText(menuUrl).then(()=>{
      // simple feedback via title flash
    }).catch(()=>{});
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:340,textAlign:'center'}}>
        <div className="row-between" style={{marginBottom:18}}>
          <div>
            <h3 style={{fontSize:15}}>📋 Share Menu</h3>
            <div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>Customers scan to view the menu</div>
          </div>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>

        {/* QR Code */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
          <div style={{background:'#fff',padding:14,borderRadius:12,display:'inline-block',boxShadow:'0 4px 24px rgba(0,0,0,.18)'}}>
            <div ref={qrRef}/>
          </div>
        </div>

        {/* Features note */}
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16,padding:'10px 12px',background:'var(--elevated)',borderRadius:10,textAlign:'left'}}>
          <div style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><i className="fa fa-check" style={{color:'var(--green)',fontSize:10}}/> View-only — no ordering</div>
          <div style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><i className="fa fa-check" style={{color:'var(--green)',fontSize:10}}/> Day &amp; Night mode</div>
          <div style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><i className="fa fa-check" style={{color:'var(--green)',fontSize:10}}/> Arabic &amp; English</div>
        </div>

        {/* URL */}

    '--bg':'#f5f5ef','--surface':'#ffffff','--card':'#eeeee8','--elevated':'#e5e5df',
    '--border':'rgba(0,0,0,.10)','--t1':'#1a1a2e','--t2':'#55556a','--t3':'#9898b0',
    '--primary':'#d97706','--primary-dim':'rgba(217,119,6,.12)','--primary-dark':'#b45309',
    '--red':'#dc2626','--red-dim':'rgba(220,38,38,.10)',
    '--green':'#059669','--green-dim':'rgba(5,150,105,.10)',
    '--blue':'#2563eb','--blue-dim':'rgba(37,99,235,.10)',
    '--elevated':'#e5e5df'

        <div>
          <div style={{fontWeight:800,fontSize:16,color:'var(--t1)'}}>

          <i className="fa fa-search" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--t3)',fontSize:12,pointerEvents:'none'}}/>

      <div style={{padding:'14px 12px 40px'}}>

                        <span style={{color:'var(--primary)',fontWeight:800,fontSize:14}}>{cur} {item.price}</span>
                        {item.modifiers?.length>0&&(
                          <span style={{fontSize:9,color:'var(--t3)',background:'var(--elevated)',padding:'2px 6px',borderRadius:99}}>

        {settings.phone&&<div>📞 {settings.phone}</div>}
        <div style={{marginTop:4,opacity:.6}}>Powered by Ordo POS</div>
      </div>
    </div>
  );
}


function CustomerQR({tableNum}){
  const{t,lang,setLang,items,cats,createOrder,toast,settings}=useApp();
  const cur=settings.currency||'SAR';
  const[selCat,setSelCat]=useState(0);const[cart,setCart]=useState([]);
  const[note,setNote]=useState('');const[done,setDone]=useState(false);
  const[modItem,setModItem]=useState(null);

  const cartKey=c=>c.id+'|'+(c.selectedMods?JSON.stringify(c.selectedMods):'{}');
  const insert=item=>setCart(p=>{const k=cartKey(item);const ex=p.find(c=>cartKey(c)===k);return ex?p.map(c=>cartKey(c)===k?{...c,qty:c.qty+1}:c):[...p,{...item,qty:1}];});
  const tryAdd=item=>{if(!item.available)return;if(item.modifiers?.length>0){setModItem(item);}else insert({...item,selectedMods:{},modAdj:0});};
  const chQty=(k,d)=>setCart(p=>p.map(c=>cartKey(c)===k?{...c,qty:Math.max(0,c.qty+d)}:c).filter(c=>c.qty>0));
  const total=cart.reduce((s,c)=>s+(c.price+(c.modAdj||0))*c.qty,0);

  if(done)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',padding:24,textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:16}}>✅</div>
      <h2 style={{marginBottom:8}}>{lang==='ar'?'تم تقديم طلبك!':'Your order has been placed!'}</h2>
      <p style={{color:'var(--t2)',fontSize:14}}>{lang==='ar'?'سيتم تحضيره قريباً':'The kitchen has received your order'}</p>
      <p style={{color:'var(--primary)',marginTop:10,fontWeight:700}}>{tableNum}</p>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {modItem&&<ModModal item={modItem} lang={lang} onConfirm={itm=>{insert(itm);setModItem(null);}} onClose={()=>setModItem(null)}/>}
      <div style={{padding:'12px 14px',background:'var(--surface)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontWeight:800,fontSize:16}}>🍽️ {lang==='ar'?'قائمة الطعام':'Menu'}</div>
          <div style={{fontSize:11,color:'var(--t2)'}}>🪑 {tableNum}</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setLang(lang==='ar'?'en':'ar')}>{lang==='ar'?'EN':'ع'}</button>
      </div>
      <div style={{padding:'8px 12px',display:'flex',gap:6,overflowX:'auto',borderBottom:'1px solid var(--border)'}}>
        <button className={`chip${selCat===0?' active':''}`} onClick={()=>setSelCat(0)}>{t('all')}</button>
        {cats.map(c=><button key={c.id} className={`chip${selCat===c.id?' active':''}`} onClick={()=>setSelCat(c.id)}>{c.emoji} {lang==='ar'?c.nameAr:c.name}</button>)}
      </div>
      <div className="scroll-y" style={{flex:1,padding:12,paddingBottom:cart.length?150:20}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10}}>
          {items.filter(i=>i.available&&(selCat===0||i.catId===selCat)).map(item=>(
            <div key={item.id} className={`m-card${cart.some(c=>c.id===item.id)?' incart':''}`} onClick={()=>tryAdd(item)}>
              {item.imageData||item.imageUrl?<img src={item.imageData||item.imageUrl} className="m-img" alt=""/>:<div className="m-emoji">{item.emoji}</div>}
              <div style={{padding:'8px 10px'}}>
                <div style={{fontWeight:600,fontSize:12}}>{lang==='ar'?item.nameAr:item.name}</div>
                <div style={{color:'var(--primary)',fontWeight:700,fontSize:13,marginTop:3}}>{cur} {item.price}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {cart.length>0&&(
        <div style={{position:'fixed',bottom:0,left:0,right:0,padding:12,background:'var(--surface)',borderTop:'1px solid var(--border)'}}>
          <div style={{maxWidth:480,margin:'0 auto'}}>
            <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:8}}>
              {cart.map(c=>{const k=cartKey(c);return(
                <div key={k} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px',background:'var(--elevated)',borderRadius:8,flexShrink:0}}>
                  <span style={{fontSize:14}}>{c.emoji}</span>
                  <span style={{fontSize:11}}>{c.qty}</span>
                  <button style={{fontSize:14,background:'none',border:'none',cursor:'pointer',color:'var(--t2)'}} onClick={()=>chQty(k,-1)}>×</button>
                </div>
              );})}
            </div>
            <textarea className="input" placeholder={t('addNote')} value={note} onChange={e=>setNote(e.target.value)} rows={1} style={{marginBottom:8,fontSize:12}}/>
            <button className="btn btn-primary btn-block btn-lg" onClick={()=>{
              createOrder(null,tableNum,cart,'Customer (QR)',note,'dine-in');
              setCart([]);setDone(true);
            }}>
              <i className="fa fa-check"/> {t('placeOrder')} · {cur} {total.toFixed(2)}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function FirebaseSetup(){
  const{setFbConfig,lang}=useApp();
  const[raw,setRaw]=useState('');
  const[err,setErr]=useState('');

  const save=()=>{
    setErr('');
    try{
      // Accept either a raw JS object string or JSON
      const cleaned=raw
        .replace(/^[\s\S]*?firebaseConfig\s*=\s*/,'')
        .replace(/;?\s*$/,'')
        .replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g,'$1"$2":')
        .replace(/'/g,'"');
      const cfg=JSON.parse(cleaned);
      if(!cfg.apiKey||!cfg.projectId){setErr('Missing apiKey or projectId');return;}
      setFbConfig(cfg);
    }catch(e){
      setErr('Invalid config — please paste the full firebaseConfig object');
    }
  };

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',padding:20,background:'var(--bg)'}}>
      <div style={{width:'100%',maxWidth:480}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:44,marginBottom:8}}>🔥</div>
          <div style={{fontSize:20,fontWeight:800,color:'var(--primary)'}}>Connect to Firebase</div>
          <div style={{fontSize:12,color:'var(--t2)',marginTop:6,lineHeight:1.6}}>
            Paste your Firebase config to enable real-time sync across all devices
          </div>
        </div>
        <div className="card" style={{padding:20,marginBottom:14}}>
          <div className="form-g">
            <label className="form-lbl">Firebase Config</label>
            <textarea
              className="input"
              rows={8}
              style={{fontFamily:'monospace',fontSize:11,lineHeight:1.5}}
              placeholder={`const firebaseConfig = {\n  apiKey: "AIza...",\n  authDomain: "your-app.firebaseapp.com",\n  projectId: "your-app",\n  storageBucket: "...",\n  messagingSenderId: "...",\n  appId: "..."\n};`}
              value={raw}
              onChange={e=>setRaw(e.target.value)}
            />
          </div>
          {err&&<div style={{color:'var(--red)',fontSize:12,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,marginBottom:8}}>{err}</div>}
          <button className="btn btn-primary btn-block" onClick={save} disabled={!raw.trim()}>
            <i className="fa fa-plug"/> Connect Firebase
          </button>
        </div>
        <div style={{fontSize:11,color:'var(--t3)',lineHeight:1.7,padding:'10px 14px',background:'var(--elevated)',borderRadius:10}}>
          <strong style={{color:'var(--t2)'}}>How to get your config:</strong><br/>
          1. Go to console.firebase.google.com<br/>
          2. Your project → Project Settings → Your apps<br/>
          3. Click ⋮ → SDK setup → Copy firebaseConfig<br/>
          4. Paste above and click Connect
        </div>
      </div>
    </div>
  );
}


function MainApp(){
  const{user,showPaywall,ready}=useApp();
  const[screen,setScreen]=useState('tables');
  const[qrTable,setQrTable]=useState(null);
  const[menuView,setMenuView]=useState(false);

  useEffect(()=>{
    const h=window.location.hash;
    const m=h.match(/^#\/table\/(\w+)$/i);
    if(m)setQrTable(m[1].toUpperCase());
    if(h==='#/menu')setMenuView(true);
  },[]);

  const roleScreens={
    admin:['dashboard','tables','orders','menu','kitchen','reports','settings'],
    cashier:['tables','orders','reports'],
    waiter:['tables'],
    kitchen:['kitchen']
  };
  const role=user?user.role:null;
  const allowed=roleScreens[role]||['tables'];

  useEffect(()=>{
    if(role&&!allowed.includes(screen))setScreen(allowed[0]);
  },[role]);

  if(menuView)return<MenuViewOnly/>;
  if(qrTable)return<CustomerQR tableNum={qrTable}/>;

  // Show loading while Firebase Auth resolves
  if(!ready)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14,background:'var(--bg)'}}>
      <div style={{fontSize:36,fontWeight:900,letterSpacing:'-2px',background:'linear-gradient(135deg,var(--primary),#fb923c)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Ordo</div>
      <div style={{fontSize:12,color:'var(--t3)'}}>Loading your restaurant…</div>
    </div>
  );

  // Trial expired / unpaid
  if(showPaywall)return<PaywallScreen/>;

  // Staff login (within tenant)
  if(!user)return<LoginScreen/>;

  const panels={
    dashboard:<Dashboard/>,
    tables:role==='cashier'?<CashierScreen/>:<WaiterScreen/>,
    orders:<OrdersScreen/>,
    menu:<MenuManagement/>,
    kitchen:<KitchenScreen/>,
    reports:<Reports/>,
    settings:<Settings/>
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <TrialBanner/>
      <Header screen={screen} setScreen={setScreen} allowed={allowed}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>{panels[screen]||panels[allowed[0]]}</div>
      <BotNav screen={screen} setScreen={setScreen} allowed={allowed}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(

);
