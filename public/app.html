// ── GLOBAL ERROR HANDLER ──────────────────────────────────────────────────
window.addEventListener('error', function(e){
  var el=document.getElementById('root');
  if(el&&el.children.length===0){
    el.style.cssText='display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0d14;color:#ef4444;font-family:monospace;font-size:13px;padding:20px;text-align:center;';
    el.innerHTML='<div><div style="font-size:32px;margin-bottom:12px;">⚠️</div><div>App Error: '+(e.message||'Unknown error')+'</div><div style="font-size:11px;margin-top:12px;color:#9898b0;">Check console for details</div></div>';
  }
  console.error('Global error:', e);
});
window.addEventListener('unhandledrejection', function(e){
  console.error('Unhandled promise rejection:', e.reason);
});

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('React error:',e,info);}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0d0d14',color:'#ef4444',fontFamily:'monospace',fontSize:'13px',padding:'20px',textAlign:'center',flexDirection:'column',gap:'10px'}},
        React.createElement('div',{style:{fontSize:'32px'}},'⚠️'),
        React.createElement('div',{style:{fontWeight:'bold'}},'Render Error'),
        React.createElement('div',null,this.state.err.message),
        React.createElement('button',{onClick:()=>{localStorage.clear();location.reload();},style:{marginTop:'16px',padding:'8px 16px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',fontFamily:'monospace'}},'Clear Data & Reload')
      );
    }
    return this.props.children;
  }
}

async function hashPw(pw){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('ORDO2_'+pw));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  rm:k=>localStorage.removeItem(k)
};

const safeArr=(k,def)=>{try{const v=localStorage.getItem(k);if(!v)return def;const p=JSON.parse(v);return Array.isArray(p)?p:def;}catch{return def;}};
const Ctx=createContext(null);

function Provider({children}){
  const[lang,setLangS]=useState(()=>LS.g('lang','en'));
  const[user,setUser]=useState(null);
  const[tables,setTables]=useState(()=>safeArr('tables',DEF_TABLES));
  const[orders,setOrders]=useState(()=>safeArr('orders',[]));
  const[cats,setCats]=useState(()=>safeArr('cats',DEF_CATS));
  const[items,setItems]=useState(()=>safeArr('items',DEF_ITEMS));
  const[staff,setStaff]=useState(()=>safeArr('staff',DEF_STAFF));
  const[settings,setSettingsS]=useState(()=>{try{const s=LS.g('settings');return(s&&typeof s==='object')?Object.assign({},DEF_SETTINGS,s):DEF_SETTINGS;}catch{return DEF_SETTINGS;}});
  const[toasts,setToasts]=useState([]);
  const[pwaEvt,setPwaEvt]=useState(null);
  const[ready,setReady]=useState(false);
  const[theme,setThemeS]=useState(()=>LS.g('theme','dark'));
  const[fbMode,setFbMode]=useState(true); // Set to true initially
  const[fbConnected,setFbConnected]=useState(false);
  const[tenant,setTenant]=useState(null);
  const[trialDaysLeft,setTrialDaysLeft]=useState(null);
  const[showPaywall,setShowPaywall]=useState(false);
  const fbRef=useRef(null);
  const tenantId=useRef(null);

  // ✅ COMPLETE FIREBASE CONFIGURATION
  const FIREBASE_CONFIG={
    apiKey: "AIzaSyDTzLb-bqmZiNB0G0W4WTRGseMM37GUcpI",
    authDomain: "pos-ordo.firebaseapp.com",
    projectId: "pos-ordo",
    storageBucket: "pos-ordo.firebasestorage.app",
    messagingSenderId: "575923763514",
    appId: "1:575923763514:web:f81283d99aafd2460f3803",
    measurementId: "G-PND9FKHRVF"
  };

  // ── Init Firebase once ─────────────────────────────
  useEffect(()=>{
    try{
      if(window.firebase && !window.firebase.apps.length){
        const app = window.firebase.initializeApp(FIREBASE_CONFIG);
        const fs = window.firebase.firestore(app);
        // Enable offline persistence
        fs.enablePersistence({synchronizeTabs:true}).catch(err=>{
          console.warn('Persistence error (multiple tabs open):', err);
        });
        fbRef.current = fs;
        setFbConnected(true);
        console.log('Firebase initialized successfully');
      } else if(window.firebase && window.firebase.apps.length){
        fbRef.current = window.firebase.firestore();
        setFbConnected(true);
      }
    } catch(e){
      console.error('Firebase init error:', e);
      setFbConnected(false);
    }
  },[]);

  // ── Auth listener — resolve tenant on login ────────
  useEffect(()=>{
    if(!window.firebase) return;
    const auth = window.firebase.auth();
    const unsub = auth.onAuthStateChanged(async fbUser=>{
      console.log('Auth state changed:', fbUser ? 'logged in' : 'no user');
      if(!fbUser){
        // Not logged in — redirect to register
        window.location.href = 'register.html';
        return;
      }
      tenantId.current = fbUser.uid;
      try{
        const snap = await fbRef.current.collection('tenants').doc(fbUser.uid).get();
        if(!snap.exists){
          window.location.href = 'register.html';
          return;
        }
        const t = snap.data();
        setTenant(t);

        // Trial / paywall logic
        if(t.status === 'trial'){
          const daysLeft = Math.ceil((new Date(t.trialEnd) - new Date())/86400000);
          setTrialDaysLeft(Math.max(0, daysLeft));
          if(daysLeft <= 0){
            setShowPaywall(true);
          }
        } else if(t.status === 'expired'){
          setShowPaywall(true);
        }

        // Load tenant settings into app
        const settingsSnap = await fbRef.current.collection('tenants').doc(fbUser.uid).collection('app').doc('settings').get();
        if(settingsSnap.exists){
          const s = settingsSnap.data();
          setSettingsS(prev=>({...prev,...s}));
        }
      } catch(err){
        console.error('Tenant fetch error:', err);
      }
      setReady(true);
    });
    return() => unsub();
  },[]);

  // Tenant-scoped Firestore path
  const tenantDoc = (col) => {
    if(!fbRef.current || !tenantId.current) return null;
    return fbRef.current.collection('tenants').doc(tenantId.current).collection('app').doc(col);
  };

  // Firestore real-time listeners per tenant
  useEffect(()=>{
    if(!fbMode || !tenant || !fbRef.current) return;
    const unsubs = [];
    const listen = (col, setter) => {
      const ref = tenantDoc(col);
      if(!ref) return;
      unsubs.push(ref.onSnapshot(snap => {
        if(snap.exists){
          const d = snap.data()?.data;
          if(Array.isArray(d) && d.length) setter(d);
          else if(d && typeof d === 'object' && !Array.isArray(d)) setter(s => ({...s,...d}));
        }
      }, err => console.error('Snapshot error:', err)));
    };
    listen('orders', setOrders);
    listen('tables', setTables);
    listen('cats', setCats);
    listen('items', setItems);
    listen('staff', setStaff);
    return() => unsubs.forEach(u => u());
  },[fbMode, tenant]);

  // Write to tenant's scoped collection
  const fbWrite = useCallback((col, value) => {
    LS.s(col, value);
    const ref = tenantDoc(col);
    if(!ref || !fbMode) return;
    ref.set({data: value, updatedAt: new Date().toISOString()}, {merge: false}).catch(err => console.error('Write error:', err));
  },[fbMode, tenant]);

  // Apply theme class to html element
  useEffect(()=>{
    document.documentElement.classList.toggle('light', theme === 'light');
    LS.s('theme', theme);
  },[theme]);
  const toggleTheme = useCallback(() => setThemeS(t => t === 'dark' ? 'light' : 'dark'), []);

  // Hash default passwords on first boot
  useEffect(()=>{
    (async()=>{
      const saved = LS.g('staff');
      const ver = LS.g('staffVer');
      if(!saved || !ver || ver !== 'ordo2' || saved.some(s => !s.hash)){
        const base = saved || DEF_STAFF;
        const hashed = await Promise.all(base.map(async s => ({
          ...s,
          hash: await hashPw(DEF_PASSES[s.username] || s.username + '123')
        })));
        setStaff(hashed);
        LS.s('staff', hashed);
        LS.s('staffVer', 'ordo2');
      }
    })();
  },[]);

  // Restore session
  useEffect(()=>{
    const sess = LS.g('session');
    if(sess && sess.uid && sess.exp > Date.now()){
      const all = LS.g('staff') || DEF_STAFF;
      const u = all.find(s => s.id === sess.uid && s.active);
      if(u) setUser(u);
    }
  },[]);

  // PWA
  useEffect(()=>{
    const h = e => { e.preventDefault(); setPwaEvt(e); };
    window.addEventListener('beforeinstallprompt', h);
    return() => window.removeEventListener('beforeinstallprompt', h);
  },[]);

  // Persist locally + sync to Firestore
  useEffect(() => { fbWrite('tables', tables); }, [tables]);
  useEffect(() => { fbWrite('orders', orders); }, [orders]);
  useEffect(() => { fbWrite('cats', cats); }, [cats]);
  useEffect(() => { fbWrite('items', items); }, [items]);
  useEffect(() => { fbWrite('staff', staff); }, [staff]);
  useEffect(() => { fbWrite('settings', settings); }, [settings]);
  useEffect(() => {
    LS.s('lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  },[lang]);

  const t = useCallback(k => (TR[lang] || TR.en)[k] || k, [lang]);
  const setLang = l => setLangS(l);
  const setSettings = upd => setSettingsS(p => ({...p, ...(typeof upd === 'function' ? upd(p) : upd)}));

  const toast = useCallback((msg, type='info', dur=3500) => {
    const id = uid();
    setToasts(p => [...p.slice(-4), {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(x => x.id !== id)), dur);
  },[]);

  const beep = useCallback(() => {
    if(!settings.kitchenSound) return;
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [880,660].forEach((freq,i)=>{
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq;
        const t0 = ctx.currentTime + i*.3;
        g.gain.setValueAtTime(.25, t0);
        g.gain.exponentialRampToValueAtTime(.001, t0+.4);
        o.start(t0); o.stop(t0+.4);
      });
    } catch(e){}
  },[settings.kitchenSound]);

  const login = useCallback(async (username, pw) => {
    const allStaff = LS.g('staff') || staff;
    const s = allStaff.find(s => s.username === username.trim().toLowerCase() && s.active);
    if(!s) return false;
    const h = await hashPw(pw);
    if(h !== s.hash) return false;
    const exp = Date.now() + (settings.sessionTimeout || 480) * 60000;
    LS.s('session', {uid: s.id, exp});
    setUser(s);
    return true;
  },[staff, settings.sessionTimeout]);

  const logout = useCallback(() => { LS.rm('session'); setUser(null); }, []);

  const calcTotal = useCallback((order) => {
    if(!order) return {sub:0, disc:0, after:0, vat:0, tip:0, total:0};
    const vr = (settings.vatRate || 15)/100;
    const sub = (order.items || []).reduce((s,i) => s + (i.price + (i.modAdj || 0)) * i.qty, 0);
    const disc = sub * (order.discount || 0)/100;
    const after = sub - disc;
    const vatAmt = after * vr;
    const tip = order.tip || 0;
    return {sub, disc, after, vat: vatAmt, tip, total: after + vatAmt + tip};
  },[settings.vatRate]);

  const createOrder = useCallback((tableId, tableNum, itemsList, waiterName, note, orderType) => {
    const id = `ORD-${Date.now()}`;
    const order = {id, tableId, tableNum, items: itemsList, waiterName: waiterName || '',
      note: note || '', status: 'new', discount: 0, tip: 0, paymentMethod: 'cash',
      orderType: orderType || 'dine-in', priority: 'normal',
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()};
    setOrders(p => [...p, order]);
    if(tableId) setTables(p => p.map(tb => tb.id === tableId ? {...tb, status: 'ordered', orderId: id} : tb));
    toast(t('orderSent'), 'success');
    beep();
    return id;
  },[t, toast, beep]);

  const addItemsToOrder = useCallback((orderId, newItems, note) => {
    setOrders(p => p.map(o => {
      if(o.id !== orderId) return o;
      const merged = [...(o.items || [])];
      newItems.forEach(ni => {
        const key = ni.id + '_' + (ni.selectedMods ? JSON.stringify(ni.selectedMods) : '');
        const idx = merged.findIndex(m => m.id + '_' + (m.selectedMods ? JSON.stringify(m.selectedMods) : '') === key);
        if(idx >= 0){
          merged[idx] = {...merged[idx], qty: merged[idx].qty + ni.qty};
        } else {
          merged.push({...ni});
        }
      });
      return {...o, items: merged, note: note || o.note, updatedAt: new Date().toISOString(), status: 'new'};
    }));
    toast('Items added to order', 'success');
    beep();
  },[toast, beep]);

  const updateOrder = useCallback((orderId, updates) => {
    setOrders(p => p.map(o => {
      if(o.id !== orderId) return o;
      const upd = {...o, ...updates, updatedAt: new Date().toISOString()};
      if(updates.status === 'paid' || updates.status === 'voided'){
        setTables(tt => tt.map(tb => tb.id === o.tableId ? {...tb, status: 'available', orderId: null} : tb));
      }
      if(updates.status === 'billed'){
        setTables(tt => tt.map(tb => tb.id === o.tableId ? {...tb, status: 'bill'} : tb));
      }
      return upd;
    }));
  },[]);

  const [_confirmResolve, _setConfirmResolve] = useState(null);
  const [_confirmState, _setConfirmState] = useState({show: false, msg: ''});
  const confirm = useCallback((msg) => {
    return new Promise((resolve) => {
      _setConfirmResolve(() => resolve);
      _setConfirmState({show: true, msg: msg});
    });
  }, []);
  const _resolveConfirm = useCallback((val) => {
    if(_confirmResolve) _confirmResolve(val);
    _setConfirmResolve(null);
    _setConfirmState({show: false, msg: ''});
  }, [_confirmResolve]);

  const pwaInstall = useCallback(async() => {
    if(!pwaEvt) return;
    pwaEvt.prompt();
    const {outcome} = await pwaEvt.userChoice;
    if(outcome === 'accepted') setPwaEvt(null);
  },[pwaEvt]);

  return(
    <Ctx.Provider value={{
      lang, t, setLang, user, setUser, login, logout, ready,
      tables, setTables, orders, setOrders, cats, setCats, items, setItems,
      staff, setStaff, settings, setSettings,
      toasts, toast, createOrder, addItemsToOrder, updateOrder, calcTotal, beep, confirm,
      pwaEvt, pwaInstall, theme, toggleTheme,
      fbMode, fbConnected, tenant, trialDaysLeft, showPaywall, setShowPaywall
    }}>
      {children}
      <ToastContainer/>
      {_confirmState.show && (
        <div className="overlay" style={{zIndex: 9998}} onClick={e => { if(e.target === e.currentTarget) _resolveConfirm(false); }}>
          <div className="modal" style={{maxWidth: 360}}>
            <p style={{fontSize: 14, marginBottom: 20}}>{_confirmState.msg}</p>
            <div style={{display: 'flex', gap: 8, justifyContent: 'flex-end'}}>
              <button className="btn btn-ghost" onClick={() => _resolveConfirm(false)}>Cancel</button>
              <button className="btn btn-danger" onClick={() => _resolveConfirm(true)}>Confirm</button>
            </div>
          </div>
        </div>
      )}
    </Ctx.Provider>
  );
}

function ToastContainer(){
  const{toasts}=useApp();
  const ic={success:'fa-check-circle',warning:'fa-exclamation-triangle',error:'fa-times-circle',info:'fa-info-circle'};
  const col={success:'var(--green)',warning:'var(--yellow)',error:'var(--red)',info:'var(--blue)'};
  return(
    <div className="toast-wrap no-print">
      {toasts.map(x=>(
        <div key={x.id} className="toast">
          <i className={`fa ${ic[x.type]||ic.info}`} style={{color:col[x.type]||col.info,fontSize:13}}/>
          <span style={{fontSize:13}}>{x.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ... (keep all your other components: KitTimer, LoginScreen, Header, BotNav, Dashboard, etc.)
// They are the same as your original file

function MainApp(){
  const{user, showPaywall, ready}=useApp();
  const[screen,setScreen]=useState('tables');
  const[qrTable,setQrTable]=useState(null);
  const[menuView,setMenuView]=useState(false);

  useEffect(()=>{
    const h=window.location.hash;
    const m=h.match(/^#\/table\/(\w+)$/i);
    if(m)setQrTable(m[1].toUpperCase());
    if(h==='#/menu')setMenuView(true);
  },[]);

  const roleScreens={
    admin:['dashboard','tables','orders','menu','kitchen','reports','settings'],
    cashier:['tables','orders','reports'],
    waiter:['tables'],
    kitchen:['kitchen']
  };
  const role=user?user.role:null;
  const allowed=roleScreens[role]||['tables'];

  useEffect(()=>{
    if(role&&!allowed.includes(screen))setScreen(allowed[0]);
  },[role]);

  if(menuView) return <div>Menu View (implement if needed)</div>;
  if(qrTable) return <div>QR View for table {qrTable}</div>;

  // Show loading while Firebase Auth resolves
  if(!ready) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14,background:'var(--bg)'}}>
      <div style={{fontSize:36,fontWeight:900,letterSpacing:'-2px',background:'linear-gradient(135deg,var(--primary),#fb923c)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Ordo</div>
      <div style={{fontSize:12,color:'var(--t3)'}}>Loading your restaurant…</div>
    </div>
  );

  // Trial expired / unpaid
  if(showPaywall) return <div>Paywall (implement upgrade screen)</div>;

  // Staff login (within tenant)
  if(!user) return <LoginScreen/>;

  // Simplified panel rendering
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <Header screen={screen} setScreen={setScreen} allowed={allowed}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {screen === 'dashboard' && <Dashboard/>}
        {screen === 'tables' && (role === 'cashier' ? <CashierScreen/> : <WaiterScreen/>)}
        {screen === 'orders' && <OrdersScreen/>}
        {screen === 'menu' && <MenuManagement/>}
        {screen === 'kitchen' && <KitchenScreen/>}
        {screen === 'reports' && <Reports/>}
        {screen === 'settings' && <Settings/>}
      </div>
      <BotNav screen={screen} setScreen={setScreen} allowed={allowed}/>
    </div>
  );
}

// You need to include: LoginScreen, Header, BotNav, Dashboard, CashierScreen, WaiterScreen, 
// OrdersScreen, MenuManagement, KitchenScreen, Reports, Settings, KitTimer, etc.
// (Keep all your existing component definitions from the original file)

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><Provider><MainApp/></Provider></ErrorBoundary>
);
</script>
